<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c2e22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hålkarta">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>SG Hålkarta</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --bg:#0c2e22; --card:#123c2d; --ink:#e8f5ec; --dim:#9fc4ae;
          --line:#1f5540; --accent:#37b06b; --accent-ink:#06180f; --water:#4aa6e0; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  #map { position:absolute; inset:0; background:var(--bg); }
  .leaflet-container { background:var(--bg); }

  /* topp: hål-väljare + green-avstånd */
  #top { position:absolute; top:0; left:0; right:0; z-index:1000;
    padding:env(safe-area-inset-top) 10px 8px; background:linear-gradient(#0c2e22ee,#0c2e2200); }
  .holebar { display:flex; align-items:center; gap:10px; }
  .holebar .name { flex:1; text-align:center; font-weight:700; font-size:17px; }
  .holebar .name small { display:block; color:var(--dim); font-weight:400; font-size:12px; }
  #windrow { margin-top:8px; display:flex; align-items:center; gap:10px; }
  #wind { flex:1; min-width:0; background:var(--card)cc; border:1px solid var(--line);
    border-radius:12px; padding:8px 10px; }
  #windTxt { min-width:0; }
  #windTxt .play { font-size:16px; }
  #windTxt .play b { font-size:19px; color:var(--ink); }
  #windTxt .play .by { color:var(--ink); font-size:14px; }
  #windTxt .sub { color:var(--dim); font-size:12px; margin-top:2px; }
  #rose { flex:0 0 auto; }
  #rose g { transition:transform .4s; transform-origin:32px 32px; transform-box:view-box; }

  /* botten: tap-mät + status */
  #bottom { position:absolute; left:0; right:0; z-index:1000;
    bottom:calc(env(safe-area-inset-bottom) + 62px);
    padding:8px 10px; background:linear-gradient(#0c2e2200,#0c2e22ee); }
  /* gemensam flik-rad (samma på alla sidor) */
  .tabs { position:fixed; left:0; right:0; bottom:0; z-index:1200; display:flex; gap:6px;
    background:var(--card); border-top:1px solid var(--line);
    padding:6px 10px calc(env(safe-area-inset-bottom) + 6px); }
  .tabs a { flex:1; text-align:center; text-decoration:none; color:var(--dim);
    font-size:12px; font-weight:600; padding:5px 0 3px; border-radius:10px; }
  .tabs a .ico { display:block; font-size:20px; }
  .tabs a.active { color:var(--ink); background:#1a4c38; }
  #measure { background:var(--card)ee; border:1px solid var(--line); border-radius:12px;
    padding:8px 12px; min-height:44px; }
  #measure .play { font-size:16px; }
  #measure .play b { font-size:19px; color:var(--ink); }
  #measure .play .by { color:var(--ink); font-size:14px; }
  #measure .sub { color:var(--ink); font-size:14px; margin-top:2px; }
  #measure.hidden { display:none; }
  /* lägesväljare: alltid synlig, "Spelar som" vs råa GPS-mått */
  #modeToggle { display:flex; gap:4px; width:max-content; margin:0 auto 6px;
    background:var(--card)ee; border:1px solid var(--line); border-radius:12px; padding:3px; }
  #modeToggle button { background:none; border:0; color:var(--dim);
    font-size:13px; font-weight:700; padding:6px 16px; border-radius:9px; }
  #modeToggle button.on { background:#1a4c38; color:var(--ink); }
  .row { display:flex; gap:6px; margin-top:6px; }
  .row a, .row button { flex:1; text-align:center; text-decoration:none; background:var(--card);
    color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:8px 4px;
    font-size:13px; font-weight:600; white-space:nowrap; }
  .gpsdot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#e26a5a; }
  .gpsdot.ok { background:var(--accent); }
  .hint { color:var(--dim); font-size:12px; text-align:center; margin-top:6px; }
</style>
</head>
<body>
<div id="map"></div>

<div id="top">
  <div class="holebar">
    <div class="name" id="holeName">Söker hål …</div>
  </div>
  <div id="windrow">
    <div id="wind"><div id="windTxt"><span class="sub">vind …</span></div></div>
    <svg id="rose" viewBox="0 0 64 64" width="76" height="76">
      <g id="roseRing">
        <circle cx="32" cy="32" r="29" fill="none" stroke="var(--dim)" stroke-width="2" opacity=".7"/>
        <text x="32" y="13" text-anchor="middle" font-size="11" font-weight="700" fill="var(--ink)">N</text>
        <circle cx="55" cy="32" r="1.5" fill="var(--dim)"/>
        <circle cx="32" cy="55" r="1.5" fill="var(--dim)"/>
        <circle cx="9"  cy="32" r="1.5" fill="var(--dim)"/>
      </g>
      <g id="roseArrow" visibility="hidden">
        <path d="M32 4 L32 20 M27 15 L32 21 L37 15" fill="none"
              stroke="#e23b3b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text id="roseMs" x="32" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="var(--ink)">–</text>
      <text id="roseGust" x="32" y="47" text-anchor="middle" font-size="10" font-weight="600" fill="var(--ink)"></text>
    </svg>
  </div>
</div>

<div id="bottom">
  <div id="modeToggle">
    <button data-mode="play">Spelar som</button>
    <button data-mode="gps">GPS</button>
  </div>
  <div id="measure" class="hidden">
    <div class="play" id="mPlay">–</div>
    <div class="sub" id="mSub">–</div>
  </div>
  <div class="hint"><span class="gpsdot" id="gdot"></span> <span id="gtxt">GPS söker …</span>
    · tryck på kartan för att mäta</div>
</div>

<nav class="tabs">
  <a href="./index.html"><span class="ico">⛳</span>Logga slag</a>
  <a href="./karta.html" class="active"><span class="ico">🗺</span>Karta</a>
  <a href="./oversikt.html"><span class="ico">📋</span>Översikt</a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
<script src="./coursemap.js"></script>
<script src="./round.js"></script>
<script>
"use strict";
const R = 6371000;
const rad = d => d * Math.PI / 180;
function hav(a, b) {              // [lat,lon] par → meter
  const dphi = rad(b[0]-a[0]), dl = rad(b[1]-a[1]);
  const s = Math.sin(dphi/2)**2 + Math.cos(rad(a[0]))*Math.cos(rad(b[0]))*Math.sin(dl/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
const SS = CourseMap.SURFACE_STYLE;

// Numrering/rundsekvenser delas via round.js (SGRound). UI:t visar spelarens
// hålnummer (1–18 = position i vald runda) och par; banans globala nummer
// används bara internt för att slå upp håldata.
const { GLOBAL_BASE } = SGRound;

let HOLES = [], byGlobal = {}, ROUND = [], roundName = "1-18";
let hi = 0, pos = null;
// "play" = Spelar som (vind + slope), "gps" = råa GPS-mått. Alltid synlig toggle.
let mode = "play";
try { mode = localStorage.getItem("sg_map_mode") || "play"; } catch (e) {}
function setMode(m) {
  mode = m;
  try { localStorage.setItem("sg_map_mode", m); } catch (e) {}
  for (const b of document.querySelectorAll("#modeToggle button"))
    b.classList.toggle("on", b.dataset.mode === m);
  updateWind();
  if (tapMarker) updateTap(tapMarker.getLatLng());
}

function setRound(name) {
  roundName = name;
  const sel = document.getElementById("roundSel");
  if (sel && sel.value !== name) sel.value = name;
  ROUND = SGRound.ROUND_SEQ[name].map(g => byGlobal[g]).filter(Boolean);
  hi = 0;
  syncHole();
}
let map, layers = L.layerGroup(), meMarker = null, tapMarker = null, tapLine = null;

function fmt(m) { return m == null ? "–" : Math.round(m); }

// ---- vind (Open-Meteo, gratis; samma konvention som src/api/wind.py) ----
const COMPASS = ["N", "NO", "O", "SO", "S", "SV", "V", "NV"];
const compass = deg => deg == null ? "" : COMPASS[Math.round(deg / 45) % 8];
function bearing(a, b) {                    // [lat,lon] → grader 0=N,90=Ö
  const p1 = rad(a[0]), p2 = rad(b[0]), dl = rad(b[1] - a[1]);
  const y = Math.sin(dl) * Math.cos(p2);
  const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
function relWind(shotBearing, ms, dirDeg) {  // vinden kommer FRÅN dirDeg
  const d = rad(dirDeg - shotBearing);
  const along = -ms * Math.cos(d), right = -ms * Math.sin(d);
  return { along, cross: Math.abs(right), side: Math.abs(right) < 0.3 ? null : (right > 0 ? "H" : "V"),
           label: along >= 0 ? "medvind" : "motvind" };
}

// "Spelar som" — samma modell som planner.wind_along_shift (håll dem i synk):
// motvind PROGRESSIV (lin + kvadrat — mer luftfart → mer lyft/drag, bollen
// ballongar), medvind linjär. TrackMan-kalibrerad vid 230 m, skalas med avståndet.
const WIND_HEAD_LIN = 2.0, WIND_HEAD_QUAD = 0.15, WIND_TAIL = 1.6, WIND_REF = 230;
const GUST_SPAN_MIN_M = 3;   // visa spann först när byn flyttar ≥ så här många m
function windAlongShift(alongMs, shotLen) {  // + = bollen flyger längre
  const sc = shotLen / WIND_REF;
  if (alongMs >= 0) return WIND_TAIL * alongMs * sc;
  const w = -alongMs;
  return -(WIND_HEAD_LIN * w + WIND_HEAD_QUAD * w * w) * sc;
}

let WIND = null;   // {ms, dir, gust}
async function fetchWind() {
  const loc = pos || (ROUND[hi] && ROUND[hi].green_center) || [55.618, 13.07];
  try {
    const u = `https://api.open-meteo.com/v1/forecast?latitude=${loc[0]}&longitude=${loc[1]}`
      + `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=ms`;
    const c = (await (await fetch(u)).json()).current;
    WIND = { ms: c.wind_speed_10m, dir: c.wind_direction_10m, gust: c.wind_gusts_10m };
  } catch (e) { WIND = null; }
  updateWind();
}
// spelarens höjd (Open-Meteo Elevation, strypt till rörelse >25 m)
let PLAYER_ELEV = null, elevAt = null;
async function fetchPlayerElev() {
  if (!pos || (elevAt && hav(pos, elevAt) < 25)) return;
  elevAt = pos;
  try {
    const e = (await (await fetch(
      `https://api.open-meteo.com/v1/elevation?latitude=${pos[0]}&longitude=${pos[1]}`)).json()).elevation;
    PLAYER_ELEV = Array.isArray(e) ? e[0] : e;
  } catch (err) { PLAYER_ELEV = null; }
  updateWind();
}

// "spelas som"-avstånd till en punkt: geometriskt + vind (range medelvind–by) + ev. slope.
// Returnerar null om vind eller position saknas. Byn antas komma från samma håll som
// medelvinden → along skalas med gust/medel.
function playAsRange(target, slope) {
  if (!pos || !WIND) return null;
  const D = hav(pos, target);
  const rw = relWind(bearing(pos, target), WIND.ms, WIND.dir);
  const windShift = -windAlongShift(rw.along, D);
  const gustAlong = (WIND.gust != null && WIND.ms > 0) ? rw.along * WIND.gust / WIND.ms : rw.along;
  const gustShift = -windAlongShift(gustAlong, D);
  slope = slope || 0;
  return { mean: Math.round(D + windShift + slope), gust: Math.round(D + gustShift + slope),
           along: rw.along, label: rw.label, side: rw.side, cross: rw.cross };
}

// kompassrosen: N-ringen roterar med kartan (norr pekar alltid åt rätt håll på
// skärmen), pilen pekar dit vinden blåser (kommer FRÅN motsatt kant).
function updateRose() {
  const mb = map ? map.getBearing() : 0;
  document.getElementById("roseRing").style.transform = `rotate(${mb}deg)`;
  const arrow = document.getElementById("roseArrow");
  const ms = document.getElementById("roseMs"), gu = document.getElementById("roseGust");
  if (!WIND) { arrow.setAttribute("visibility", "hidden"); ms.textContent = "–"; gu.textContent = ""; return; }
  arrow.setAttribute("visibility", "visible");
  arrow.style.transform = `rotate(${WIND.dir + mb}deg)`;
  ms.textContent = Math.round(WIND.ms);
  gu.textContent = WIND.gust != null ? `by ${Math.round(WIND.gust)}` : "";
}

function updateWind() {
  updateRose();
  const el = document.getElementById("windTxt");
  // GPS-läge: rått avstånd till green, oberoende av vinddata
  if (mode === "gps" && pos && ROUND[hi]) {
    el.innerHTML = `<div class="play"><b>${Math.round(hav(pos, ROUND[hi].green_center))} m</b>`
      + ` <span class="by">till green</span></div>`;
    return;
  }
  if (!WIND) { el.innerHTML = `<span class="sub">vind ej tillgänglig</span>`; return; }
  if (!pos || !ROUND[hi]) {
    el.innerHTML = `<div class="play"><b>${WIND.ms.toFixed(0)} m/s</b> från ${compass(WIND.dir)}</div>`
      + (WIND.gust != null ? `<div class="sub">byar ${WIND.gust.toFixed(0)} m/s</div>` : "");
    return;
  }
  const h = ROUND[hi];
  const D = hav(pos, h.green_center);
  const rw = relWind(bearing(pos, h.green_center), WIND.ms, WIND.dir);
  // + = spelar LÄNGRE (motsatt tecken mot flygskiftet). Byn antas komma
  // från samma håll som medelvinden → along skalas med gust/medel.
  const windShift = -windAlongShift(rw.along, D);
  const gustAlong = (WIND.gust != null && WIND.ms > 0)
    ? rw.along * WIND.gust / WIND.ms : rw.along;
  const gustShift = -windAlongShift(gustAlong, D);
  const slope = (h.green_elev_m != null && PLAYER_ELEV != null)
    ? h.green_elev_m - PLAYER_ELEV : 0;      // uppför positiv, bakas in tyst
  const pMean = Math.round(D + windShift + slope);
  const pGust = Math.round(D + gustShift + slope);
  let s = `<div class="play">Spelar som <b>${pMean} m</b>`;
  if (Math.abs(pGust - pMean) >= GUST_SPAN_MIN_M) s += ` <span class="by">· i by ${pGust}</span>`;
  s += `</div>`;
  el.innerHTML = s;
}

// riktning tee→green för hålet (grader 0=N), null om data saknas
function holeHeading(h) {
  const a = (h.line && h.line.length > 1) ? h.line[0]
    : (h.tees && h.tees.length) ? [h.tees[0].lat, h.tees[0].lon] : null;
  const b = h.green_center || h.pin;
  return (a && b) ? bearing(a, b) : null;
}
function orientToHole() {
  const h = ROUND[hi];
  const hd = h ? holeHeading(h) : null;
  if (hd != null) map.setBearing(-hd);   // negativt = riktningen pekar uppåt
}

function drawHole() {
  layers.clearLayers();
  const h = ROUND[hi];
  if (!h) return;
  document.getElementById("holeName").innerHTML =
    `Hål ${hi + 1} <small>Par ${h.par ?? "–"}</small>`;

  // hål-linje
  if (h.line && h.line.length > 1)
    L.polyline(h.line, { color: "#e8f5ec", weight: 2, dashArray: "5,6", opacity: .7 }).addTo(layers);
  // hinder
  for (const hz of h.hazards || []) {
    const st = hz.type === "water" ? SS.water_hazard : SS.bunker;
    L.polygon(hz.poly, { color: st.color, weight: 1, fillColor: st.fill, fillOpacity: .5, interactive: false }).addTo(layers);
  }
  // green
  if (h.green && h.green.length)
    L.polygon(h.green, { color: SS.green.color, weight: 2, fillColor: SS.green.fill, fillOpacity: .45, interactive: false }).addTo(layers);
  // pin
  L.circleMarker(h.pin, { radius: 4, color: "#fff", fillColor: "#e8c34a", fillOpacity: 1, weight: 1 }).addTo(layers);

  // rotera så hålet pekar uppåt, passa sedan vyn (green + tees + linje)
  orientToHole();
  const pts = [...(h.green||[]), h.pin, ...(h.tees||[]).map(t => [t.lat, t.lon]), ...(h.line||[])];
  if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.15));
  clearTap();
  updateWind();
}

function setPos(lat, lon, acc) {
  pos = [lat, lon];
  const g = document.getElementById("gdot"), t = document.getElementById("gtxt");
  g.className = "gpsdot" + (acc <= 15 ? " ok" : "");
  t.textContent = `GPS ±${Math.round(acc)} m`;
  if (!meMarker) meMarker = L.circleMarker(pos, { radius: 7, color: "#fff", weight: 2, fillColor: "#3b82f6", fillOpacity: 1 }).addTo(map);
  else meMarker.setLatLng(pos);
  updateWind();
  fetchPlayerElev();
  if (tapMarker) updateTap(tapMarker.getLatLng());
}

// Hålet styrs helt av rundloggen via localStorage-nyckeln sg_hole (spelarens
// hål 1–18, dvs. positionen i vald runda): kartan visar alltid samma hål som
// score-sidan — inget GPS-gissande och inget hålbyte här. Byt hål från
// "Logga slag".
function syncHole() {
  const rel = SGRound.migrateSgHole();   // konverterar ev. gammalt globalt värde
  if (rel >= 1 && rel <= ROUND.length) hi = rel - 1;
  drawHole();
}

function clearTap() {
  if (tapMarker) { map.removeLayer(tapMarker); tapMarker = null; }
  if (tapLine) { map.removeLayer(tapLine); tapLine = null; }
  document.getElementById("measure").classList.add("hidden");
}
function updateTap(latlng) {
  const target = [latlng.lat, latlng.lng];
  document.getElementById("measure").classList.remove("hidden");
  const rem = fmt(hav(target, ROUND[hi].green_center));
  const pa = playAsRange(target, 0);   // vind (medel + by); slope okänd för fri punkt
  if (mode === "play" && pa) {
    let s = `Spelar som <b>${pa.mean} m</b>`;
    if (Math.abs(pa.gust - pa.mean) >= GUST_SPAN_MIN_M) s += ` <span class="by">· i by ${pa.gust}</span>`;
    document.getElementById("mPlay").innerHTML = s;
    document.getElementById("mSub").textContent = `${rem} m kvar`;
  } else {
    document.getElementById("mPlay").innerHTML =
      pos ? `<b>${fmt(hav(pos, target))} m</b>` : "–";
    document.getElementById("mSub").textContent = `${rem} m kvar`;
  }
  if (tapLine) map.removeLayer(tapLine);
  if (pos) tapLine = L.polyline([pos, target], { color: "#fff", weight: 2, dashArray: "3,5" }).addTo(map);
}
function onTap(e) {
  if (tapMarker) tapMarker.setLatLng(e.latlng);
  else tapMarker = L.marker(e.latlng).addTo(map);
  updateTap(e.latlng);
}

async function init() {
  map = L.map("map", { zoomControl: false, attributionControl: false,
    rotate: true, touchRotate: true, shiftKeyRotate: true, rotateControl: false });
  CourseMap.esriLayer().addTo(map);
  layers.addTo(map);
  map.setView([55.618, 13.07], 15);
  map.on("click", onTap);
  map.on("rotate", updateRose);   // rosen följer kartans rotation
  for (const b of document.querySelectorAll("#modeToggle button"))
    b.onclick = () => setMode(b.dataset.mode);
  setMode(mode);   // sätter aktiv knapp + första renderingen
  const rs = document.getElementById("roundSel");
  if (rs) rs.onchange = e => setRound(e.target.value);

  try {
    const data = await (await fetch("./data/burlov.json", { cache: "no-cache" })).json();
    HOLES = data.holes;
    for (const h of HOLES) { h.global = GLOBAL_BASE[h.loop] + h.hole; byGlobal[h.global] = h; }
    setRound(SGRound.roundName());   // val från startsidan
    // om man byter hål i rundloggen och kommer tillbaka hit: synka igen
    window.addEventListener("pageshow", syncHole);
    document.addEventListener("visibilitychange", () => { if (!document.hidden) syncHole(); });
    window.addEventListener("storage", e => { if (e.key === "sg_hole") syncHole(); });
    fetchWind();                                   // aktuell vind (Open-Meteo)
    setInterval(fetchWind, 5 * 60 * 1000);         // uppdatera var 5:e min
  } catch (e) {
    document.getElementById("holeName").textContent = "Kunde ej ladda bandata";
    return;
  }
  if ("geolocation" in navigator)
    navigator.geolocation.watchPosition(
      p => setPos(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
      () => {}, { enableHighAccuracy: true, maximumAge: 0 });
}
init();
</script>
<script>
/* Håll navigeringen inne i hemskärms-appen (iOS standalone): utan detta öppnar
   iOS länkar till andra sidor i en Safari-ruta (kryss + adressfält uppe, ladda
   om/tillbaka nere). Vi fångar interna länkklick och navigerar via location,
   vilket behåller helskärmsläget. Ingen effekt i vanlig webbläsare. */
(function () {
  var standalone = ("standalone" in navigator && navigator.standalone)
    || matchMedia("(display-mode: standalone)").matches;
  if (!standalone) return;
  document.addEventListener("click", function (e) {
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
    var url = new URL(a.getAttribute("href"), location.href);
    if (url.origin !== location.origin) return;
    e.preventDefault();
    location.href = url.href;
  });
})();
</script>
</body>
