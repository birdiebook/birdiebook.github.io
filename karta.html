<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hålkarta">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="./boot.js"></script>
<title>SG Hålkarta</title>
<link rel="stylesheet" href="./vendor/leaflet.css">
<style>
  :root { --bg:#0c2e22; --card:#123c2d; --ink:#e8f5ec; --dim:#9fc4ae;
          --line:#1f5540; --accent:#37b06b; --accent-ink:#06180f; --water:#4aa6e0;
          --danger:#e23b3b; --holeout:#d99a2b;
          /* halvgenomskinlig svart bakom text i inramningarna (hål, avstånd, mät) —
             syns tydligare mot kartan än den gröna varianten */
          --framebg: rgba(0,0,0,.55);
          /* hemskärm: skjut nedre overlays ner i den återtagna iOS-zonen under
             app-viewporten. 0 i webbläsare; sätts negativt i @media standalone. */
          --reclaim: 0px; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  /* Helskärmskarta: body fyller layout-viewporten (i hemskärmsläge mappas den till
     hela fysiska skärmen; i webbläsaren till ytan mellan verktygsfälten). ALLA
     overlays är position:fixed → de ankras mot den SYNLIGA viewporten precis som
     flikraden på index/oversikt, så de hamnar rätt i båda lägena. (Att ankra mot en
     egen px-höjd body sköt ut flikraden utanför den synliga ytan i standalone.) */
  html, body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif; overflow:hidden;
    overscroll-behavior:none; }
  #map { position:absolute; top:0; left:0; right:0; bottom:var(--reclaim);
    background:var(--bg); }
  .leaflet-container { background:var(--bg); }

  /* topp: hål-väljare + green-avstånd */
  #top { position:absolute; top:0; left:0; right:0; z-index:1000;
    padding:env(safe-area-inset-top) 10px 8px; }
  /* toppraden: toggle vänster · hål mitten · kompass höger — space-between så
     de aldrig överlappar oavsett skärmbredd */
  .holebar { display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .holebar .name { flex:0 1 auto; text-align:center; font-weight:700; font-size:16px;
    background:var(--framebg); border:1px solid var(--line); border-radius:12px;
    padding:7px 12px; box-shadow:0 2px 8px #0007; }
  .holebar .name small { display:block; color:var(--dim); font-weight:400; font-size:12px; }
  #windrow { margin-top:4px; display:flex; align-items:center; gap:10px; }
  #wind { flex:0 0 auto; width:max-content; max-width:100%; background:var(--framebg); border:1px solid var(--line);
    border-radius:12px; padding:8px 20px; box-shadow:0 2px 8px #0007; }
  #windTxt { min-width:0; text-align:left; }
  #windTxt .play { font-size:18px; }
  #windTxt .play b { font-size:22px; color:var(--ink); }
  #windTxt .gust { display:block; color:var(--ink); font-size:14px; margin-top:1px; }
  #windTxt .sub { color:var(--dim); font-size:12px; margin-top:2px; }
  /* tre stackade green-avstånd: bakkant (överst) · centrum (fetstil) · framkant */
  #windTxt .gd { display:flex; flex-direction:column; line-height:1.1; }
  #windTxt .gd-edge { font-size:15px; color:var(--dim); }
  #windTxt .gd-mid b { font-size:22px; color:var(--ink); }
  #rose { flex:0 0 auto; filter:drop-shadow(0 2px 5px #00000099); }
  #rose g { transition:transform .4s; transform-origin:32px 32px; transform-box:view-box; }

  /* botten: tap-mät + status */
  /* Sitt direkt ovanför flikraden: SAMMA bas som .tabs (var(--reclaim)) + flikhöjd,
     UTAN egen safe-area-term. .tabs räknar medvetet inte safe-area, så när #bottom
     gjorde det (env(safe-area-inset-bottom) ~34 px i vanlig browser) flöt GPS-raden
     upp och lämnade tomrum mot fliken. Bort med den → raden ligger tätt, och
     playBand()-bandet (mäter #bottom .hint) växer nedåt → mindre utzoomad follow-vy. */
  #bottom { position:absolute; left:0; right:0; z-index:1000;
    bottom:calc(var(--reclaim) + 62px);
    padding:8px 10px; }
  /* gemensam flik-rad (samma på alla sidor) */
  /* Flikraden fixed mot viewportens nederkant (= fysiska nederkanten i standalone,
     ovanför webbläsarens verktygsfält i vanlig browser). Minimal bottenpadding →
     minimal grön remsa. OBS: utan safe-area-marginal hamnar etiketterna nära
     home-indikatorn i hemskärmsläget (avsiktligt val — minimal grön yta). */
  .tabs { position:fixed; left:0; right:0; bottom:var(--reclaim); z-index:1200; display:flex; gap:6px;
    background:var(--card); border-top:1px solid var(--line);
    padding:6px 10px 8px; }
  .tabs a { flex:1; text-align:center; text-decoration:none; color:var(--dim);
    font-size:12px; font-weight:600; padding:5px 0 3px; border-radius:10px; }
  .tabs a .ico { display:block; font-size:20px; }
  .tabs a.active { color:var(--ink); background:#1a4c38; }
  /* mått till vald position: förankrad uppe till höger, precis under kompassen */
  #measure { position:fixed; z-index:1000;
    right:calc(env(safe-area-inset-right) + 10px);
    top:calc(env(safe-area-inset-top) + 86px);
    background:var(--framebg); border:1px solid var(--line); border-radius:12px;
    padding:8px 20px; min-height:44px; text-align:right; width:max-content; max-width:62vw; }
  #measure .play { font-size:18px; }
  #measure .play b { font-size:22px; color:var(--ink); }
  #measure .sub { display:block; color:var(--ink); font-size:15px; margin-top:2px; }
  #measure.hidden { display:none; }
  /* lägesväljare: alltid synlig, "Spelar som" vs råa GPS-mått. Ligger i
     toppraden längst till vänster (kompakt så den ryms bredvid hål-rutan). */
  #modeToggle { flex:0 0 auto; display:flex; gap:3px;
    background:var(--card)ee; border:1px solid var(--line); border-radius:12px; padding:3px; }
  #modeToggle button { background:none; border:0; color:var(--dim);
    font-size:12px; font-weight:700; padding:6px 9px; border-radius:9px; }
  #modeToggle button.on { background:#1a4c38; color:var(--ink); }
  /* Auto-zoom-kill-switchen bor på Logga slag-sidan (index.html), inte på kartan.
     karta.html läser bara sg_autozoom ur localStorage vid laddning (se AZ_KEY). */
  .row { display:flex; gap:6px; margin-top:6px; }
  .row a, .row button { flex:1; text-align:center; text-decoration:none; background:var(--card);
    color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:8px 4px;
    font-size:13px; font-weight:600; white-space:nowrap; }
  /* siffra centrerad i slag-punkten (reggade slag ur rundloggen) — genomskinlig
     etikett utan Leaflets vita ruta */
  .shotlbl { background:transparent; border:0; box-shadow:none; padding:0;
    color:#06180f; font-weight:800; font-size:11px; }
  .shotlbl::before { display:none; }
  /* mät-pin: strippa Leaflets vita divIcon-ruta, bara SVG:n syns */
  .tappin { background:transparent; border:0; filter:drop-shadow(0 1px 2px #0009); }
  .gpsdot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#e26a5a; }
  .gpsdot.ok { background:var(--accent); }
  .hint { color:var(--dim); font-size:12px; text-align:center; margin-top:6px; }
  /* rund "Logga slag"-knapp nere till vänster — samma inramning som mått-rutorna:
     tunn mörkgrön ring, halvgenomskinlig svart bakgrund, grön text (--accent,
     samma gröna som GPS-prickens ok-läge). */
  #logfab { position:fixed; z-index:1300; -webkit-appearance:none; appearance:none;
    cursor:pointer; font-family:inherit;
    right:calc(env(safe-area-inset-right) + 14px);
    bottom:calc(env(safe-area-inset-bottom) + 285px + var(--reclaim));   /* överst; ovankant i höjd med putt-plusset */
    width:66px; height:66px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--accent); font-weight:800; font-size:13px; line-height:1.15; text-align:center;
    border:1px solid var(--accent); box-shadow:0 2px 8px #0007;
    background:rgba(0,0,0,.72); }   /* samma svart/grön-stil som "Boll på green" oreggad */
  #logfab:active { transform:scale(.94); }
  #logfab.busy { opacity:.5; pointer-events:none; }
  /* runda "Boll på green"- och "Pin"-knappar, staplade ovanför Logga slag.
     Samma inramning/halvgenomskinliga stil som logfab men mindre diameter och
     färgsatta som respektive toggle på Logga slag-sidan (green=accent, pin=danger).
     Centrerade i samma kolumn som logfab (logfab: left 14 + bredd 66 → centrum 47;
     dessa: bredd 54 → left 20 ger samma centrum). */
  #greenfab, #pinfab, #holeoutfab { position:fixed; z-index:1300; -webkit-appearance:none; appearance:none;
    cursor:pointer; font-family:inherit;
    right:calc(env(safe-area-inset-right) + 20px);
    width:54px; height:54px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-weight:800; font-size:10px; line-height:1.1; text-align:center;
    border:1px solid; box-shadow:0 2px 8px #0007;
    background:rgba(0,0,0,.72); }   /* oreggad: svart botten, färgad text/ring */
  /* "Hål ut" nederst i högerkolumnen (under pin), samma 64px-steg som green→pin.
     Dov orange/gul (--holeout). Ren klar-flagga — påverkar inte scoren. */
  #holeoutfab { bottom:calc(env(safe-area-inset-bottom) + 93px + var(--reclaim)); color:var(--holeout); border-color:var(--holeout); }
  #pinfab   { bottom:calc(env(safe-area-inset-bottom) + 157px + var(--reclaim)); color:var(--danger); border-color:var(--danger); }
  #greenfab { bottom:calc(env(safe-area-inset-bottom) + 221px + var(--reclaim)); color:var(--accent); border-color:var(--accent); }
  #greenfab:active, #pinfab:active, #holeoutfab:active { transform:scale(.94); }
  #greenfab.busy, #pinfab.busy { opacity:.5; pointer-events:none; }
  /* reggad: fylld färg (lätt genomskinlig) med svart text */
  #greenfab.on { background:rgba(55,176,107,.85); color:var(--accent-ink); border-color:var(--accent); }
  #pinfab.on   { background:rgba(226,59,59,.85); color:#1a0606; border-color:var(--danger); }
  #holeoutfab.on { background:rgba(217,154,43,.85); color:#1a1204; border-color:var(--holeout); }
  /* score-räknare nere till höger: total slag för aktuellt hål i en rund ruta
     (grön ring, halvgenomskinlig svart, vit text — som green-måtten), med +
     ovanför och − under för att justera scoren. */
  #scorefab { position:fixed; z-index:1300;
    left:calc(env(safe-area-inset-left) + 14px);
    bottom:calc(env(safe-area-inset-bottom) + 107px + var(--reclaim));
    display:flex; flex-direction:column; align-items:center; gap:8px; }
  #scorefab .sc-btn { -webkit-appearance:none; appearance:none; cursor:pointer;
    font-family:inherit; width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:800; line-height:1; color:var(--accent);
    border:1px solid var(--accent); box-shadow:0 2px 8px #0007; background:var(--framebg); }
  #scorefab .sc-btn:active { transform:scale(.94); }
  #scorefab .sc-btn:disabled { opacity:.4; }
  #scorefab .sc-count { width:66px; height:66px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--ink); border:1px solid var(--accent); box-shadow:0 2px 8px #0007;
    background:var(--framebg); }
  #scorefab .sc-count .val { font-size:26px; font-weight:800; line-height:1; }
  #scorefab .sc-count .lbl { font-size:10px; font-weight:700; color:var(--dim); margin-top:2px; }

  /* Hemskärm: återta iOS-zonen under app-viewporten (~47 px). 100lvh = stora
     viewporten (hela fysiska skärmen); 100% för fixed/absolut = layout-viewporten.
     Den negativa skillnaden (--reclaim) skjuter kartans nederkant, flikraden och
     alla nedre overlays ner till fysiska kanten, och fitHoleView får automatiskt
     mer höjd (den mäter #bottom:s faktiska läge). Skalar per enhet. Safari (ej
     standalone) → --reclaim:0px, helt oförändrat. */
  /* @supports-grind: applicera bara om 100lvh stöds (iOS 16.4+). Saknas stödet
     lämnas --reclaim på 0px (fail-safe) — annars skulle ett ogiltigt calc göra
     bottom-värdet ogiltigt och overlays tappa sin förankring. */
  @supports (height: 100lvh) {
    @media (display-mode: standalone) {
      :root { --reclaim: calc(100% - 100lvh); }
    }
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="top">
  <div class="holebar">
    <div id="modeToggle">
      <button data-mode="play">Spelar som</button>
      <button data-mode="gps">GPS</button>
    </div>
    <div class="name" id="holeName">Söker hål …</div>
    <svg id="rose" viewBox="0 0 64 64" width="82" height="82">
      <g id="roseRing">
        <circle cx="32" cy="32" r="29" fill="rgba(0,0,0,.55)" stroke="#1f5540" stroke-width="2"/>
        <text x="32" y="13" text-anchor="middle" font-size="11" font-weight="700" fill="#e8f5ec">N</text>
        <circle cx="55" cy="32" r="1.5" fill="#9fc4ae"/>
        <circle cx="32" cy="55" r="1.5" fill="#9fc4ae"/>
        <circle cx="9"  cy="32" r="1.5" fill="#9fc4ae"/>
      </g>
      <g id="roseArrow" visibility="hidden">
        <path d="M32 4 L32 20 M27 15 L32 21 L37 15" fill="none"
              stroke="#e23b3b" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
      </g>
      <text id="roseMs" x="32" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#e8f5ec">–</text>
      <text id="roseGust" x="32" y="47" text-anchor="middle" font-size="10" font-weight="600" fill="#e8f5ec"></text>
    </svg>
  </div>
  <div id="windrow">
    <div id="wind"><div id="windTxt"><span class="sub">vind …</span></div></div>
  </div>
</div>

<!-- mått till vald punkt: position:fixed (uppe till höger under kompassen).
     Ligger som eget element (ej i #bottom) för tydlighetens skull. -->
<div id="measure" class="hidden">
  <div class="play" id="mPlay">–</div>
  <div class="sub" id="mSub">–</div>
</div>

<div id="bottom">
  <div class="hint"><span class="gpsdot" id="gdot"></span> <span id="gtxt">GPS söker …</span>
    · tryck på kartan för att mäta</div>
</div>

<button type="button" id="greenfab">Boll på<br>green</button>
<button type="button" id="pinfab">Markera<br>pin</button>
<button type="button" id="holeoutfab">Hål<br>ut</button>
<button type="button" id="logfab">Logga<br>slag</button>

<div id="scorefab">
  <button type="button" class="sc-btn" id="puttUp" aria-label="Öka puttar">+</button>
  <div class="sc-count"><span class="val" id="puttVal">0</span><span class="lbl">putt</span></div>
  <button type="button" class="sc-btn" id="puttDn" aria-label="Minska puttar">−</button>
  <div class="sc-count"><span class="val" id="scoreVal">0</span><span class="lbl">score</span></div>
</div>

<nav class="tabs">
  <a href="./index.html"><span class="ico">⛳</span>Logga slag</a>
  <a href="./karta.html" class="active"><span class="ico">🗺</span>Karta</a>
  <a href="./oversikt.html"><span class="ico">📋</span>Översikt</a>
</nav>

<script src="./vendor/leaflet.js"></script>
<script src="./vendor/leaflet-rotate.js"></script>
<script src="./coursemap.js"></script>
<script src="./mapcore.js"></script>
<script src="./round.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./live.js"></script>
<script>
"use strict";
// Geometri-helpers bor i mapcore.js (MapCore.rad/hav/bearing) — aliasas här så
// alla befintliga anrop (hav(...)/rad(...)/bearing(...)) fungerar oförändrat.
const rad = MapCore.rad, hav = MapCore.hav;
const SS = CourseMap.SURFACE_STYLE;

// Numrering/rundsekvenser delas via round.js (SGRound). UI:t visar spelarens
// hålnummer (1–18 = position i vald runda) och par; banans globala nummer
// används bara internt för att slå upp håldata.
const { GLOBAL_BASE } = SGRound;

let HOLES = [], byGlobal = {}, ROUND = [], roundName = "1-18";
let hi = 0, pos = null, lastAcc = null;
// "play" = Spelar som (vind + slope), "gps" = råa GPS-mått. Alltid synlig toggle.
let mode = "play";
try { mode = localStorage.getItem("sg_map_mode") || "play"; } catch (e) {}
function setMode(m) {
  mode = m;
  try { localStorage.setItem("sg_map_mode", m); } catch (e) {}
  for (const b of document.querySelectorAll("#modeToggle button"))
    b.classList.toggle("on", b.dataset.mode === m);
  updateWind();
  if (tapMarker) updateTap(tapMarker.getLatLng());
}

function setRound(name) {
  roundName = name;
  const sel = document.getElementById("roundSel");
  if (sel && sel.value !== name) sel.value = name;
  ROUND = SGRound.ROUND_SEQ[name].map(g => byGlobal[g]).filter(Boolean);
  hi = 0;
  syncHole();
}
let map, layers = L.layerGroup(), shotLayer = L.layerGroup(), pinLayer = L.layerGroup(),
    meMarker = null, tapMarker = null, tapLine = null;
// delad pin per matchhål (globalt hålnr → {lat,lon,acc}), fylls av live-prenumeration
let SHARED_PINS = {}, pinUnsub = null;

function fmt(m) { return m == null ? "–" : Math.round(m); }

// accColor (GPS-precisionsfärg) bor i mapcore.js och används av MapCore.drawShots.

// ---- vind (Open-Meteo, gratis; samma konvention som src/api/wind.py) ----
const COMPASS = ["N", "NO", "O", "SO", "S", "SV", "V", "NV"];
const compass = deg => deg == null ? "" : COMPASS[Math.round(deg / 45) % 8];
const bearing = MapCore.bearing;   // [lat,lon]→grader (0=N), bor i mapcore.js
function relWind(shotBearing, ms, dirDeg) {  // vinden kommer FRÅN dirDeg
  const d = rad(dirDeg - shotBearing);
  const along = -ms * Math.cos(d), right = -ms * Math.sin(d);
  return { along, cross: Math.abs(right), side: Math.abs(right) < 0.3 ? null : (right > 0 ? "H" : "V"),
           label: along >= 0 ? "medvind" : "motvind" };
}

// "Spelar som" — samma modell som planner.wind_along_shift (håll dem i synk):
// motvind PROGRESSIV (lin + kvadrat — mer luftfart → mer lyft/drag, bollen
// ballongar), medvind linjär. TrackMan-kalibrerad vid 230 m, skalas med avståndet.
const WIND_HEAD_LIN = 2.0, WIND_HEAD_QUAD = 0.15, WIND_TAIL = 1.6, WIND_REF = 230;
const GUST_SPAN_MIN_M = 3;   // visa spann först när byn flyttar ≥ så här många m
function windAlongShift(alongMs, shotLen) {  // + = bollen flyger längre
  const sc = shotLen / WIND_REF;
  if (alongMs >= 0) return WIND_TAIL * alongMs * sc;
  const w = -alongMs;
  return -(WIND_HEAD_LIN * w + WIND_HEAD_QUAD * w * w) * sc;
}

let WIND = null;   // {ms, dir, gust}
async function fetchWind() {
  const loc = pos || (ROUND[hi] && ROUND[hi].green_center) || [55.618, 13.07];
  try {
    const u = `https://api.open-meteo.com/v1/forecast?latitude=${loc[0]}&longitude=${loc[1]}`
      + `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=ms`;
    const c = (await (await fetch(u)).json()).current;
    WIND = { ms: c.wind_speed_10m, dir: c.wind_direction_10m, gust: c.wind_gusts_10m };
  } catch (e) { WIND = null; }
  updateWind();
}
// spelarens höjd (Open-Meteo Elevation, strypt till rörelse >25 m)
let PLAYER_ELEV = null, elevAt = null;
async function fetchPlayerElev() {
  if (!pos || (elevAt && hav(pos, elevAt) < 25)) return;
  elevAt = pos;
  try {
    const e = (await (await fetch(
      `https://api.open-meteo.com/v1/elevation?latitude=${pos[0]}&longitude=${pos[1]}`)).json()).elevation;
    PLAYER_ELEV = Array.isArray(e) ? e[0] : e;
  } catch (err) { PLAYER_ELEV = null; }
  updateWind();
}

// tee-punkt för ett hål = den tee spelaren valde när rundan startades (sg_tee).
// RIGID mappning: förberäknad punkttabell tee_points.json (tools/build_tee_box.ps1),
// loop→"hål"→{ teeNr: [lat,lon], _approx:[...] }. Offline projiceras varje OSM-box på
// hålets fairway-linje och binds box↔tee rang-bevarande mot scorekortslängderna.
// Tees som OSM saknar box för SYNTETISERAS längs linjen på sin scorekortslängd (så en
// bakre tee startar på rätt avstånd även utan digitaliserad box) — listas i _approx.
// Appen gör bara en O(1)-uppslagning. Fallback när tabellen saknas: fördela numren
// jämnt bakifrån (floor(rang·boxar/4)).
// teePoint/teeIsApprox + tee-tabellen bor i mapcore.js (laddas av loadCourse).
const teePoint = MapCore.teePoint, teeIsApprox = MapCore.teeIsApprox;
// utgångspunkt för alla mått: spelarens GPS-position, men står man >1000 m
// från green (t.ex. hemma/på klubbhuset) mäts från tee istället.
const FAR_FROM_HOLE_M = 1000;
function measureOrigin() {
  const h = ROUND[hi];
  if (h && pos && hav(pos, h.green_center) > FAR_FROM_HOLE_M) {
    const tp = teePoint(h);
    if (tp) return { pt: tp, fromTee: true };
  }
  return { pt: pos, fromTee: false };
}
// "På/nära banan" — samma 1000 m-gräns mot green-centrum som distansmåtten
// (measureOrigin). Auto-zoom-följningen aktiveras bara när detta är sant; står
// man längre bort (hemma/klubbhuset) → statisk overview, ingen inzoom.
function nearHole(pt, h) {
  return !!(pt && h && h.green_center && hav(pt, h.green_center) <= FAR_FROM_HOLE_M);
}

// "spelas som"-avstånd till en punkt: geometriskt + vind (range medelvind–by) + ev. slope.
// Returnerar null om vind eller utgångspunkt saknas. Byn antas komma från samma håll som
// medelvinden → along skalas med gust/medel.
function playAsRange(origin, target, slope) {
  if (!origin || !WIND) return null;
  const D = hav(origin, target);
  const rw = relWind(bearing(origin, target), WIND.ms, WIND.dir);
  const windShift = -windAlongShift(rw.along, D);
  const gustAlong = (WIND.gust != null && WIND.ms > 0) ? rw.along * WIND.gust / WIND.ms : rw.along;
  const gustShift = -windAlongShift(gustAlong, D);
  slope = slope || 0;
  return { mean: Math.round(D + windShift + slope), gust: Math.round(D + gustShift + slope),
           along: rw.along, label: rw.label, side: rw.side, cross: rw.cross };
}

// kompassrosen: N-ringen roterar med kartan (norr pekar alltid åt rätt håll på
// skärmen), pilen pekar dit vinden blåser (kommer FRÅN motsatt kant).
function updateRose() {
  const mb = map ? map.getBearing() : 0;
  document.getElementById("roseRing").style.transform = `rotate(${mb}deg)`;
  const arrow = document.getElementById("roseArrow");
  const ms = document.getElementById("roseMs"), gu = document.getElementById("roseGust");
  if (!WIND) { arrow.setAttribute("visibility", "hidden"); ms.textContent = "–"; gu.textContent = ""; return; }
  arrow.setAttribute("visibility", "visible");
  arrow.style.transform = `rotate(${WIND.dir + mb}deg)`;
  ms.textContent = Math.round(WIND.ms);
  gu.textContent = WIND.gust != null ? `by ${Math.round(WIND.gust)}` : "";
}

// green-polygonens närmaste/bortersta punkt från origin = fram-/bakkant
function greenEdges(origin, h) {
  if (!origin || !h.green || !h.green.length) return null;
  let near = Infinity, far = -Infinity, nearPt = null, farPt = null;
  for (const gp of h.green) {
    const d = hav(origin, gp);
    if (d < near) { near = d; nearPt = gp; }
    if (d > far)  { far = d;  farPt = gp; }
  }
  return { nearPt, farPt };
}
// tre stackade avstånd till green: bakkant (överst) · centrum (fetstil) · framkant.
// distFn(target[lat,lon]) → redan avrundat tal (rått i GPS-läge, spelas-som i play).
function greenDistHtml(origin, h, distFn) {
  const center = distFn(h.green_center);
  const e = greenEdges(origin, h);
  if (!e) return `<div class="play"><b>${center} m</b></div>`;
  return `<div class="gd">`
    + `<span class="gd-edge">${distFn(e.farPt)}</span>`
    + `<span class="gd-mid"><b>${center}</b> m</span>`
    + `<span class="gd-edge">${distFn(e.nearPt)}</span>`
    + `</div>`;
}

function updateWind() {
  updateRose();
  const el = document.getElementById("windTxt");
  const o = measureOrigin();
  // GPS-läge: råa avstånd till green (bakkant/centrum/framkant), oberoende av vind
  if (mode === "gps" && o.pt && ROUND[hi]) {
    el.innerHTML = greenDistHtml(o.pt, ROUND[hi], t => Math.round(hav(o.pt, t)));
    return;
  }
  if (!WIND) { el.innerHTML = `<span class="sub">vind ej tillgänglig</span>`; return; }
  if (!o.pt || !ROUND[hi]) {
    el.innerHTML = `<div class="play"><b>${WIND.ms.toFixed(0)} m/s</b> från ${compass(WIND.dir)}</div>`
      + (WIND.gust != null ? `<div class="sub">byar ${WIND.gust.toFixed(0)} m/s</div>` : "");
    return;
  }
  const h = ROUND[hi];
  // slope bara när måttet utgår från spelaren — spelarens höjd säger inget om tee.
  // uppför positiv, bakas in tyst (samma green-höjd antas för fram-/bakkant).
  const slope = (!o.fromTee && h.green_elev_m != null && PLAYER_ELEV != null)
    ? h.green_elev_m - PLAYER_ELEV : 0;
  // spelas-som per punkt: geometriskt + medelvind + slope (byn/"i by" borttaget)
  const distFn = t => {
    const pa = playAsRange(o.pt, t, slope);
    return pa ? pa.mean : Math.round(hav(o.pt, t) + slope);
  };
  el.innerHTML = greenDistHtml(o.pt, h, distFn);
}

// riktning tee→green för hålet (grader 0=N), null om data saknas
function holeHeading(h) {
  const a = (h.line && h.line.length > 1) ? h.line[0]
    : (h.tees && h.tees.length) ? [h.tees[0].lat, h.tees[0].lon] : null;
  const b = h.green_center || h.pin;
  return (a && b) ? bearing(a, b) : null;
}
function orientToHole() {
  const h = ROUND[hi];
  const hd = h ? holeHeading(h) : null;
  if (hd != null) map.setBearing(-hd);   // negativt = riktningen pekar uppåt
}

// fast startzoom: bakersta teen (61) precis ovanför GPS-raden och greenens
// bortre kant precis under green-måttet, oavsett hål. Räknas exakt (bråkdels-
// zoom + pixeloffset) i stället för fitBounds, som snappar till hela zoomsteg
// och därför blir olika grov beroende på hållängd.
const FIT_GAP_PX = 8;   // luft mellan tee/green och UI-panelerna

// --- Auto-zoom / follow-vy (syntes av AUTO_ZOOM-planerna) --------------------
// Statisk tee→green-vy tills BÅDE nära banan (<1000 m, nearHole) OCH slag 1 är
// loggat — då följer vyn dig → green, zoomar in progressivt med skarp-bild-tak,
// dämpat (ramar om först vid ≥FOLLOW_MOVE_M) och mjukt animerat. Manuell gest
// pausar följningen och den återupptas själv.
const FOLLOW_MOVE_M    = 9;       // ram om först vid så här stor förflyttning (jitter-dämp)
const FOLLOW_PAUSE_MS  = 10000;   // manuell gest pausar följningen så länge
const REFIT_ACC_M      = 25;      // ignorera fixar sämre än så här för inramning
const BOTTOM_MARGIN_FR = 0.12;    // luft under din prick (kontext bakåt), andel av bandet
const NATIVE_MPP       = 0.16;    // ortofotots native m/px → skarp-bild-zoomtak
const MIN_FRAME_M      = 40;      // golv på inramad sträcka (aldrig orimligt nära green)
const ROT_FREEZE_M     = 30;      // follow-rotation fryser inom så här nära green (bäring instabil)
const FOLLOW_ANIM_MS   = 450;     // mjuk follow-övergång via rAF-interpolering (0 = instant)
const FOLLOW_START_M   = 30;      // följningen startar först när man gått så här långt från teet
const GREEN_VIEW_M     = 30;      // inom så här nära green-centrum → lås en fast green-vy
const GREEN_VIEW_PAD_FR= 0.16;    // luft runt greenen i den fasta green-vyn (andel av bandet)
// Mjuk vy-rörelse på/av (default på). ?smooth=0 → instant, för A/B-jämförelse.
const SMOOTH_FOLLOW = new URLSearchParams(location.search).get("smooth") !== "0";
// Auto-zoom master-switch (follow-inramning + pos→green-rotation + mjuk rörelse).
// Av → klassisk statisk tee→green-overview hela hålet. Sparas i localStorage
// (sg_autozoom), togglas på Logga slag-sidan (index.html) — läses här vid laddning.
// ?autozoom=0 = nöd-av för den laddningen.
const AZ_KEY = "sg_autozoom";
let autoZoom = localStorage.getItem(AZ_KEY) !== "off";
if (new URLSearchParams(location.search).get("autozoom") === "0") autoZoom = false;
let followMode = false;           // per-hål latch: overview (false) vs follow (true)
let lastFrameAnchor = null;       // [lat,lon] vid senaste inramning (jitter-dämp)
let manualUntil = 0;              // paus-deadline efter manuell gest
let programmaticMove = false;     // skilj våra egna setView från användargester
let resumeTimer = null;
let animRAF = null;               // pågående follow-animering (rAF-id) eller null
let greenLatched = false;         // fast green-vy låst → ingen follow/zoom mer förrän hålbyte

// Bandet mellan play-panelerna (vindrutan uppe, GPS-raden nere) i #map-pixlar.
function playBand() {
  const mapRect = document.getElementById("map").getBoundingClientRect();
  const topY = document.getElementById("wind").getBoundingClientRect().bottom
    - mapRect.top + FIT_GAP_PX;
  const botY = document.querySelector("#bottom .hint").getBoundingClientRect().top
    - mapRect.top - FIT_GAP_PX;
  return { topY, botY, width: mapRect.width, height: mapRect.height };
}

// Grönpunkten längst från origin (bortre greenkant) — övre ankaret i båda lägen.
function farGreen(origin, h) {
  let farPt = h.green[0], farD = -1;
  for (const gp of h.green) { const d = hav(origin, gp); if (d > farD) { farD = d; farPt = gp; } }
  return farPt;
}

// Har spelaren gått en god bit ut från teet? Följningen startar först då, så
// slag 1 (vid teet) håller kvar overviewen utan död yta bakom teeboxen.
function pastTee(pt, h) {
  const teePt = MapCore.teePoint(h) || (h.line && h.line.length ? h.line[0] : null);
  return !!(teePt && pt && hav(pt, teePt) >= FOLLOW_START_M);
}

// Overview (tee→green) — oförändrad matte, nu via delade playBand/farGreen.
function fitHoleView(h, opts) {
  const teePt = (h.line && h.line.length) ? h.line[0]
    : (h.tees && h.tees.length) ? [h.tees[0].lat, h.tees[0].lon] : null;
  if (!teePt || !h.green || !h.green.length) return false;
  return MapCore.fitBand(map, teePt, farGreen(teePt, h), playBand(), opts);
}

// Skarp-bild-zoomtak: ortofotot är NATIVE_MPP m/px; på retina får varje käll-pixel
// visas som flera skärmpixlar och ändå vara skarp → device-anpassat. Plus ett golv
// (MIN_FRAME_M) så vyn aldrig blir orimligt tight nära green. Aldrig suddigt.
function followZoomCap(lat, availPx) {
  const minMppCss = NATIVE_MPP / (window.devicePixelRatio || 1);
  const zSharp = Math.log2(156543.03392 * Math.cos(rad(lat)) / minMppCss);
  const zFloor = Math.log2(40075016.686 * Math.cos(rad(lat)) * availPx / (256 * MIN_FRAME_M));
  let z = Math.min(zSharp, zFloor);
  if (map.getMaxZoom) z = Math.min(z, map.getMaxZoom());
  return z;
}

// Follow (din pos → green) med skarp-bild-tak + luft bakåt under pricken.
// Greenankaret tas från TEEN (stabilt per hål), inte från din pos — annars kan
// "bortersta greenpunkten" bytas när du går → zoomen rycker ut. Nu står green
// still högst upp och avståndet dig→green krymper monotont → ren progressiv inzoom.
function fitFollowView(opts) {
  const h = ROUND[hi];
  if (!pos || !h || !h.green || !h.green.length) return false;
  const teePt = (h.line && h.line.length) ? h.line[0]
    : (h.tees && h.tees.length) ? [h.tees[0].lat, h.tees[0].lon] : pos;
  const band = playBand();
  band.botY -= Math.round((band.botY - band.topY) * BOTTOM_MARGIN_FR);  // luft bakåt
  const cap = followZoomCap(pos[0], band.botY - band.topY);
  return MapCore.fitBand(map, pos, farGreen(teePt, h), band,
    { maxZoom: cap, animate: opts && opts.animate, duration: 0.6 });
}

// Fast green-vy: när man är uppe vid green ramas HELA greenen in en gång och vyn
// låses. Centrerad på green-centrum med greenens diameter (radie·2 + luft) inpassad
// i bandets MINSTA dimension → hela greenen syns i BÅDA led (viktigt på smal
// telefonskärm, annars klipps green-bredden). Löser "för inzoomad vid green" +
// "vyn korrigerar flytt/zoom på green" — en stilla, fast bild tills hålbyte.
function fitGreenView() {
  const h = ROUND[hi];
  if (!h || !h.green || !h.green.length || !h.green_center) return false;
  const band = playBand();
  const availPx = Math.min(band.width, band.botY - band.topY);
  if (availPx < 50) return false;
  let r = 0;   // radie: green-centrum → bortersta greenpunkt
  for (const gp of h.green) { const d = hav(h.green_center, gp); if (d > r) r = d; }
  const span = Math.max(2 * r * (1 + 2 * GREEN_VIEW_PAD_FR), MIN_FRAME_M);  // diameter + luft, golv
  // Zooma så hela greenen (+ luft) ryms, men ALDRIG bortom skarp-bild-taket
  // (ortofotots 0.16 m/px · devicePixelRatio) → ingen upp-skalning/pixelering. Taket
  // biter bara på liten green/stor skärm (t.ex. desktop dpr 1) och ger då mer marginal.
  let z = Math.log2(40075016.686 * Math.cos(rad(h.green_center[0])) * availPx / (256 * span));
  z = Math.min(z, followZoomCap(h.green_center[0], availPx));
  // centrera green-centrum i bandet (samma rotations-medvetna pixel-offset som fitBand)
  const cy = (band.topY + band.botY) / 2;
  map.setView(h.green_center, z, { animate: false });
  map.setView(map.containerPointToLatLng([band.width / 2, band.height - cy]), z, { animate: false });
  return true;
}

// Lås den fasta green-vyn en gång: hålet uppåt (stabil bäring) + inramning av hela
// greenen. Avbryter ev. pågående follow-animering så rAF:en inte drar vidare. Låser
// bara om inramningen lyckas (annars nytt försök vid nästa GPS-fix).
function enterGreenView() {
  const h = ROUND[hi];
  if (!h) return;
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
  programmaticMove = true;
  try {
    orientToHole();                 // tee→green uppåt = fast, stabil bäring
    if (!fitGreenView()) return;    // kunde ej rama in → lås inte
    greenLatched = true;
  } finally {
    programmaticMove = false;
  }
}

// I follow: rotera så green hamnar rakt upp från DIN position (bättre på doglegs
// än den statiska tee→green-vinkeln som gäller hela hålet i overview). Fryst nära
// green där GPS-bruset annars ger stora bäringskast. setBearing är instant →
// träffar inte leaflet-rotate-animeringsproblemet. Anropas inuti applyFrames
// programmaticMove-guard så rotationen inte misstas för en manuell gest.
function applyFollowBearing(h) {
  const tgt = h.green_center || h.pin;
  if (!tgt || !pos) return;
  if (hav(pos, tgt) < ROT_FREEZE_M) return;   // frys nära green
  map.setBearing(-bearing(pos, tgt));          // green rakt upp från din position
}

// Väljer overview/follow, ramar in, och skyddar våra egna setView från att
// misstas för manuella gester (annars pausar animeringen sig själv).
function applyFrame(opts) {
  const h = ROUND[hi];
  if (!h) return;
  // Mjuk follow-rörelse: animera från nuvarande vy till målvyn (rAF) i stället för
  // instant-hoppet. Bara för follow-omramningarna medan man går (opts.animate).
  if (SMOOTH_FOLLOW && FOLLOW_ANIM_MS > 0 && opts && opts.animate
      && followMode && pos && h.green && h.green.length) { applyFrameSmooth(h); return; }
  // Leaflet fyrar movestart/zoomstart SYNKRONT under setView → sätt guarden runt
  // anropet och släpp den direkt efter. (Timer race:ade med animeringen och
  // feltolkade våra egna rörelser som manuell gest → falsk 10 s-paus.)
  programmaticMove = true;
  try {
    let framed = false;
    if (followMode && pos && h.green && h.green.length) {
      applyFollowBearing(h);   // green rakt upp från din position (fryst nära green)
      framed = fitFollowView(opts);
    }
    if (!framed) framed = fitHoleView(h, opts);
    if (!framed) {
      const pts = [...(h.green || []), h.pin, ...(h.tees || []).map(t => [t.lat, t.lon]), ...(h.line || [])].filter(Boolean);
      if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.15));
    }
  } finally {
    programmaticMove = false;
  }
}

// Mjuk follow-övergång: räkna ut målvyn instant (samma tick → ingen paint),
// återställ startvyn, och interpolera center/zoom/bäring över FOLLOW_ANIM_MS via
// requestAnimationFrame. Många små instant-steg → ser mjukt ut, utan leaflet-
// rotates opålitliga setView-animering.
function applyFrameSmooth(h) {
  const start = { center: map.getCenter(), zoom: map.getZoom(), bearing: map.getBearing() };
  programmaticMove = true;
  applyFollowBearing(h);                 // målbäring (pos→green)
  const framed = fitFollowView({});      // instant setView till målvyn (samma tick)
  const target = { center: map.getCenter(), zoom: map.getZoom(), bearing: map.getBearing() };
  map.setBearing(start.bearing);         // återställ start (ännu ingen paint)
  map.setView(start.center, start.zoom, { animate: false });
  programmaticMove = false;
  if (!framed) return;                   // ingen giltig follow-vy (bör ej ske här)
  animateTo(target);
}

const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
// Interpolera nuvarande vy → target över FOLLOW_ANIM_MS. En ny fix mitt i
// animeringen startar om härifrån (från nuvarande, mid-läge) → mjuk om-styrning.
function animateTo(target) {
  if (animRAF) cancelAnimationFrame(animRAF);
  const start = { center: map.getCenter(), zoom: map.getZoom(), bearing: map.getBearing() };
  const dB = ((target.bearing - start.bearing + 540) % 360) - 180;   // kortaste vinkelväg
  const t0 = performance.now();
  const step = (now) => {
    const e = easeOutCubic(Math.min(1, (now - t0) / FOLLOW_ANIM_MS));
    programmaticMove = true;
    map.setBearing(start.bearing + dB * e);
    map.setView([start.center.lat + (target.center.lat - start.center.lat) * e,
                 start.center.lng + (target.center.lng - start.center.lng) * e],
                start.zoom + (target.zoom - start.zoom) * e, { animate: false });
    programmaticMove = false;
    animRAF = e < 1 ? requestAnimationFrame(step) : null;
  };
  animRAF = requestAnimationFrame(step);
}

// Utvärdera follow-trigger + strypt om-inramning vid varje GPS-fix.
function evalFollow(lat, lon, acc) {
  if (!autoZoom) return;   // master-switch av → ingen follow/rotation/zoom
  const h = ROUND[hi];
  if (!h) return;
  if (greenLatched) return;   // fast green-vy låst → rör inte vyn mer (till hålbyte)
  // Uppe vid/på green → lås den fasta green-vyn. Går även från overview (t.ex. par-3
  // på green i 1). Kräver hyfsad fix så en skräpfix inte låser vyn för tidigt.
  if ((acc == null || acc <= REFIT_ACC_M) && nearHole([lat, lon], h)
      && h.green_center && hav([lat, lon], h.green_center) <= GREEN_VIEW_M) {
    enterGreenView();
    if (greenLatched) return;
  }
  if (!followMode) {
    const shots = (currentHoleRec() && currentHoleRec().shots) ? currentHoleRec().shots.length : 0;
    // Auto-aktivera följningen bara NÄRA BANAN (<1000 m), efter slag 1 OCH när man
    // gått ut en god bit från teet (FOLLOW_START_M). Vid teet → kvar i overview →
    // ingen utzoomning med död yta bakom teeboxen.
    if (shots >= 1 && nearHole([lat, lon], h) && pastTee([lat, lon], h)) {
      followMode = true; lastFrameAnchor = null;
    } else return;
  }
  if (Date.now() < manualUntil) return;                 // pausad av manuell gest
  if (acc != null && acc > REFIT_ACC_M) return;          // för dålig fix → rör inte vyn
  if (lastFrameAnchor && hav([lat, lon], lastFrameAnchor) < FOLLOW_MOVE_M) return;  // för liten flytt
  lastFrameAnchor = [lat, lon];
  applyFrame({ animate: true });
}

// Reggade slag för aktuellt hål ur rundloggen (sg-rundlogg-v1, skrivs av Logga
// slag-sidan). S.holes nycklas på spelarens hål 1–18 = hi+1, samma valuta som
// kartan → ingen översättning. Slagen lagras {lat,lon,acc,ts}; kartan räknar på
// [lat,lon]. Ritas in i samma layers-grupp som rensas vid varje hålbyte, så
// plotten uppdateras när man kommer tillbaka från loggen (pageshow → syncHole).
function drawShots() {
  let log = null;
  try { log = JSON.parse(localStorage.getItem("sg-rundlogg-v1")); } catch (e) {}
  const rec = log && log.holes && log.holes[String(hi + 1)];
  MapCore.drawShots(shotLayer, rec);   // rensar + ritar slagbana/punkter/green/pin
}

// Logga ett slag direkt från kartvyn: färsk GPS-fix → pusha till rundloggen
// (sg-rundlogg-v1) för aktuellt hål (hi+1), samma format/struktur som Logga
// slag-sidan skriver ({lat,lon,acc,ts}). Ritar om slag-lagret på plats utan att
// röra hålvyn. Varnar vid svag GPS precis som index.html:s capture().
let logBusy = false;
function logShot() {
  if (logBusy) return;
  if (!("geolocation" in navigator)) { alert("Ingen GPS i webbläsaren."); return; }
  const fab = document.getElementById("logfab");
  logBusy = true; if (fab) fab.classList.add("busy");
  const done = () => { logBusy = false; if (fab) fab.classList.remove("busy"); };
  navigator.geolocation.getCurrentPosition(p => {
    const acc = p.coords.accuracy;
    if (acc > 25 && !confirm(`Svag GPS just nu (±${Math.round(acc)} m). Logga slag ändå?`)) {
      done(); return;
    }
    const shot = { lat: p.coords.latitude, lon: p.coords.longitude,
      acc: Math.round(acc * 10) / 10, ts: new Date().toISOString() };
    let log = null;
    try { log = JSON.parse(localStorage.getItem("sg-rundlogg-v1")); } catch (e) {}
    if (!log) log = { startedAt: new Date().toISOString(), endedAt: null,
                      current: hi + 1, holes: {} };
    if (!log.holes) log.holes = {};
    const k = String(hi + 1);
    if (!log.holes[k]) log.holes[k] = { shots: [], green: null, pin: null,
                                        putts: 0, pen: 0, adj: 0 };
    log.holes[k].shots.push(shot);
    try { localStorage.setItem("sg-rundlogg-v1", JSON.stringify(log)); } catch (e) {}
    if (navigator.vibrate) navigator.vibrate(30);
    drawShots();
    renderScore();   // ett loggat slag höjer total-räknaren
    livePushScoreFromMap(hi + 1);   // håll live-leaderboarden i synk
    done();
  }, e => {
    alert(e.code === 1 ? "GPS nekad — tillåt platsåtkomst i webbläsaren."
                       : "Fick ingen GPS-position, försök igen.");
    done();
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 2000 });
}

// Markera boll-på-green ("green") eller pin ("pin") direkt från kartvyn: färsk
// GPS-fix → skriv positionen i rundloggen (sg-rundlogg-v1) för aktuellt hål,
// samma format/struktur som Logga slag-sidans capture() ({lat,lon,acc,ts}).
// Bekräftar innan en redan reggad position ersätts. Delad pin pushas dessutom
// till ev. live-match (samma som index.html:s livePushPin).
function markPoint(kind) {
  if (markBusy) return;
  if (!("geolocation" in navigator)) { alert("Ingen GPS i webbläsaren."); return; }
  const fab = document.getElementById(kind === "green" ? "greenfab" : "pinfab");
  // finns redan? bekräfta ersättning (läs aktuell rundlogg)
  let existing = null;
  try {
    const l = JSON.parse(localStorage.getItem("sg-rundlogg-v1"));
    existing = l && l.holes && l.holes[String(hi + 1)] && l.holes[String(hi + 1)][kind];
  } catch (e) {}
  const label = kind === "green" ? "Green-position" : "Pin-position";
  if (existing && existing.lat != null &&
      !confirm(`${label} finns redan — ersätta?`)) return;

  markBusy = true; if (fab) fab.classList.add("busy");
  const done = () => { markBusy = false; if (fab) fab.classList.remove("busy"); };
  navigator.geolocation.getCurrentPosition(p => {
    const acc = p.coords.accuracy;
    if (acc > 25 && !confirm(`Svag GPS just nu (±${Math.round(acc)} m). Spara ${label.toLowerCase()} ändå?`)) {
      done(); return;
    }
    const pt = { lat: p.coords.latitude, lon: p.coords.longitude,
      acc: Math.round(acc * 10) / 10, ts: new Date().toISOString() };
    let log = null;
    try { log = JSON.parse(localStorage.getItem("sg-rundlogg-v1")); } catch (e) {}
    if (!log) log = { startedAt: new Date().toISOString(), endedAt: null,
                      current: hi + 1, holes: {} };
    if (!log.holes) log.holes = {};
    const k = String(hi + 1);
    if (!log.holes[k]) log.holes[k] = { shots: [], green: null, pin: null,
                                        putts: 0, pen: 0, adj: 0 };
    log.holes[k][kind] = pt;
    try { localStorage.setItem("sg-rundlogg-v1", JSON.stringify(log)); } catch (e) {}
    if (navigator.vibrate) navigator.vibrate(30);
    // pin delas till matchen (om man är med i ett live-game), som på Logga slag-sidan
    if (kind === "pin") livePushPinFromMap(pt);
    drawShots();
    refreshFabs();
    done();
  }, e => {
    alert(e.code === 1 ? "GPS nekad — tillåt platsåtkomst i webbläsaren."
                       : "Fick ingen GPS-position, försök igen.");
    done();
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 2000 });
}
let markBusy = false;

// Sätt/rensa "on"-läget på green-/pin-knapparna efter vad som är reggat för
// aktuellt hål i rundloggen (grön/röd tint = position finns).
function refreshFabs() {
  let rec = null;
  try {
    const l = JSON.parse(localStorage.getItem("sg-rundlogg-v1"));
    rec = l && l.holes && l.holes[String(hi + 1)];
  } catch (e) {}
  const gf = document.getElementById("greenfab"), pf = document.getElementById("pinfab");
  const hf = document.getElementById("holeoutfab");
  if (gf) gf.classList.toggle("on", !!(rec && rec.green && rec.green.lat != null));
  if (pf) pf.classList.toggle("on", !!(rec && rec.pin && rec.pin.lat != null));
  if (hf) hf.classList.toggle("on", !!(rec && rec.holedOut));
}

// Toggla "hål ut" (klar-flagga) för aktuellt hål i rundloggen. REN flagga —
// påverkar inte scoren (chip-in = hål ut med 0 putts). Kan reggas/avreggas.
// Ett hål-ut kan uppfylla krav 2 för auto-hålbytet → kolla direkt efteråt.
function toggleHoleOut() {
  let log = null;
  try { log = JSON.parse(localStorage.getItem("sg-rundlogg-v1")); } catch (e) {}
  if (!log) log = { startedAt: new Date().toISOString(), endedAt: null,
                    current: hi + 1, holes: {} };
  if (!log.holes) log.holes = {};
  const k = String(hi + 1);
  if (!log.holes[k]) log.holes[k] = { shots: [], green: null, pin: null,
                                      putts: 0, pen: 0, adj: 0 };
  log.holes[k].holedOut = !log.holes[k].holedOut;
  try { localStorage.setItem("sg-rundlogg-v1", JSON.stringify(log)); } catch (e) {}
  if (navigator.vibrate) navigator.vibrate(15);   // knapptryck (ej auto-bytet)
  refreshFabs();
  maybeAutoAdvance();
}

// Sömlöst auto-hålbyte (medan man är på kartan): byt till nästa hål när BÅDA
// kraven är uppfyllda — (1) ≤10 m från nästa håls valda tee, och (2) putt reggad
// ELLER hål ut reggat på nuvarande hål. Bara vid hyfsad GPS (acc ≤15 m) så
// skräpfixar inte byter för tidigt. Körs vid varje GPS-fix OCH direkt när man
// reggar putt/hål-ut (fångar båda ordningarna: gå-sen-avsluta / avsluta-sen-gå).
// Tyst — ingen avisering. Inget kedjebyte: nya hålet uppfyller inte krav 2.
const AUTO_TEE_M = 10, AUTO_ACC_M = 15;
function maybeAutoAdvance(acc) {
  if (acc == null) acc = lastAcc;
  if (!pos || acc == null || acc > AUTO_ACC_M) return;
  if (hi >= ROUND.length - 1) return;            // sista hålet → inget nästa tee
  const rec = currentHoleRec();
  const finished = !!(rec && ((rec.putts > 0) || rec.holedOut));
  if (!finished) return;
  const nextTee = teePoint(ROUND[hi + 1]);
  if (!nextTee) return;
  if (hav(pos, nextTee) <= AUTO_TEE_M) goToHole(hi + 2);   // hi 0-baserat → nästa rel = hi+2
}

// Byt hål från kartan och håll index synkat: skriv sg_hole (index:s syncFromMap
// plockar upp det) + rundloggens current (så index visar samma hål vid retur —
// index och karta ska alltid vara synkade). Tyst byte, ingen avisering.
function goToHole(rel) {
  if (rel < 1 || rel > ROUND.length) return;
  livePushScoreFromMap(hi + 1);   // pusha hålet man LÄMNAR (som index.html vid hålbyte)
  hi = rel - 1;
  try { localStorage.setItem("sg_hole", String(rel)); } catch (e) {}
  try {
    const log = JSON.parse(localStorage.getItem("sg-rundlogg-v1"));
    if (log) { log.current = rel; localStorage.setItem("sg-rundlogg-v1", JSON.stringify(log)); }
  } catch (e) {}
  drawHole();
}

// Slag vid bollen för aktuellt hål = GPS-loggade slag (rundloggens shots) +
// manuell justering (adj). Används både för adjust-stoppet och som del av scoren.
function scoreTotal(rec) {
  const shots = (rec && rec.shots) ? rec.shots.length : 0;
  return shots + (rec && rec.adj ? rec.adj : 0);
}
// Hela hålscoren, exakt som Logga slag-sidan: slag (shots+adj) + puttar + plikt.
function fullScore(rec) {
  return scoreTotal(rec) + (rec && rec.putts ? rec.putts : 0)
                         + (rec && rec.pen ? rec.pen : 0);
}
function currentHoleRec() {
  let l = null;
  try { l = JSON.parse(localStorage.getItem("sg-rundlogg-v1")); } catch (e) {}
  return l && l.holes ? l.holes[String(hi + 1)] : null;
}
function renderScore() {
  const rec = currentHoleRec();
  const v = document.getElementById("scoreVal");
  if (v) v.textContent = String(fullScore(rec));
  const putts = rec && rec.putts ? rec.putts : 0;
  const pv = document.getElementById("puttVal");
  if (pv) pv.textContent = String(putts);
  const pd = document.getElementById("puttDn");
  if (pd) pd.disabled = putts <= 0;   // stoppa vid 0
}

// Justera antal puttar för aktuellt hål (samma fält som Logga slag-sidan).
// steg = +1 / −1. − stoppar vid 0.
function adjustPutts(step) {
  let log = null;
  try { log = JSON.parse(localStorage.getItem("sg-rundlogg-v1")); } catch (e) {}
  if (!log) log = { startedAt: new Date().toISOString(), endedAt: null,
                    current: hi + 1, holes: {} };
  if (!log.holes) log.holes = {};
  const k = String(hi + 1);
  if (!log.holes[k]) log.holes[k] = { shots: [], green: null, pin: null,
                                      putts: 0, pen: 0, adj: 0 };
  const rec = log.holes[k];
  const next = (rec.putts || 0) + step;
  if (next < 0) return;   // inte under 0
  rec.putts = next;
  try { localStorage.setItem("sg-rundlogg-v1", JSON.stringify(log)); } catch (e) {}
  if (navigator.vibrate) navigator.vibrate(15);
  renderScore();
  livePushScoreFromMap(hi + 1);   // håll live-leaderboarden i synk
  maybeAutoAdvance();   // putt kan uppfylla krav 2 om man redan står vid nästa tee
}
// Justera scoren via adj (utan GPS-position), så antalet kan sättas rätt även
// när inte varje slag GPS-taggats. steg = +1 / −1. − stoppar vid 0 slag.
function adjustScore(step) {
  let log = null;
  try { log = JSON.parse(localStorage.getItem("sg-rundlogg-v1")); } catch (e) {}
  if (!log) log = { startedAt: new Date().toISOString(), endedAt: null,
                    current: hi + 1, holes: {} };
  if (!log.holes) log.holes = {};
  const k = String(hi + 1);
  if (!log.holes[k]) log.holes[k] = { shots: [], green: null, pin: null,
                                      putts: 0, pen: 0, adj: 0 };
  const rec = log.holes[k];
  if (step < 0 && scoreTotal(rec) <= 0) return;   // inte under 0
  rec.adj = (rec.adj || 0) + step;
  try { localStorage.setItem("sg-rundlogg-v1", JSON.stringify(log)); } catch (e) {}
  if (navigator.vibrate) navigator.vibrate(15);
  renderScore();
  livePushScoreFromMap(hi + 1);   // håll live-leaderboarden i synk
}

// Pusha reggad pin till ev. live-match. Kartan har ingen Live-modul → läser
// gameId ur localStorage (sg-live-v1) och anropar SGLive direkt. Fire-and-forget.
function livePushPinFromMap(pt) {
  let live = null;
  try { live = JSON.parse(localStorage.getItem("sg-live-v1")); } catch (e) {}
  if (!live || !live.gameId || typeof SGLive === "undefined") return;
  const g = SGRound.relToGlobal(hi + 1);
  if (g == null) return;
  try { SGLive.pushPin(live.gameId, g, { lat: pt.lat, lon: pt.lon, acc: pt.acc }).catch(e => SGLive.liveWarn("pin", e)); }
  catch (e) {}
}

// Pusha ett håls score till ev. live-match — motsvarigheten till index.html:s
// Live.push, men kartan har ingen Live-modul: läs gameId ur sg-live-v1 och anropa
// SGLive direkt. Hålnr = spelarens hål (rel 1–18), SAMMA nyckel som index.html
// (score keyas RELATIVT, till skillnad från pins som är globala). Komponenterna
// härleds precis som SGScore.components: strokes = shots + adj. Fire-and-forget:
// fel/offline sväljs, scoren finns kvar lokalt och molnet hinner ikapp senare.
function livePushScoreFromMap(rel) {
  let live = null;
  try { live = JSON.parse(localStorage.getItem("sg-live-v1")); } catch (e) {}
  if (!live || !live.gameId || typeof SGLive === "undefined") return;
  let rec = null;
  try {
    const l = JSON.parse(localStorage.getItem("sg-rundlogg-v1"));
    rec = l && l.holes && l.holes[String(rel)];
  } catch (e) {}
  const strokes = (rec && rec.shots ? rec.shots.length : 0) + (rec && rec.adj ? rec.adj : 0);
  const putts = rec && rec.putts ? rec.putts : 0;
  const pen = rec && rec.pen ? rec.pen : 0;
  try { SGLive.pushHoleScore(live.gameId, rel, { strokes, putts, pen }).catch(e => SGLive.liveWarn("score", e)); }
  catch (e) {}
}

// Delad pin för aktuellt hål (om satt i matchen) — egen flagg-markör i pinLayer,
// ovanpå den statiska vita centrum-pricken. Eget lager → kan ritas om vid realtids-
// uppdatering utan att drawHole:s vy-inpassning (zoom/rotation) triggas om.
function drawPin() {
  pinLayer.clearLayers();
  const g = SGRound.relToGlobal(hi + 1);
  const sp = g != null ? SHARED_PINS[g] : null;
  if (!sp || sp.lat == null) return;
  L.circleMarker([sp.lat, sp.lon], { radius: 5, color: "#fff", weight: 2,
    fillColor: "#e23b3b", fillOpacity: 1, interactive: false }).addTo(pinLayer);
}

// Prenumerera på matchens delade pins (om man är med i ett live-game). Kartan har
// ingen egen Live-modul → läser live-state direkt ur localStorage (sg-live-v1).
// Realtids-cb ritar bara om pin-lagret (drawPin), inte hela hålvyn. Fire-and-forget.
async function initSharedPins() {
  let live = null;
  try { live = JSON.parse(localStorage.getItem("sg-live-v1")); } catch (e) {}
  if (!live || !live.gameId || typeof SGLive === "undefined") return;
  try {
    await SGLive.initLive();
    pinUnsub = SGLive.subscribePins(live.gameId, m => { SHARED_PINS = m || {}; drawPin(); });
  } catch (e) {}
}

function drawHole() {
  layers.clearLayers();
  const h = ROUND[hi];
  if (!h) return;
  const teeSel = localStorage.getItem("sg_tee") || "";
  const approx = teeIsApprox(h)
    ? ` <small style="color:#e2a45a">tee ${teeSel} ~approx</small>` : "";
  document.getElementById("holeName").innerHTML =
    `Hål ${hi + 1} <small>Par ${h.par ?? "–"}</small>${approx}`;

  // Hål-linje (vit, start på vald tee) + pin — geometrin inkl. dogleg-fixen bor i mapcore.js.
  MapCore.drawHoleGeometry(layers, h);

  // reggade slag ur rundloggen (om några loggats för hålet)
  drawShots();
  refreshFabs();   // grön/röd tint på green-/pin-knapparna efter vad som är reggat
  renderScore();   // total slag för hålet i score-räknaren
  // delad pin från matchen (om satt för hålet)
  drawPin();

  // rotera så hålet pekar uppåt, passa sedan in vyn. Follow-läget latchas per hål:
  // 0 slag & vid teen → overview (som förr); kommer man tillbaka mitt i hålet
  // (slag redan loggade) → follow direkt från positionen (annars overview-fallback).
  orientToHole();
  const shotsHere = (currentHoleRec() && currentHoleRec().shots) ? currentHoleRec().shots.length : 0;
  // Hålbyte: nolla follow/green-lås OCH avbryt ev. pågående follow-animering — annars
  // drar rAF:en vidare mot förra hålets max-zoom och nya hålet fastnar inzoomat
  // (zoom-återställning vid hålbyte). follow bara nära banan, efter slag 1 och en
  // god bit ut från teet (kommer man tillbaka mitt i hålet).
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
  greenLatched = false;
  followMode = autoZoom && shotsHere >= 1 && nearHole(pos, h) && pastTee(pos, h);
  lastFrameAnchor = null; manualUntil = 0;
  applyFrame();
  clearTap();
  updateWind();
  // Efter att vyn satts (och layouten satt sig): tvinga en tile-uppdatering så
  // hela utsnittet fylls direkt, utan att användaren behöver zooma/panorera.
  // pan:false → ingen förflyttning, inramningen från fitHoleView bevaras.
  requestAnimationFrame(() => { if (map) map.invalidateSize({ pan: false }); });
}

function setPos(lat, lon, acc) {
  pos = [lat, lon];
  lastAcc = acc;
  const g = document.getElementById("gdot"), t = document.getElementById("gtxt");
  g.className = "gpsdot" + (acc <= 15 ? " ok" : "");
  t.textContent = `GPS ±${Math.round(acc)} m`;
  if (!meMarker) meMarker = L.circleMarker(pos, { radius: 7, color: "#fff", weight: 2, fillColor: "#3b82f6", fillOpacity: 1 }).addTo(map);
  else meMarker.setLatLng(pos);
  updateWind();
  fetchPlayerElev();
  if (tapMarker) updateTap(tapMarker.getLatLng());
  maybeAutoAdvance(acc);   // sömlöst hålbyte om kraven slår in
  evalFollow(lat, lon, acc);   // auto-zoom: trigga/följ vyn mot green
}

// Hålet styrs helt av rundloggen via localStorage-nyckeln sg_hole (spelarens
// hål 1–18, dvs. positionen i vald runda): kartan visar alltid samma hål som
// score-sidan — inget GPS-gissande och inget hålbyte här. Byt hål från
// "Logga slag".
function syncHole() {
  const rel = SGRound.migrateSgHole();   // konverterar ev. gammalt globalt värde
  if (rel >= 1 && rel <= ROUND.length) hi = rel - 1;
  drawHole();
}

function clearTap() {
  if (tapMarker) { map.removeLayer(tapMarker); tapMarker = null; }
  if (tapLine) { map.removeLayer(tapLine); tapLine = null; }
  document.getElementById("measure").classList.add("hidden");
}
function updateTap(latlng) {
  const target = [latlng.lat, latlng.lng];
  document.getElementById("measure").classList.remove("hidden");
  const o = measureOrigin();
  const rem = fmt(hav(target, ROUND[hi].green_center));
  const sub = `${rem} m kvar`;
  const pa = playAsRange(o.pt, target, 0);   // vind (medel + by); slope okänd för fri punkt
  if (mode === "play" && pa) {
    let s = `<b>${pa.mean} m</b>`;
    // "i by"-spannet dolt i UX (testar utan) — beräkningen finns kvar ovan:
    // if (Math.abs(pa.gust - pa.mean) >= GUST_SPAN_MIN_M) s += ` <span class="by">· i by ${pa.gust}</span>`;
    document.getElementById("mPlay").innerHTML = s;
    document.getElementById("mSub").textContent = sub;
  } else {
    document.getElementById("mPlay").innerHTML =
      o.pt ? `<b>${fmt(hav(o.pt, target))} m</b>` : "–";
    document.getElementById("mSub").textContent = sub;
  }
  if (tapLine) map.removeLayer(tapLine);
  if (o.pt) tapLine = L.polyline([o.pt, target], { color: "#fff", weight: 2, dashArray: "3,5" }).addTo(map);
}
// Egen mät-pin: vendor-mappen saknar Leaflets marker-PNG:er, så standard-L.marker
// blir osynlig. Inbyggd SVG-pin (ingen extern fil, funkar offline).
const TAP_ICON = L.divIcon({ className: "tappin", iconSize: [34, 34], iconAnchor: [17, 17],
  html: '<svg width="34" height="34" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg">'
    + '<g fill="none" stroke-linecap="round">'
    + '<g stroke="#fff" stroke-width="4">'
    +   '<circle cx="17" cy="17" r="9"/>'
    +   '<path d="M17 4.5V8 M17 26V29.5 M4.5 17H8 M26 17H29.5"/></g>'
    + '<g stroke="#37b06b" stroke-width="2">'
    +   '<circle cx="17" cy="17" r="9"/>'
    +   '<path d="M17 4.5V8 M17 26V29.5 M4.5 17H8 M26 17H29.5"/></g>'
    + '</g><circle cx="17" cy="17" r="1.8" fill="#37b06b"/></svg>' });
function onTap(e) {
  if (tapMarker) tapMarker.setLatLng(e.latlng);
  else tapMarker = L.marker(e.latlng, { icon: TAP_ICON }).addTo(map);
  updateTap(e.latlng);
}

async function init() {
  map = MapCore.createMap("map");
  // Ortofoto (Lantmäteriet) i standard-tilePane + Esri-nödfallback — se mapcore.js.
  MapCore.addOrthophoto(map);
  layers.addTo(map);
  shotLayer.addTo(map);
  pinLayer.addTo(map);
  const lf = document.getElementById("logfab");
  if (lf) lf.onclick = logShot;
  const gf = document.getElementById("greenfab");
  if (gf) gf.onclick = () => markPoint("green");
  const pf = document.getElementById("pinfab");
  if (pf) pf.onclick = () => markPoint("pin");
  const hf = document.getElementById("holeoutfab");
  if (hf) hf.onclick = toggleHoleOut;
  const pu = document.getElementById("puttUp");
  if (pu) pu.onclick = () => adjustPutts(1);
  const pdn = document.getElementById("puttDn");
  if (pdn) pdn.onclick = () => adjustPutts(-1);
  map.setView([55.618, 13.07], 15);
  map.on("click", onTap);
  map.on("rotate", updateRose);   // rosen följer kartans rotation
  // Autozoom: manuell gest (pan/pinch) pausar följningen FOLLOW_PAUSE_MS och
  // återupptar sedan själv. programmaticMove skiljer våra egna setView från gester.
  map.on("movestart zoomstart", () => {
    if (programmaticMove) return;
    if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }   // avbryt vår animering – slåss inte med användaren
    manualUntil = Date.now() + FOLLOW_PAUSE_MS;
    if (resumeTimer) clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => {
      if (greenLatched) enterGreenView();            // fast green-vy → återställ till den
      else if (followMode && pos) applyFrame({ animate: true });
    }, FOLLOW_PAUSE_MS + 60);
  });
  for (const b of document.querySelectorAll("#modeToggle button"))
    b.onclick = () => setMode(b.dataset.mode);
  setMode(mode);   // sätter aktiv knapp + första renderingen
  const rs = document.getElementById("roundSel");
  if (rs) rs.onchange = e => setRound(e.target.value);

  try {
    const course = await MapCore.loadCourse();   // bandata + tee-tabell (se mapcore.js)
    HOLES = course.HOLES; byGlobal = course.byGlobal;
    setRound(SGRound.roundName());   // val från startsidan
    // om man byter hål i rundloggen och kommer tillbaka hit: synka igen
    window.addEventListener("pageshow", syncHole);
    document.addEventListener("visibilitychange", () => { if (!document.hidden) syncHole(); });
    window.addEventListener("storage", e => { if (e.key === "sg_hole") syncHole(); });
    fetchWind();                                   // aktuell vind (Open-Meteo)
    setInterval(fetchWind, 5 * 60 * 1000);         // uppdatera var 5:e min
  } catch (e) {
    document.getElementById("holeName").textContent = "Kunde ej ladda bandata";
    return;
  }
  if ("geolocation" in navigator)
    navigator.geolocation.watchPosition(
      p => setPos(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
      () => {}, { enableHighAccuracy: true, maximumAge: 0 });
  initSharedPins();   // delade pins från ev. live-match (realtid)
  initSimWalk();      // dev: ?simwalk=1 → känn på follow/zoom utan GPS/bana
}

// Dev-läge (gated bakom ?simwalk=1): interpolerar tee→green och matar SAMMA
// setPos-väg som riktig GPS, så follow-övergången + progressiva inzoomningen
// spelas upp på telefon/desktop hemma. Skriver inget → påverkar aldrig en runda.
function initSimWalk() {
  if (!new URLSearchParams(location.search).has("simwalk")) return;
  const btn = document.createElement("button");
  btn.textContent = "▶ sim";
  btn.style.cssText = "position:absolute;left:8px;bottom:calc(env(safe-area-inset-bottom) + 150px);"
    + "z-index:1200;background:#1a4c38;color:#e8f5ec;border:1px solid #37b06b;border-radius:10px;"
    + "padding:9px 13px;font:inherit;font-weight:700;box-shadow:0 2px 8px #0007;";
  let timer = null;
  const stop = () => { if (timer) clearInterval(timer); timer = null; btn.textContent = "▶ sim"; };
  btn.onclick = () => {
    if (timer) { stop(); return; }
    const h = ROUND[hi];
    const tee = teePoint(h) || (h.line && h.line[0]);
    const green = h.green_center || h.pin;
    if (!tee || !green) return;
    followMode = false; greenLatched = false; lastFrameAnchor = null; manualUntil = 0;   // starta i overview
    drawHole();
    btn.textContent = "⏸ sim";
    const N = 40; let i = 0;
    timer = setInterval(() => {
      const t = i / N;
      setPos(tee[0] + (green[0] - tee[0]) * t, tee[1] + (green[1] - tee[1]) * t, 6);
      if (++i > N) stop();
    }, 500);   // ~20 s tee→green
  };
  document.body.appendChild(btn);
}
// Vid VERKLIG viewport-ändring (rotation, webbläsarens verktygsfält som glider
// in/ut): låt Leaflet läsa om behållarstorleken och passa in hålvyn igen.
// Guardat på höjd så ingen om-inpassning (och därmed inget zoom-hopp) sker när
// inget faktiskt ändrats — t.ex. vid varje litet scroll/paint.
let _lastVpH = null;
function onViewportChange() {
  const h = window.innerHeight;
  if (h === _lastVpH) return;
  _lastVpH = h;
  if (map) {
    map.invalidateSize({ pan: false });
    if (ROUND[hi]) applyFrame();   // re-applicera aktuellt läge (overview/follow)
  }
}
window.addEventListener("resize", onViewportChange);
window.addEventListener("orientationchange", onViewportChange);

window.addEventListener("pagehide", () => { if (pinUnsub) { pinUnsub(); pinUnsub = null; } });
init();
</script>
<script>
/* Håll navigeringen inne i hemskärms-appen (iOS standalone): utan detta öppnar
   iOS länkar till andra sidor i en Safari-ruta (kryss + adressfält uppe, ladda
   om/tillbaka nere). Vi fångar interna länkklick och navigerar via location,
   vilket behåller helskärmsläget. Ingen effekt i vanlig webbläsare. */
(function () {
  var standalone = ("standalone" in navigator && navigator.standalone)
    || matchMedia("(display-mode: standalone)").matches;
  if (!standalone) return;
  document.addEventListener("click", function (e) {
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
    var url = new URL(a.getAttribute("href"), location.href);
    if (url.origin !== location.origin) return;
    e.preventDefault();
    location.href = url.href;
  });
})();
</script>
