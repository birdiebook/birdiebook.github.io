<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c2e22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Översikt">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="./boot.js"></script>
<title>SG Översikt</title>
<style>
  :root { --bg:#0c2e22; --card:#123c2d; --ink:#e8f5ec; --dim:#9fc4ae;
          --line:#1f5540; --accent:#37b06b; --accent-ink:#06180f;
          --warn:#e8c34a; --danger:#e26a5a; --good:#7ee2a8; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    touch-action:manipulation; overscroll-behavior:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right)
            env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #app { max-width:480px; margin:0 auto; padding:12px 14px 96px; }
  h1 { font-size:22px; margin:10px 0 2px; }
  h2 { font-size:15px; margin:8px 0 10px; }
  h2 .note { color:var(--dim); font-weight:400; font-size:12px; }
  .sub { color:var(--dim); font-size:14px; margin:0 0 14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:10px 14px; margin:10px 0; }
  /* hero-kort — rundans facit i en blick */
  .kpis { display:flex; gap:6px; text-align:center; padding:4px 0 6px; }
  .kpi { flex:1; }
  .kpi .big { display:block; font-size:28px; font-weight:800; line-height:1.1; }
  .kpi .lbl { display:block; color:var(--dim); font-size:12px; margin-top:2px; }
  .pos { color:var(--good); }
  .neg { color:var(--danger); }
  /* SG-staplar med nollaxel i mitten */
  .sgrow { display:flex; align-items:center; gap:8px; margin:8px 0; }
  .sglbl { width:64px; font-size:13px; color:var(--dim); }
  .sgbar { flex:1; position:relative; height:14px; background:#0e3326; border-radius:7px; }
  .sgbar::before { content:""; position:absolute; left:50%; top:-2px; bottom:-2px;
    width:1px; background:var(--line); }
  .sgfill { position:absolute; top:2px; bottom:2px; border-radius:5px; }
  .sgfill.pos { left:50%; background:var(--accent); }
  .sgfill.neg { right:50%; background:var(--danger); }
  .sgval { width:44px; text-align:right; font-size:13px; font-weight:700; }
  .sgtotal { border-top:1px solid var(--line); margin-top:10px; padding-top:8px;
    display:flex; justify-content:space-between; font-size:13px; }
  .sgtotal b { font-size:14px; }
  /* insikter */
  .insight { display:flex; gap:8px; font-size:14px; margin:7px 0; line-height:1.35; }
  .insight .ico { flex:none; }
  /* scorefördelning */
  .distrow { display:flex; align-items:center; gap:8px; margin:7px 0; }
  .distlbl { width:64px; font-size:13px; color:var(--dim); }
  .distbar { flex:1; height:14px; background:#0e3326; border-radius:7px; overflow:hidden; }
  .distfill { height:100%; border-radius:7px; }
  .distn { width:24px; text-align:right; font-size:13px; font-weight:700; }
  /* par-snitt */
  .pargrid { display:flex; gap:6px; text-align:center; }
  .parbox { flex:1; background:#0e3326; border-radius:10px; padding:8px 4px; }
  .parbox .plbl { color:var(--dim); font-size:12px; }
  .parbox .pavg { font-size:20px; font-weight:800; margin:2px 0; }
  .parbox .pdiff { font-size:12px; font-weight:700; }
  table { width:100%; border-collapse:collapse; font-size:15px; }
  th, td { text-align:right; padding:8px 6px; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--dim); font-weight:600; font-size:13px; }
  tr.now td { background:#1a4c38; }
  tr.hole { cursor:pointer; }
  tr.edit td { background:#0e3326; padding:10px 6px; }
  .step { display:flex; align-items:center; gap:8px; margin:6px 0; }
  .step button { width:44px; height:44px; font-size:22px; font-weight:700; border:none;
    border-radius:10px; background:#1a4c38; color:var(--ink); flex:none; cursor:pointer; }
  .step button:disabled { opacity:.4; }
  .step .val { font-size:20px; font-weight:800; min-width:34px; text-align:center; }
  .step .lbl { color:var(--dim); font-size:13px; flex:1; text-align:left; }
  .adjnote { color:var(--warn); font-size:12px; margin:2px 0 6px; text-align:left; }
  .openlink { display:inline-block; margin-top:4px; color:var(--dim); font-size:13px;
    text-decoration:underline; cursor:pointer; }
  td.under { color:var(--good); font-weight:700; }
  td.over { color:var(--danger); font-weight:700; }
  td.empty { color:var(--dim); }
  .total td { font-weight:800; border-bottom:none; }
  .hint { color:var(--dim); font-size:13px; text-align:center; margin-top:10px; }
  /* gemensam flik-rad (samma på alla sidor) */
  .tabs { position:fixed; left:0; right:0; bottom:0; z-index:1200; display:flex; gap:6px;
    background:var(--card); border-top:1px solid var(--line);
    padding:6px 10px calc(env(safe-area-inset-bottom) + 6px); }
  .tabs a { flex:1; text-align:center; text-decoration:none; color:var(--dim);
    font-size:12px; font-weight:600; padding:5px 0 3px; border-radius:10px; }
  .tabs a .ico { display:block; font-size:20px; }
  .tabs a.active { color:var(--ink); background:#1a4c38; }
</style>
</head>
<body>
<div id="app"></div>
<nav class="tabs">
  <a href="./index.html"><span class="ico">⛳</span>Logga slag</a>
  <a href="./karta.html"><span class="ico">🗺</span>Karta</a>
  <a href="./oversikt.html" class="active"><span class="ico">📋</span>Översikt</a>
</nav>
<script src="./round.js"></script>
<!-- Live-scoring (additivt): samma tre script som Logga slag. Ger leaderboarden. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./score.js"></script>
<script src="./live.js"></script>
<script>
"use strict";
// Numrering/rundsekvenser delas via round.js (SGRound). Tabellen och all
// state (S.holes, sg_hole) använder spelarens hålnummer 1–18; banans globala
// nummer syns bara i den lilla beskrivningen ("Gul 1").
const { GLOBAL_BASE, LOOP_SHORT } = SGRound;
const KEY = "sg-rundlogg-v1";
const SG_LABEL = { off_the_tee: "Utslag", approach: "Inspel", around_green: "Närspel" };

/* ---------- live-leaderboard (LIVE_SCORING_SPEC.md §7, steg 4) ----------
   Läser samma live-state som Logga slag skriver (sg-live-v1). Är man med i en
   match prenumererar vi på molnets score och visar allas löpande resultat i
   realtid. Rör inget i den lokala rundvyn — additivt kort överst. */
let LIVE = null;
try { LIVE = JSON.parse(localStorage.getItem("sg-live-v1")); } catch (e) {}
const liveOn = () => !!(LIVE && LIVE.gameId && typeof SGLive !== "undefined");
let LB = null;          // senaste leaderboard-modellen från subscriben
let myUid = null;       // egen uid → markera egen rad
let lbSubscribed = false, lbUnsub = null;

function lbHtml() {
  if (!liveOn()) return "";
  const head = `<div class="card"><h2>🏆 Live-leaderboard <span class="note">kod ${esc(LIVE.code || "")}</span></h2>`;
  if (!LB) return head + `<div class="hint" style="text-align:left;margin:4px 0">Ansluter …</div></div>`;
  if (!LB.length) return head + `<div class="hint" style="text-align:left;margin:4px 0">Ingen har fört score än.</div></div>`;
  const rows = LB.map((p, i) => {
    const mine = myUid && p.uid === myUid;
    const tp = p.thru ? (p.toPar === 0 ? "E" : fmtDiff(p.toPar)) : "–";
    const tpCls = p.thru && p.toPar < 0 ? "under" : p.thru && p.toPar > 0 ? "over" : "";
    return `<tr${mine ? ' class="now"' : ""}>
      <td>${i + 1}. ${esc(p.name || "—")}${mine ? " <span style=\"color:var(--dim);font-size:12px\">(du)</span>" : ""}</td>
      <td>${p.thru || 0}</td>
      <td>${p.total || "–"}</td>
      <td class="${tpCls}">${tp}</td>
    </tr>`;
  }).join("");
  return head + `<table style="margin:4px 0">
    <tr><th>Spelare</th><th>Hål</th><th>Slag</th><th>Mot par</th></tr>
    ${rows}
  </table></div>`;
}

function esc(s) { return String(s).replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

// Startas en gång när par-listan är känd (par per spelarhål 1–18 → mot par).
function startLeaderboard(parByRel) {
  if (lbSubscribed || !liveOn()) return;
  lbSubscribed = true;
  SGLive.initLive().then(r => { myUid = r.uid; }).catch(() => {});
  try {
    lbUnsub = SGLive.subscribeLeaderboard(LIVE.gameId, rows => {
      LB = rows; render();
    }, { par: parByRel });
  } catch (e) { lbSubscribed = false; }
}
window.addEventListener("pagehide", () => { if (lbUnsub) lbUnsub(); });

function loadState() {
  try { return JSON.parse(localStorage.getItem(KEY)); } catch (e) { return null; }
}
function loadAnalysis(S) {
  // SG-analysen sparas av index.html vid "Skicka" — visas bara för samma runda
  try {
    const A = JSON.parse(localStorage.getItem("sg_analysis"));
    return A && S && A.started_at === S.startedAt ? A : null;
  } catch (e) { return null; }
}
function holeScore(S, n) {
  const h = S && S.holes && S.holes[String(n)];
  if (!h) return null;
  const shots = (h.shots ? h.shots.length : 0) + (h.adj || 0);
  const score = shots + (h.putts || 0) + (h.pen || 0);
  return score > 0 ? { score, shots, putts: h.putts || 0, pen: h.pen || 0, adj: h.adj || 0 } : null;
}
function goToHole(n) {
  try {
    localStorage.setItem("sg_hole", n);
    const S = loadState();
    if (S) { S.current = n; localStorage.setItem(KEY, JSON.stringify(S)); }
  } catch (e) {}
  location.href = "./index.html";
}
const fmtDiff = d => d === 0 ? "0" : (d > 0 ? "+" + d : String(d));
const fmtSg = v => (v > 0 ? "+" : "") + v.toFixed(1);

/* ---------- redigering (samma state som rundloggen) ---------- */
let editing = null;   // spelarens hålnr (1–18) med öppen editor
function ensureHole(S, n) {
  const k = String(n);
  if (!S.holes[k]) S.holes[k] = { shots: [], green: null, pin: null,
                                  putts: 0, pen: 0, holedOut: false, adj: 0 };
  if (S.holes[k].adj == null) S.holes[k].adj = 0;
  return S.holes[k];
}
// fält: 'adj' (glömda/extra slag, kan bli negativ ned till −loggade), 'putts', 'pen'
function bump(n, field, delta) {
  const S = loadState();
  if (!S) return;
  const h = ensureHole(S, n);
  if (field === "adj") {
    const next = (h.adj || 0) + delta;
    if (h.shots.length + next < 0) return;   // totala slag kan inte bli negativa
    h.adj = next;
  } else {
    h[field] = Math.max(0, (h[field] || 0) + delta);
    if (field === "putts" && h[field] > 0) h.holedOut = false;
  }
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch (e) {}
  render();
}
function editorRow(S, g) {
  const h = (S && S.holes && S.holes[String(g)]) ||
            { shots: [], putts: 0, pen: 0, adj: 0 };
  const shots = h.shots.length + (h.adj || 0);
  const step = (field, val, lbl, minusDis) => `
    <div class="step">
      <button data-bump="${field}" data-d="-1" ${minusDis ? "disabled" : ""}>−</button>
      <span class="val">${val}</span>
      <button data-bump="${field}" data-d="1">+</button>
      <span class="lbl">${lbl}</span>
    </div>`;
  return `<tr class="edit" data-editrow="${g}"><td colspan="5">
    ${step("adj", shots, "slag", shots <= 0)}
    ${h.adj ? `<div class="adjnote">${Math.abs(h.adj)} slag ${h.adj > 0 ? "tillagt" : "borttaget"} manuellt (utan GPS-position — påverkar score, inte analysen)</div>` : ""}
    ${step("putts", h.putts || 0, "puttar", (h.putts || 0) <= 0)}
    ${step("pen", h.pen || 0, "pliktslag", (h.pen || 0) <= 0)}
    <span class="openlink" data-open="${g}">⛳ Öppna hålet i Logga slag</span>
  </td></tr>`;
}

/* ---------- sektioner ---------- */
function heroHtml(t) {
  const diff = t.played && t.totPar
    ? `<span class="big ${t.totScore - t.totPar < 0 ? "pos" : t.totScore - t.totPar > 0 ? "neg" : ""}">${fmtDiff(t.totScore - t.totPar)}</span>`
    : `<span class="big">–</span>`;
  return `<div class="card">
    <div class="kpis">
      <div class="kpi"><span class="big">${t.totScore || "–"}</span><span class="lbl">score</span></div>
      <div class="kpi">${diff}<span class="lbl">mot par</span></div>
      <div class="kpi"><span class="big">${t.totPutts || "–"}</span><span class="lbl">puttar</span></div>
      <div class="kpi"><span class="big">${t.played}/${t.nHoles}</span><span class="lbl">hål</span></div>
    </div>
  </div>`;
}
function sgHtml(A, played) {
  if (!A) {
    return played ? `<div class="card"><h2>Strokes Gained</h2>
      <div class="insight"><span class="ico">📡</span><span>Skicka rundan till analysen
      (Logga slag → Avsluta rundan) så visas Strokes Gained per kategori här.</span></div></div>` : "";
  }
  const cats = Object.keys(SG_LABEL).filter(c => A.by_category[c] != null);
  if (!cats.length) return "";
  const maxAbs = Math.max(0.5, ...cats.map(c => Math.abs(A.by_category[c])));
  const rows = cats.map(c => {
    const v = A.by_category[c];
    const w = Math.abs(v) / maxAbs * 48;
    return `<div class="sgrow">
      <span class="sglbl">${SG_LABEL[c]}</span>
      <div class="sgbar"><div class="sgfill ${v < 0 ? "neg" : "pos"}" style="width:${w.toFixed(1)}%"></div></div>
      <span class="sgval ${v < 0 ? "neg" : "pos"}">${fmtSg(v)}</span>
    </div>`;
  }).join("");
  const tot = A.total_sg != null
    ? `<div class="sgtotal"><span>Totalt tee–green</span>
       <b class="${A.total_sg < 0 ? "neg" : "pos"}">${fmtSg(A.total_sg)}</b></div>` : "";
  return `<div class="card"><h2>Strokes Gained <span class="note">tee–green · mot scratch</span></h2>
    ${rows}${tot}</div>`;
}
function insightsHtml(A, t) {
  const lines = [];
  if (A) {
    const cats = Object.keys(SG_LABEL).filter(c => A.by_category[c] != null)
      .map(c => ({ c, v: A.by_category[c] })).sort((a, b) => a.v - b.v);
    if (cats.length) {
      const worst = cats[0], best = cats[cats.length - 1];
      if (worst.v <= -0.5) lines.push(["🔻", `${SG_LABEL[worst.c]} kostade ${fmtSg(worst.v)} slag mot scratch — rundans största läcka.`]);
      if (best.v >= 0.5) lines.push(["💪", `${SG_LABEL[best.c]} gav ${fmtSg(best.v)} slag — rundans styrka.`]);
    }
  }
  if (t.played >= 3) {
    const avg = t.totPutts / t.played;
    if (avg >= 2.2) lines.push(["⚠️", `${t.totPutts} puttar (${avg.toFixed(1)}/hål) — puttningen kostade.`]);
    else if (avg > 0 && avg <= 1.7) lines.push(["🎯", `Bara ${avg.toFixed(1)} puttar/hål — puttern levererade.`]);
  }
  if (t.worstHole && t.worstHole.d >= 3)
    lines.push(["💥", `Hål ${t.worstHole.g} kostade +${t.worstHole.d} ensamt.`]);
  if (!lines.length) return "";
  return `<div class="card"><h2>Rundans berättelse</h2>
    ${lines.slice(0, 3).map(l => `<div class="insight"><span class="ico">${l[0]}</span><span>${l[1]}</span></div>`).join("")}
  </div>`;
}
function distHtml(t) {
  if (!t.played) return "";
  const rows = [
    ["Birdie+", t.dist.birdie, "var(--good)"],
    ["Par", t.dist.par, "var(--accent)"],
    ["Bogey", t.dist.bogey, "var(--warn)"],
    ["Dubbel+", t.dist.dbl, "var(--danger)"],
  ];
  return `<div class="card"><h2>Scorefördelning</h2>
    ${rows.map(([lbl, n, col]) => `<div class="distrow">
      <span class="distlbl">${lbl}</span>
      <div class="distbar"><div class="distfill" style="width:${(n / t.played * 100).toFixed(0)}%;background:${col}"></div></div>
      <span class="distn">${n}</span>
    </div>`).join("")}
  </div>`;
}
function parHtml(t) {
  const boxes = [3, 4, 5].filter(p => t.byPar[p] && t.byPar[p].n).map(p => {
    const b = t.byPar[p], avg = b.sum / b.n, d = avg - p;
    return `<div class="parbox">
      <div class="plbl">Par ${p}</div>
      <div class="pavg">${avg.toFixed(1)}</div>
      <div class="pdiff ${d < -0.05 ? "pos" : d > 0.05 ? "neg" : ""}">${d > 0 ? "+" : ""}${d.toFixed(1)}</div>
    </div>`;
  });
  return boxes.length
    ? `<div class="card"><h2>Snitt per parvärde</h2><div class="pargrid">${boxes.join("")}</div></div>` : "";
}

let coursePromise = null;
function loadCourse() {
  if (coursePromise) return coursePromise;
  coursePromise = fetch("./data/burlov.json", { cache: "no-cache" })
    .then(r => r.json())
    .then(data => {
      const by = {};
      for (const h of data.holes) by[GLOBAL_BASE[h.loop] + h.hole] = h;
      return by;
    })
    .catch(() => ({}));   // par visas som – om bandata saknas
  return coursePromise;
}

async function render() {
  const S = loadState();
  const roundName = SGRound.roundName();
  const seq = SGRound.seq();
  // bandata cachas (realtids-leaderboarden triggar render vid varje score → hämta bara en gång)
  const byGlobal = await loadCourse();

  const current = S && S.view === "hole" ? S.current : null;
  const t = { totScore: 0, totPar: 0, totPutts: 0, played: 0, nHoles: seq.length,
              dist: { birdie: 0, par: 0, bogey: 0, dbl: 0 },
              byPar: {}, worstHole: null };
  // rel = spelarens hål (1–18); bandata slås upp via det globala numret
  const parByRel = {};   // { spelarhål 1–18: par } → mot par i leaderboarden
  const rows = seq.map((g, i) => {
    const rel = i + 1;
    const h = byGlobal[g];
    const par = h && h.par != null ? h.par : null;
    if (par != null) parByRel[rel] = par;
    const sc = holeScore(S, rel);
    let diffCell = `<td class="empty">–</td>`;
    if (sc && par != null) {
      const d = sc.score - par;
      diffCell = d === 0 ? `<td>0</td>`
        : `<td class="${d < 0 ? "under" : "over"}">${fmtDiff(d)}</td>`;
      if (d <= -1) t.dist.birdie++;
      else if (d === 0) t.dist.par++;
      else if (d === 1) t.dist.bogey++;
      else t.dist.dbl++;
      const bp = t.byPar[par] || (t.byPar[par] = { sum: 0, n: 0 });
      bp.sum += sc.score; bp.n++;
      if (!t.worstHole || d > t.worstHole.d) t.worstHole = { g: rel, d };
    }
    if (sc) { t.totScore += sc.score; t.totPutts += sc.putts; t.played++; if (par != null) t.totPar += par; }
    return `<tr class="hole ${rel === current ? "now" : ""}" data-hole="${rel}">
      <td>${rel}${h ? ` <span style="color:var(--dim);font-size:12px">${LOOP_SHORT[h.loop] || ""} ${h.hole}</span>` : ""}${sc && sc.adj ? ` <span style="color:var(--warn)">✎</span>` : ""}</td>
      <td>${par != null ? par : "–"}</td>
      <td${sc ? "" : ' class="empty"'}>${sc ? sc.score : "–"}</td>
      <td${sc && sc.putts ? "" : ' class="empty"'}>${sc ? sc.putts : "–"}</td>
      ${diffCell}
    </tr>${rel === editing ? editorRow(S, rel) : ""}`;
  }).join("");

  const A = loadAnalysis(S);
  const totDiff = t.totScore - t.totPar;
  const sub = S && S.player ? `${S.player} · runda ${roundName}` : `runda ${roundName}`;
  document.getElementById("app").innerHTML = `
    <h1>Översikt</h1>
    <p class="sub">${sub}${t.played ? ` · ${t.played} hål spelade` : ""}</p>
    ${lbHtml()}
    ${heroHtml(t)}
    ${sgHtml(A, t.played)}
    ${insightsHtml(A, t)}
    ${distHtml(t)}
    ${parHtml(t)}
    <div class="card" style="padding:6px 14px">
      <table>
        <tr><th>Hål</th><th>Par</th><th>Score</th><th>Putt</th><th>+/−</th></tr>
        ${rows}
        <tr class="total"><td>Totalt</td><td>${t.totPar || "–"}</td><td>${t.totScore || "–"}</td>
          <td>${t.totPutts || "–"}</td>
          <td>${t.played && t.totPar ? fmtDiff(totDiff) : "–"}</td></tr>
      </table>
    </div>
    <div class="hint">Tryck på ett hål för att rätta score eller öppna det.</div>`;
  document.querySelectorAll("tr.hole").forEach(tr =>
    tr.onclick = () => {
      if (!S) { alert("Starta en runda i Logga slag först."); return; }
      const g = +tr.dataset.hole;
      editing = editing === g ? null : g;
      render();
    });
  document.querySelectorAll("[data-bump]").forEach(b =>
    b.onclick = e => { e.stopPropagation(); bump(editing, b.dataset.bump, +b.dataset.d); });
  document.querySelectorAll("[data-open]").forEach(el =>
    el.onclick = e => { e.stopPropagation(); goToHole(+el.dataset.open); });
  // starta live-prenumerationen när par-listan finns (en gång)
  startLeaderboard(parByRel);
}
render();
// uppdatera om man kommer tillbaka hit med ny data
window.addEventListener("pageshow", render);
</script>
<script>
/* Håll navigeringen inne i hemskärms-appen (iOS standalone): utan detta öppnar
   iOS länkar till andra sidor i en Safari-ruta (kryss + adressfält uppe, ladda
   om/tillbaka nere). Vi fångar interna länkklick och navigerar via location,
   vilket behåller helskärmsläget. Ingen effekt i vanlig webbläsare. */
(function () {
  var standalone = ("standalone" in navigator && navigator.standalone)
    || matchMedia("(display-mode: standalone)").matches;
  if (!standalone) return;
  document.addEventListener("click", function (e) {
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
    var url = new URL(a.getAttribute("href"), location.href);
    if (url.origin !== location.origin) return;
    e.preventDefault();
    location.href = url.href;
  });
})();
</script>
