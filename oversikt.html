<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c2e22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Översikt">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>SG Översikt</title>
<style>
  :root { --bg:#0c2e22; --card:#123c2d; --ink:#e8f5ec; --dim:#9fc4ae;
          --line:#1f5540; --accent:#37b06b; --accent-ink:#06180f;
          --warn:#e8c34a; --danger:#e26a5a; --good:#7ee2a8; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    touch-action:manipulation; overscroll-behavior:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right)
            env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #app { max-width:480px; margin:0 auto; padding:12px 14px 96px; }
  h1 { font-size:22px; margin:10px 0 2px; }
  h2 { font-size:15px; margin:8px 0 10px; }
  h2 .note { color:var(--dim); font-weight:400; font-size:12px; }
  .sub { color:var(--dim); font-size:14px; margin:0 0 14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:10px 14px; margin:10px 0; }
  .hint { color:var(--dim); font-size:13px; text-align:center; margin-top:10px; }
  .hint.left { text-align:left; margin:4px 0; }
  /* tom/uppmanande vy när man inte är med i en match */
  .empty-cta { text-align:center; padding:26px 14px; }
  .empty-cta .ico { font-size:44px; display:block; margin-bottom:8px; }
  .empty-cta .big { font-size:16px; font-weight:700; margin:0 0 6px; }
  .empty-cta .txt { color:var(--dim); font-size:14px; line-height:1.4; margin:0 0 14px; }
  .empty-cta a.btn { display:inline-block; text-decoration:none; background:var(--accent);
    color:var(--accent-ink); font-weight:800; font-size:15px; padding:11px 22px; border-radius:12px; }

  /* ---------- scorekort ---------- */
  /* horisontell scroll: spelarnamnet är sticky till vänster, hålen scrollar */
  .scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:2px -4px; }
  table.card-tbl { border-collapse:separate; border-spacing:0; width:auto; min-width:100%; }
  .card-tbl th, .card-tbl td { padding:7px 4px; text-align:center; font-size:15px;
    white-space:nowrap; border-bottom:1px solid var(--line); }
  .card-tbl thead th { color:var(--dim); font-weight:600; font-size:13px; }
  /* sticky namn-kolumn */
  .card-tbl .name { position:sticky; left:0; z-index:2; text-align:left;
    background:var(--card); padding-left:2px; padding-right:10px; min-width:96px; }
  .card-tbl thead .name, .card-tbl .parrow .name { background:var(--card); }
  .card-tbl tbody tr.me .name { background:#1a4c38; }
  .card-tbl tbody tr.me td { background:#153f2f; }
  .me-tag { color:var(--dim); font-size:11px; font-weight:600; }
  .parrow td, .parrow th { color:var(--dim); font-size:13px; font-weight:600;
    border-bottom:2px solid var(--line); }
  .hcol { min-width:30px; }
  .totcol { min-width:40px; font-weight:800; }
  td.tot { font-weight:800; }
  td.tot.under { color:var(--good); }
  td.tot.over  { color:var(--danger); }
  td.empty { color:var(--dim); }
  /* score-form runt siffran (klassisk golf-notation) */
  .mk { display:inline-flex; align-items:center; justify-content:center;
        width:24px; height:24px; line-height:1; font-weight:700; }
  .mk.birdie { border:1.6px solid var(--ink); border-radius:50%; }
  .mk.eagle  { border:1.6px solid var(--ink); border-radius:50%;
               box-shadow:0 0 0 2px var(--card), 0 0 0 3.6px var(--ink); }
  .mk.bogey  { border:1.6px solid var(--ink); border-radius:3px; }
  .mk.dbl    { border:1.6px solid var(--ink); border-radius:3px;
               box-shadow:0 0 0 2px var(--card), 0 0 0 3.6px var(--ink); }
  /* extra luft i cellen så dubbelringarna får plats */
  .card-tbl tbody td.sc { padding:9px 6px; }

  /* gemensam flik-rad (samma på alla sidor) */
  .tabs { position:fixed; left:0; right:0; bottom:0; z-index:1200; display:flex; gap:6px;
    background:var(--card); border-top:1px solid var(--line);
    padding:6px 10px calc(env(safe-area-inset-bottom) + 6px); }
  .tabs a { flex:1; text-align:center; text-decoration:none; color:var(--dim);
    font-size:12px; font-weight:600; padding:5px 0 3px; border-radius:10px; }
  .tabs a .ico { display:block; font-size:20px; }
  .tabs a.active { color:var(--ink); background:#1a4c38; }
</style>
</head>
<body>
<div id="app"></div>
<nav class="tabs">
  <a href="./index.html"><span class="ico">⛳</span>Logga slag</a>
  <a href="./karta.html"><span class="ico">🗺</span>Karta</a>
  <a href="./oversikt.html" class="active"><span class="ico">📋</span>Översikt</a>
</nav>
<script src="./round.js"></script>
<!-- Live-scoring: samma tre script som Logga slag. Ger leaderboard-modellen. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./score.js"></script>
<script src="./live.js"></script>
<script>
"use strict";
/* Enkel live-överblick UNDER rundan: ett molnbaserat scorekort som visar hur
   det går för mig och de andra i bollen, hål för hål och totalt. Djupanalysen
   (SG, insikter) bor i den kommande Analys-fliken (oversikt-analys.html).

   Data: SGLive.subscribeLeaderboard(gameId, cb, {par}) i live.js. Modellen per
   spelare: { uid, name, total, thru, toPar, holes{spelarhål 1–18: score} }.
   Par per spelarhål slås upp ur burlov.json + SGRound (samma som gamla vyn). */
const { GLOBAL_BASE, LOOP_SHORT } = SGRound;

let LIVE = null;
try { LIVE = JSON.parse(localStorage.getItem("sg-live-v1")); } catch (e) {}
const liveOn = () => !!(LIVE && LIVE.gameId && typeof SGLive !== "undefined");

let LB = null;            // senaste leaderboard-modellen
let myUid = null;         // egen uid → markera egen rad
let seq = [];             // spelarhål 1–18 i vald runda (globala nummer)
let parByRel = {};        // { spelarhål 1–18: par }
let lbSubscribed = false, lbUnsub = null;

function esc(s) { return String(s).replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
const fmtDiff = d => d === 0 ? "E" : (d > 0 ? "+" + d : String(d));

/* ---------- score-notation ---------- */
// t = spelarens score på hålet, par = hålets par. Ritar form runt siffran.
function scoreCell(t, par) {
  if (!t) return `<td class="sc empty">·</td>`;
  if (par == null) return `<td class="sc">${t}</td>`;
  const d = t - par;
  let cls = "";                                   // par (0) → ingen form
  if (d <= -2) cls = "eagle";                     // eagle eller bättre (albatross ryms här)
  else if (d === -1) cls = "birdie";
  else if (d === 1) cls = "bogey";
  else if (d >= 2) cls = "dbl";                   // dubbelbogey eller sämre
  return `<td class="sc">${cls ? `<span class="mk ${cls}">${t}</span>` : t}</td>`;
}

/* ---------- bandata (par per spelarhål) ---------- */
let coursePromise = null;
function loadCourse() {
  if (coursePromise) return coursePromise;
  coursePromise = fetch("./data/burlov.json", { cache: "no-cache" })
    .then(r => r.json())
    .then(data => {
      const by = {};
      for (const h of data.holes) by[GLOBAL_BASE[h.loop] + h.hole] = h;
      return by;
    })
    .catch(() => ({}));   // par visas som – om bandata saknas
  return coursePromise;
}

/* ---------- live-prenumeration ---------- */
function startLeaderboard() {
  if (lbSubscribed || !liveOn()) return;
  lbSubscribed = true;
  SGLive.initLive().then(r => { myUid = r.uid; render(); }).catch(() => {});
  try {
    lbUnsub = SGLive.subscribeLeaderboard(LIVE.gameId, rows => {
      LB = rows; render();
    }, { par: parByRel });
  } catch (e) { lbSubscribed = false; }
}
window.addEventListener("pagehide", () => { if (lbUnsub) lbUnsub(); });

/* ---------- vyer ---------- */
function emptyView() {
  return `<div class="card empty-cta">
    <span class="ico">📋</span>
    <p class="big">Ingen aktiv match</p>
    <p class="txt">Skapa eller gå med i en match under <b>Logga slag</b> så visas
      ett live-scorekort här — hur det går för dig och de andra i bollen, hål för hål.</p>
    <a class="btn" href="./index.html">⛳ Gå till Logga slag</a>
  </div>`;
}

function scorecardHtml() {
  const head = `<div class="card"><h2>🏆 Live-scorekort <span class="note">kod ${esc(LIVE.code || "")}</span></h2>`;
  if (!LB) return head + `<div class="hint left">Ansluter …</div></div>`;
  if (!LB.length) return head + `<div class="hint left">Ingen har fört score än.</div></div>`;

  // kolumner = spelarhål 1..N; visa bara hål som ingår i rundan
  const holeHdr = seq.map((g, i) => `<th class="hcol">${i + 1}</th>`).join("");
  let totPar = 0;
  const parCells = seq.map((g, i) => {
    const p = parByRel[i + 1];
    if (p != null) totPar += p;
    return `<td class="hcol">${p != null ? p : "–"}</td>`;
  }).join("");

  const body = LB.map(p => {
    const mine = myUid && p.uid === myUid;
    const cells = seq.map((g, i) => {
      const rel = i + 1;
      return scoreCell(p.holes ? p.holes[rel] : null, parByRel[rel]);
    }).join("");
    const tpCls = p.thru && p.toPar < 0 ? "under" : p.thru && p.toPar > 0 ? "over" : "";
    const tp = p.thru ? fmtDiff(p.toPar) : "–";
    return `<tr class="${mine ? "me" : ""}">
      <td class="name">${esc(p.name || "—")}${mine ? ' <span class="me-tag">(du)</span>' : ""}</td>
      ${cells}
      <td class="tot totcol ${tpCls}">${tp}</td>
    </tr>`;
  }).join("");

  return head + `<div class="scroll"><table class="card-tbl">
    <thead>
      <tr><th class="name">Hål</th>${holeHdr}<th class="totcol">Tot</th></tr>
      <tr class="parrow"><td class="name">Par</td>${parCells}<td class="totcol">${totPar || "–"}</td></tr>
    </thead>
    <tbody>${body}</tbody>
  </table></div>
  <div class="hint left">Total = mot par. Cirkel = birdie · dubbelcirkel = eagle+ · kvadrat = bogey · dubbelkvadrat = dubbel+.</div>
  </div>`;
}

async function render() {
  const roundName = SGRound.roundName();
  seq = SGRound.seq();
  const byGlobal = await loadCourse();
  parByRel = {};
  seq.forEach((g, i) => {
    const h = byGlobal[g];
    if (h && h.par != null) parByRel[i + 1] = h.par;
  });

  const app = document.getElementById("app");
  if (!liveOn()) {
    app.innerHTML = `<h1>Översikt</h1>
      <p class="sub">Live-scorekort under rundan</p>
      ${emptyView()}`;
    return;
  }
  app.innerHTML = `<h1>Översikt</h1>
    <p class="sub">runda ${roundName} · live</p>
    ${scorecardHtml()}`;

  startLeaderboard();   // prenumerera en gång när par-listan finns
}
render();
window.addEventListener("pageshow", render);
</script>
<script>
/* Håll navigeringen inne i hemskärms-appen (iOS standalone): utan detta öppnar
   iOS länkar till andra sidor i en Safari-ruta. Vi fångar interna länkklick och
   navigerar via location, vilket behåller helskärmsläget. */
(function () {
  var standalone = ("standalone" in navigator && navigator.standalone)
    || matchMedia("(display-mode: standalone)").matches;
  if (!standalone) return;
  document.addEventListener("click", function (e) {
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
    var url = new URL(a.getAttribute("href"), location.href);
    if (url.origin !== location.origin) return;
    e.preventDefault();
    location.href = url.href;
  });
})();
</script>
</body>
</html>
