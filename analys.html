<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c2e22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Analys">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="./boot.js"></script>
<title>Analys · efter rundan</title>
<style>
  :root { --bg:#0c2e22; --card:#123c2d; --ink:#e8f5ec; --dim:#9fc4ae;
          --line:#1f5540; --accent:#37b06b; --accent-ink:#06180f;
          --warn:#e8c34a; --danger:#e26a5a; --good:#7ee2a8; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    touch-action:manipulation; overscroll-behavior:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right)
            env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #app { max-width:480px; margin:0 auto; padding:12px 14px 96px; }
  h1 { font-size:22px; margin:10px 0 2px; }
  h2 { font-size:15px; margin:8px 0 10px; }
  h2 .note { color:var(--dim); font-weight:400; font-size:12px; }
  .sub { color:var(--dim); font-size:14px; margin:0 0 14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:10px 14px; margin:10px 0; }
  /* hero — rundans facit i en blick */
  .kpis { display:flex; gap:6px; text-align:center; padding:4px 0 6px; }
  .kpi { flex:1; }
  .kpi .big { display:block; font-size:26px; font-weight:800; line-height:1.1; }
  .kpi .lbl { display:block; color:var(--dim); font-size:12px; margin-top:2px; }
  .kpi .sml { display:block; color:var(--dim); font-size:11px; }
  .pos { color:var(--good); } .neg { color:var(--danger); } .warnc { color:var(--warn); }
  /* insikter */
  .insight { display:flex; gap:8px; font-size:14px; margin:7px 0; line-height:1.35; }
  .insight .ico { flex:none; }
  /* green-precisionskarta */
  .greenwrap { display:flex; flex-direction:column; align-items:center; }
  .greenwrap svg { width:100%; max-width:300px; height:auto; touch-action:none; }
  .missgrid { display:flex; gap:6px; text-align:center; width:100%; margin-top:8px; }
  .missbox { flex:1; background:#0e3326; border-radius:10px; padding:7px 4px; }
  .missbox .mv { font-size:19px; font-weight:800; }
  .missbox .ml { color:var(--dim); font-size:11px; }
  /* fairway-korridor */
  .corridor { position:relative; height:54px; background:#0e3326; border-radius:10px;
    margin:8px 0 4px; overflow:hidden; }
  .corridor .mid { position:absolute; left:50%; top:0; bottom:0; width:2px;
    background:var(--accent); opacity:.6; }
  .corridor .dot { position:absolute; top:50%; width:9px; height:9px; margin:-5px 0 0 -5px;
    border-radius:50%; background:var(--warn); }
  .fairnote { color:var(--dim); font-size:12px; line-height:1.35; margin-top:4px; }
  /* scorefördelning */
  .distrow { display:flex; align-items:center; gap:8px; margin:7px 0; }
  .distlbl { width:64px; font-size:13px; color:var(--dim); }
  .distbar { flex:1; height:14px; background:#0e3326; border-radius:7px; overflow:hidden; }
  .distfill { height:100%; border-radius:7px; }
  .distn { width:24px; text-align:right; font-size:13px; font-weight:700; }
  /* par-snitt */
  .pargrid { display:flex; gap:6px; text-align:center; }
  .parbox { flex:1; background:#0e3326; border-radius:10px; padding:8px 4px; }
  .parbox .plbl { color:var(--dim); font-size:12px; }
  .parbox .pavg { font-size:20px; font-weight:800; margin:2px 0; }
  .parbox .pdiff { font-size:12px; font-weight:700; }
  /* hål-tabell */
  table { width:100%; border-collapse:collapse; font-size:15px; }
  th, td { text-align:right; padding:7px 5px; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--dim); font-weight:600; font-size:13px; }
  td.under { color:var(--good); font-weight:700; }
  td.over { color:var(--danger); font-weight:700; }
  td.empty { color:var(--dim); }
  .gir-y { color:var(--good); } .gir-n { color:var(--dim); }
  .total td { font-weight:800; border-bottom:none; }
  .hint { color:var(--dim); font-size:13px; text-align:center; margin-top:10px; }
  .hint.left { text-align:left; margin:6px 0 0; }
  .empty-cta { text-align:center; padding:26px 14px; }
  .empty-cta .ico { font-size:44px; display:block; margin-bottom:8px; }
  .empty-cta .big { font-size:16px; font-weight:700; margin:0 0 6px; }
  .empty-cta .txt { color:var(--dim); font-size:14px; line-height:1.4; margin:0 0 14px; }
  .empty-cta a.btn { display:inline-block; text-decoration:none; background:var(--accent);
    color:var(--accent-ink); font-weight:800; font-size:15px; padding:11px 22px; border-radius:12px; }
  /* gemensam flik-rad (samma på alla sidor) */
  .tabs { position:fixed; left:0; right:0; bottom:0; z-index:1200; display:flex; gap:6px;
    background:var(--card); border-top:1px solid var(--line);
    padding:6px 10px calc(env(safe-area-inset-bottom) + 6px); }
  @supports (height: 100lvh) {
    @media (display-mode: standalone) {
      body { height: 100lvh; display: flex; flex-direction: column;
             overflow: hidden; padding: 0; }
      #app { flex: 1 1 auto; min-height: 0; overflow-y: auto;
             -webkit-overflow-scrolling: touch;
             padding: calc(env(safe-area-inset-top) + 12px)
                      calc(env(safe-area-inset-right) + 14px) 16px
                      calc(env(safe-area-inset-left) + 14px); }
      .tabs { position: static; padding: 6px 10px 8px; }
    }
  }
  .tabs a { flex:1; text-align:center; text-decoration:none; color:var(--dim);
    font-size:12px; font-weight:600; padding:5px 0 3px; border-radius:10px; }
  .tabs a .ico { display:block; font-size:20px; }
  .tabs a.active { color:var(--ink); background:#1a4c38; }
</style>
</head>
<body>
<div id="app"></div>
<nav class="tabs">
  <a href="./index.html"><span class="ico">⛳</span>Logga slag</a>
  <a href="./karta.html"><span class="ico">🗺</span>Karta</a>
  <a href="./oversikt.html"><span class="ico">📋</span>Översikt</a>
  <a href="./analys.html" class="active"><span class="ico">📊</span>Analys</a>
</nav>
<script src="./round.js"></script>
<script src="./analys-core.js"></script>
<script>
"use strict";
/* "Efter rundan"-analys — HELT klient-sida (ingen PC/server/tunnel). Läser den
   senast loggade rundan ur localStorage (sg-rundlogg-v1) + banans burlov.json,
   räknar nyckelmått och missriktningar via AnalysCore (analys-core.js) och
   visualiserar dem. Se ANALYS_MOBIL_V1_BRIEF.md. */
const { GLOBAL_BASE, LOOP_SHORT } = SGRound;
const KEY = "sg-rundlogg-v1";

function esc(s) { return String(s).replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
const fmtDiff = d => d === 0 ? "E" : (d > 0 ? "+" + d : String(d));
const pct = v => v == null ? "–" : Math.round(v) + "%";

function loadState() { try { return JSON.parse(localStorage.getItem(KEY)); } catch (e) { return null; } }
let coursePromise = null;
function loadCourse() {
  if (coursePromise) return coursePromise;
  coursePromise = fetch("./data/burlov.json", { cache: "no-cache" })
    .then(r => r.json())
    .then(data => { const by = {}; for (const h of data.holes) by[GLOBAL_BASE[h.loop] + h.hole] = h; return by; })
    .catch(() => ({}));
  return coursePromise;
}

/* ---------- kort ---------- */
function heroHtml(A) {
  const diff = A.nPlayed && A.totPar
    ? `<span class="big ${A.totScore - A.totPar < 0 ? "pos" : A.totScore - A.totPar > 0 ? "neg" : ""}">${fmtDiff(A.totScore - A.totPar)}</span>`
    : `<span class="big">–</span>`;
  return `<div class="card"><div class="kpis">
    <div class="kpi"><span class="big">${A.totScore || "–"}</span><span class="lbl">score</span></div>
    <div class="kpi">${diff}<span class="lbl">mot par</span></div>
    <div class="kpi"><span class="big ${A.gir.pct >= 50 ? "pos" : ""}">${pct(A.gir.pct)}</span>
      <span class="lbl">GIR</span><span class="sml">${A.gir.hit}/${A.gir.known}</span></div>
    <div class="kpi"><span class="big ${A.scramble.pct >= 50 ? "pos" : ""}">${pct(A.scramble.pct)}</span>
      <span class="lbl">scrambling</span><span class="sml">${A.scramble.ok}/${A.scramble.elig}</span></div>
  </div></div>`;
}

function insightsHtml(A) {
  const L = [];
  if (A.gir.known >= 4 && A.gir.pct != null)
    L.push(A.gir.pct >= 55 ? ["🎯", `${pct(A.gir.pct)} GIR — du hittade greenerna.`]
      : A.gir.pct <= 33 ? ["🔻", `Bara ${pct(A.gir.pct)} GIR — inspelen var rundans läcka.`] : null);
  if (A.scramble.elig >= 3 && A.scramble.pct != null)
    L.push(A.scramble.pct >= 50 ? ["💪", `${pct(A.scramble.pct)} scrambling — räddade par när greenen missades.`]
      : ["⚠️", `${pct(A.scramble.pct)} scrambling — närspelet läckte efter missad green.`]);
  if (A.putts.three >= 2) L.push(["🟡", `${A.putts.three} trepputtar kostade rundan slag.`]);
  if (A.approach.n >= 4) {
    const m = A.approach;
    const sideN = Math.max(m.left, m.right), lr = m.right >= m.left ? "höger" : "vänster";
    const sc = Math.max(m.short, m.long), sl = m.long >= m.short ? "långt" : "kort";
    if (sideN >= 3) L.push(["📐", `Inspelen missar oftast åt ${lr} (${sideN} av ${m.n}).`]);
    else if (sc >= 3) L.push(["📐", `Inspelen missar oftast ${sl} (${sc} av ${m.n}).`]);
  }
  if (A.worstHole && A.worstHole.d >= 3) L.push(["💥", `Hål ${A.worstHole.i} kostade +${A.worstHole.d} ensamt.`]);
  const lines = L.filter(Boolean).slice(0, 3);
  return lines.length ? `<div class="card"><h2>Rundans berättelse</h2>
    ${lines.map(l => `<div class="insight"><span class="ico">${l[0]}</span><span>${l[1]}</span></div>`).join("")}
  </div>` : "";
}

// Green-precisionskarta: pin i mitten, varje inspel en prick (kort/lång × V/H).
function greenMapHtml(A) {
  const m = A.approach;
  if (!m.n) return `<div class="card"><h2>Green-precision</h2>
    <div class="hint left">Inga inspel med känd pin i rundan än. Markera pinnen på hålen
    (Logga slag → MARKERA PINN) så placeras dina inspel här: kort/lång och vänster/höger.</div></div>`;

  const C = 150, RMAX = 120;                 // svg-centrum + yttre radie (px)
  const maxDist = Math.max(12, ...m.pts.map(p => Math.hypot(p.along, p.cross)));
  const ringM = maxDist <= 15 ? 5 : maxDist <= 30 ? 10 : 20;   // ringavstånd i meter
  const nRings = Math.ceil(maxDist / ringM);
  const sc = RMAX / (nRings * ringM);        // meter → px
  const rings = Array.from({ length: nRings }, (_, i) =>
    `<circle cx="${C}" cy="${C}" r="${((i + 1) * ringM * sc).toFixed(1)}"
      fill="none" stroke="#1f5540" stroke-width="1"/>`).join("");
  const dots = m.pts.map(p => {
    let x = p.cross * sc, y = -p.along * sc;                    // lång = uppåt
    const r = Math.hypot(x, y); if (r > RMAX) { x *= RMAX / r; y *= RMAX / r; }
    const col = p.onGreen ? "var(--good)" : "var(--warn)";
    return `<circle cx="${(C + x).toFixed(1)}" cy="${(C + y).toFixed(1)}" r="4.5"
      fill="${col}" fill-opacity="0.9" stroke="#0c2e22" stroke-width="1"/>`;
  }).join("");
  const svg = `<svg viewBox="0 0 300 300" role="img" aria-label="Green-precisionskarta">
    <line x1="${C}" y1="18" x2="${C}" y2="282" stroke="#1f5540" stroke-width="1"/>
    <line x1="18" y1="${C}" x2="282" y2="${C}" stroke="#1f5540" stroke-width="1"/>
    ${rings}${dots}
    <circle cx="${C}" cy="${C}" r="3.5" fill="var(--accent)"/>
    <text x="${C}" y="14" fill="#9fc4ae" font-size="12" text-anchor="middle">Lång</text>
    <text x="${C}" y="296" fill="#9fc4ae" font-size="12" text-anchor="middle">Kort</text>
    <text x="6" y="${C - 4}" fill="#9fc4ae" font-size="12" text-anchor="start">V</text>
    <text x="294" y="${C - 4}" fill="#9fc4ae" font-size="12" text-anchor="end">H</text>
    <text x="${C + 4}" y="${C - 6}" fill="#9fc4ae" font-size="10" text-anchor="start">pin</text>
  </svg>`;
  const box = (v, l) => `<div class="missbox"><div class="mv">${v}</div><div class="ml">${l}</div></div>`;
  return `<div class="card"><h2>Green-precision <span class="note">${m.n} inspel · ${m.onGreen} på green</span></h2>
    <div class="greenwrap">${svg}
      <div class="missgrid">${box(m.short, "kort")}${box(m.long, "lång")}${box(m.left, "vänster")}${box(m.right, "höger")}</div>
    </div>
    <div class="hint left">Ringar var ${ringM} m. Gula = missad green, gröna = träff. Missar räknas utanför ±2 m.</div>
  </div>`;
}

function fairwayHtml(A, hasFairways) {
  const t = A.tee;
  if (!t.n) return "";
  const dots = t.pts.map(v => {
    const clamp = Math.max(-40, Math.min(40, v));
    const left = 50 + clamp / 40 * 48;
    return `<div class="dot" style="left:${left.toFixed(1)}%"></div>`;
  }).join("");
  const head = hasFairways
    ? `<h2>Fairway-precision <span class="note">${t.n} utslag</span></h2>`
    : `<h2>Utslagens sidled <span class="note">${t.n} utslag (par 4/5)</span></h2>`;
  const note = hasFairways
    ? `<div class="fairnote">Vänster / på fairway / höger, mot hålets mittlinje.</div>`
    : `<div class="fairnote">🚧 Fairwayträff (på/utanför) aktiveras när banans fairway-polygoner
       lagts till (A0). Visar tills vidare utslagens sidled mot hålets mittlinje.</div>`;
  const box = (v, l) => `<div class="missbox"><div class="mv">${v}</div><div class="ml">${l}</div></div>`;
  return `<div class="card">${head}
    <div class="corridor"><div class="mid"></div>${dots}</div>
    <div class="missgrid">${box(t.left, "vänster")}${box(t.n - t.left - t.right, "mitten")}${box(t.right, "höger")}</div>
    ${note}
  </div>`;
}

function puttHtml(A) {
  if (!A.nPlayed) return "";
  const box = (v, l) => `<div class="parbox"><div class="plbl">${l}</div><div class="pavg">${v}</div></div>`;
  return `<div class="card"><h2>Puttning</h2><div class="pargrid">
    ${box(A.putts.total || "–", "puttar")}
    ${box(A.putts.three, "trepputt")}
    ${box(A.putts.one, "enpputt")}
    ${box(A.putts.perGir != null ? A.putts.perGir.toFixed(2) : "–", "putt/GIR")}
  </div></div>`;
}

function distHtml(A) {
  if (!A.nPlayed) return "";
  const rows = [["Birdie+", A.dist.birdie, "var(--good)"], ["Par", A.dist.par, "var(--accent)"],
    ["Bogey", A.dist.bogey, "var(--warn)"], ["Dubbel+", A.dist.dbl, "var(--danger)"]];
  return `<div class="card"><h2>Scorefördelning</h2>
    ${rows.map(([lbl, n, col]) => `<div class="distrow">
      <span class="distlbl">${lbl}</span>
      <div class="distbar"><div class="distfill" style="width:${(n / A.nPlayed * 100).toFixed(0)}%;background:${col}"></div></div>
      <span class="distn">${n}</span></div>`).join("")}
  </div>`;
}

function parHtml(A) {
  const boxes = [3, 4, 5].filter(p => A.byPar[p] && A.byPar[p].n).map(p => {
    const b = A.byPar[p], avg = b.sum / b.n, d = avg - p;
    return `<div class="parbox"><div class="plbl">Par ${p}</div>
      <div class="pavg">${avg.toFixed(1)}</div>
      <div class="pdiff ${d < -0.05 ? "pos" : d > 0.05 ? "neg" : ""}">${d > 0 ? "+" : ""}${d.toFixed(1)}</div></div>`;
  });
  return boxes.length ? `<div class="card"><h2>Snitt per parvärde</h2><div class="pargrid">${boxes.join("")}</div></div>` : "";
}

function tableHtml(rows, A) {
  return `<div class="card" style="padding:6px 14px"><table>
    <tr><th>Hål</th><th>Par</th><th>Score</th><th>Putt</th><th>GIR</th><th>+/−</th></tr>
    ${rows}
    <tr class="total"><td>Totalt</td><td>${A.totPar || "–"}</td><td>${A.totScore || "–"}</td>
      <td>${A.totPutts || "–"}</td><td>${A.gir.hit}/${A.gir.known}</td>
      <td>${A.nPlayed && A.totPar ? fmtDiff(A.totScore - A.totPar) : "–"}</td></tr>
  </table></div>`;
}

function emptyView() {
  return `<div class="card empty-cta"><span class="ico">📊</span>
    <p class="big">Ingen runda att analysera än</p>
    <p class="txt">Logga en runda under <b>Logga slag</b> — markera pinnen på hålen för
      bästa green-precision. Analysen räknas direkt i telefonen, helt utan uppkoppling.</p>
    <a class="btn" href="./index.html">⛳ Gå till Logga slag</a></div>`;
}

async function render() {
  const S = loadState();
  const seq = SGRound.seq();
  const byGlobal = await loadCourse();
  const hasFairways = Object.values(byGlobal).some(h => h.fairways && h.fairways.length);

  const results = [];
  const trows = [];
  seq.forEach((g, i) => {
    const rel = i + 1;
    const band = byGlobal[g];
    const res = AnalysCore.holeAnalysis(S && S.holes ? S.holes[String(rel)] : null, band);
    results.push(res);
    if (res.played) {
      const par = res.par, d = par != null ? res.score - par : null;
      const diffCell = d == null ? `<td class="empty">–</td>`
        : d === 0 ? `<td>E</td>` : `<td class="${d < 0 ? "under" : "over"}">${fmtDiff(d)}</td>`;
      const gir = res.girKnown ? (res.gir ? `<span class="gir-y">●</span>` : `<span class="gir-n">○</span>`) : "–";
      trows.push(`<tr><td>${rel}${band ? ` <span style="color:var(--dim);font-size:12px">${LOOP_SHORT[band.loop] || ""} ${band.hole}</span>` : ""}</td>
        <td>${par != null ? par : "–"}</td><td>${res.score}</td>
        <td${res.putts ? "" : ' class="empty"'}>${res.putts || "–"}</td>
        <td>${gir}</td>${diffCell}</tr>`);
    }
  });
  const A = AnalysCore.aggregate(results);

  const app = document.getElementById("app");
  if (!A.nPlayed) { app.innerHTML = `<h1>Analys</h1><p class="sub">efter rundan</p>${emptyView()}`; return; }

  const sub = S && S.player ? `${esc(S.player)} · runda ${SGRound.roundName()}` : `runda ${SGRound.roundName()}`;
  const exNote = A.precExcluded
    ? `<div class="hint left">Precisionen (green/utslag) baseras på hål utan plikt/manuell justering — ${A.precExcluded} hål uteslutna.</div>`
    : "";
  app.innerHTML = `<h1>Analys</h1>
    <p class="sub">${sub} · ${A.nPlayed} hål</p>
    ${heroHtml(A)}
    ${insightsHtml(A)}
    ${greenMapHtml(A)}
    ${fairwayHtml(A, hasFairways)}
    ${puttHtml(A)}
    ${distHtml(A)}
    ${parHtml(A)}
    ${tableHtml(trows.join(""), A)}
    ${exNote}
    <div class="hint">Allt räknat i telefonen — ingen PC eller uppkoppling behövs.</div>`;
}
render();
window.addEventListener("pageshow", render);
</script>
<script>
/* Håll navigeringen inne i hemskärms-appen (iOS standalone) — annars öppnas
   interna länkar i en Safari-ruta. Ingen effekt i vanlig webbläsare. */
(function () {
  var standalone = ("standalone" in navigator && navigator.standalone)
    || matchMedia("(display-mode: standalone)").matches;
  if (!standalone) return;
  document.addEventListener("click", function (e) {
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
    var url = new URL(a.getAttribute("href"), location.href);
    if (url.origin !== location.origin) return;
    e.preventDefault();
    location.href = url.href;
  });
})();
</script>
</body>
</html>
