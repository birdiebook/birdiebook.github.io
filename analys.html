<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c2e22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Analys">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="./boot.js"></script>
<title>Analys</title>
<style>
  :root { --bg:#0c2e22; --card:#123c2d; --ink:#e8f5ec; --dim:#9fc4ae;
          --line:#1f5540; --accent:#37b06b; --accent-ink:#06180f;
          --miss:#e0a64e; --danger:#e26a5a; --good:#7ee2a8; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    touch-action:manipulation; overscroll-behavior:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right)
            env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #app { max-width:480px; margin:0 auto; padding:14px 16px 96px; }
  h1 { font-size:21px; font-weight:700; margin:8px 0 2px; letter-spacing:.2px; }
  h2 { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.6px;
       color:var(--dim); margin:0 0 12px; }
  .sub { color:var(--dim); font-size:14px; margin:0 0 16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px;
          padding:14px 16px; margin:12px 0; }
  /* hero — fyra nyckeltal */
  .kpis { display:flex; }
  .kpi { flex:1; text-align:center; position:relative; }
  .kpi + .kpi::before { content:""; position:absolute; left:0; top:12%; bottom:12%;
    width:1px; background:var(--line); }
  .kpi .big { display:block; font-size:27px; font-weight:700; line-height:1.15;
    font-variant-numeric:tabular-nums; }
  .kpi .lbl { display:block; color:var(--dim); font-size:11px; margin-top:3px;
    text-transform:uppercase; letter-spacing:.5px; }
  .kpi .sml { display:block; color:var(--dim); font-size:11px; margin-top:1px;
    font-variant-numeric:tabular-nums; }
  .pos { color:var(--good); } .neg { color:var(--danger); }
  /* green-precisionskarta */
  .greenwrap { display:flex; flex-direction:column; align-items:center; }
  .greenwrap svg { width:100%; max-width:280px; height:auto; }
  .missgrid { display:flex; gap:8px; width:100%; margin-top:12px; }
  .missbox { flex:1; text-align:center; }
  .missbox .mv { font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; }
  .missbox .ml { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.4px; }
  .subline { color:var(--dim); font-size:13px; text-align:center; margin-top:12px;
    font-variant-numeric:tabular-nums; }
  /* fairway-korridor */
  .corridor { position:relative; height:48px; background:#0e3326; border-radius:10px;
    margin:6px 0 12px; overflow:hidden; }
  .corridor .mid { position:absolute; left:50%; top:0; bottom:0; width:2px;
    background:var(--accent); opacity:.5; }
  .corridor .dot { position:absolute; top:50%; width:8px; height:8px; margin:-4px 0 0 -4px;
    border-radius:50%; }
  .foot { color:var(--dim); font-size:12px; line-height:1.4; margin-top:2px; }
  /* enkla rader (scorefördelning) */
  .row { display:flex; align-items:center; gap:10px; margin:9px 0; }
  .row .rl { width:110px; font-size:13px; color:var(--dim); }
  .row .bar { flex:1; height:10px; background:#0e3326; border-radius:5px; overflow:hidden; }
  .row .bar > i { display:block; height:100%; border-radius:5px; }
  .row .rn { width:26px; text-align:right; font-size:13px; font-weight:700;
    font-variant-numeric:tabular-nums; }
  .cells { display:flex; gap:8px; text-align:center; }
  .cell { flex:1; }
  .cell .cv { font-size:19px; font-weight:700; font-variant-numeric:tabular-nums; }
  .cell .cd { font-size:12px; font-weight:600; }
  .cell .cl { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.4px; }
  /* hål-tabell */
  table { width:100%; border-collapse:collapse; font-size:15px;
    font-variant-numeric:tabular-nums; }
  th, td { text-align:right; padding:8px 4px; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--dim); font-weight:600; font-size:12px; text-transform:uppercase;
    letter-spacing:.4px; }
  td.under { color:var(--good); } td.over { color:var(--danger); } td.dimc { color:var(--dim); }
  .gy { color:var(--good); } .gn { color:var(--dim); }
  .total td { font-weight:700; border-bottom:none; }
  .note { color:var(--dim); font-size:12px; line-height:1.4; margin:10px 2px 0; }
  .empty { text-align:center; padding:32px 16px; }
  .empty .big { font-size:16px; font-weight:700; margin:0 0 8px; }
  .empty .txt { color:var(--dim); font-size:14px; line-height:1.45; margin:0 0 16px; }
  .empty a.btn { display:inline-block; text-decoration:none; background:var(--accent);
    color:var(--accent-ink); font-weight:700; font-size:15px; padding:11px 22px; border-radius:12px; }
  /* flik-rad (ren text, samma på alla sidor) */
  .tabs { position:fixed; left:0; right:0; bottom:0; z-index:1200; display:flex;
    background:var(--card); border-top:1px solid var(--line);
    padding:6px 8px calc(env(safe-area-inset-bottom) + 6px); }
  @supports (height: 100lvh) {
    @media (display-mode: standalone) {
      body { height: 100lvh; display: flex; flex-direction: column;
             overflow: hidden; padding: 0; }
      #app { flex: 1 1 auto; min-height: 0; overflow-y: auto;
             -webkit-overflow-scrolling: touch;
             padding: calc(env(safe-area-inset-top) + 14px)
                      calc(env(safe-area-inset-right) + 16px) 16px
                      calc(env(safe-area-inset-left) + 16px); }
      .tabs { position: static; padding: 6px 8px 8px; }
    }
  }
  .tabs a { flex:1; text-align:center; text-decoration:none; color:var(--dim);
    font-size:12px; font-weight:600; padding:5px 0 3px; border-radius:10px; }
  .tabs a .ico { display:block; font-size:20px; }
  .tabs a.active { color:var(--ink); background:#1a4c38; }
</style>
</head>
<body>
<div id="app"></div>
<nav class="tabs">
  <a href="./index.html"><span class="ico">⛳</span>Logga slag</a>
  <a href="./karta.html"><span class="ico">🗺</span>Karta</a>
  <a href="./oversikt.html"><span class="ico">📋</span>Översikt</a>
  <a href="./analys.html" class="active"><span class="ico">📊</span>Analys</a>
</nav>
<script src="./round.js"></script>
<script src="./analys-core.js"></script>
<script>
"use strict";
/* Analys efter rundan — räknas helt i telefonen ur den senast loggade rundan
   (localStorage sg-rundlogg-v1) + banans burlov.json. Ingen PC/server/tunnel.
   Slag-modell och mått: analys-core.js (facit-speglad, se ANALYS_MOBIL_V1_BRIEF). */
const { GLOBAL_BASE, LOOP_SHORT } = SGRound;
const KEY = "sg-rundlogg-v1";

function esc(s) { return String(s).replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
const fmtDiff = d => d === 0 ? "E" : (d > 0 ? "+" + d : String(d));
const pct = v => v == null ? "–" : Math.round(v) + "%";
const m1 = v => v == null ? "–" : (v < 10 ? v.toFixed(1) : Math.round(v)) + " m";

function loadState() { try { return JSON.parse(localStorage.getItem(KEY)); } catch (e) { return null; } }
let coursePromise = null;
function loadCourse() {
  if (coursePromise) return coursePromise;
  coursePromise = fetch("./data/" + SGRound.mobileJson(), { cache: "no-cache" })
    .then(r => r.json())
    .then(data => { const by = {}; for (const h of data.holes) by[GLOBAL_BASE[h.loop] + h.hole] = h; return by; })
    .catch(() => ({}));
  return coursePromise;
}

/* ---------- kort ---------- */
function heroHtml(A) {
  const toPar = A.nPlayed && A.totPar ? A.totScore - A.totPar : null;
  const diff = toPar == null ? `<span class="big">–</span>`
    : `<span class="big ${toPar < 0 ? "pos" : toPar > 0 ? "neg" : ""}">${fmtDiff(toPar)}</span>`;
  const kpi = (big, lbl, sml, cls) =>
    `<div class="kpi"><span class="big ${cls || ""}">${big}</span><span class="lbl">${lbl}</span>${sml ? `<span class="sml">${sml}</span>` : ""}</div>`;
  return `<div class="card"><div class="kpis">
    ${kpi(A.totScore || "–", "Score", A.nPlayed ? A.nPlayed + " hål" : "")}
    <div class="kpi">${diff}<span class="lbl">Mot par</span></div>
    ${kpi(pct(A.gir.pct), "GIR", A.gir.known ? A.gir.hit + "/" + A.gir.known : "", A.gir.pct >= 50 ? "pos" : "")}
    ${kpi(pct(A.scramble.pct), "Scrambling", A.scramble.elig ? A.scramble.ok + "/" + A.scramble.elig : "", A.scramble.pct >= 50 ? "pos" : "")}
  </div></div>`;
}

// Green-precision: pin i mitten, inspelen placerade kort/lång × vänster/höger.
function greenMapHtml(A) {
  const m = A.approach;
  if (!m.n) return `<div class="card"><h2>Greenprecision</h2>
    <p class="foot">Inga inspel med känd pin och boll-på-green än. Markera pinnen
    och boll på green när du loggar, så visas här var och hur mycket inspelen missar.</p></div>`;

  const C = 140, RMAX = 112;
  const maxDist = Math.max(12, ...m.pts.map(p => Math.hypot(p.along, p.cross)));
  const ringM = maxDist <= 15 ? 5 : maxDist <= 30 ? 10 : 20;
  const nRings = Math.ceil(maxDist / ringM);
  const sc = RMAX / (nRings * ringM);
  const rings = Array.from({ length: nRings }, (_, i) =>
    `<circle cx="${C}" cy="${C}" r="${((i + 1) * ringM * sc).toFixed(1)}"
      fill="none" stroke="#1a4536" stroke-width="1"/>`).join("");
  const dots = m.pts.map(p => {
    let x = p.cross * sc, y = -p.along * sc;
    const r = Math.hypot(x, y); if (r > RMAX) { x *= RMAX / r; y *= RMAX / r; }
    const col = p.onGreen ? "var(--good)" : "var(--miss)";
    return `<circle cx="${(C + x).toFixed(1)}" cy="${(C + y).toFixed(1)}" r="4"
      fill="${col}" fill-opacity="0.92"/>`;
  }).join("");
  const svg = `<svg viewBox="0 0 280 280" role="img" aria-label="Green-precisionskarta">
    <line x1="${C}" y1="20" x2="${C}" y2="260" stroke="#1a4536" stroke-width="1"/>
    <line x1="20" y1="${C}" x2="260" y2="${C}" stroke="#1a4536" stroke-width="1"/>
    ${rings}${dots}
    <circle cx="${C}" cy="${C}" r="3" fill="var(--accent)"/>
    <text x="${C}" y="14" fill="#9fc4ae" font-size="11" text-anchor="middle">Lång</text>
    <text x="${C}" y="274" fill="#9fc4ae" font-size="11" text-anchor="middle">Kort</text>
    <text x="4" y="${C - 4}" fill="#9fc4ae" font-size="11">Vänster</text>
    <text x="276" y="${C - 4}" fill="#9fc4ae" font-size="11" text-anchor="end">Höger</text>
  </svg>`;
  const box = (v, l) => `<div class="missbox"><div class="mv">${v}</div><div class="ml">${l}</div></div>`;
  const misses = m.n - m.onGreen;
  const edge = misses && m.medEdge != null
    ? `<p class="subline">Missarna hamnade i snitt ${m1(m.medEdge)} utanför green.</p>` : "";
  return `<div class="card"><h2>Greenprecision</h2>
    <div class="greenwrap">${svg}
      <div class="missgrid">${box(m.short, "kort")}${box(m.long, "lång")}${box(m.left, "vänster")}${box(m.right, "höger")}</div>
    </div>
    <p class="subline">${m.onGreen} av ${m.n} inspel träffade green.</p>${edge}
  </div>`;
}

function fairwayHtml(A) {
  const t = A.tee;
  if (!t.n) return "";
  const box = (v, l) => `<div class="cell"><div class="cv">${v}</div><div class="cl">${l}</div></div>`;
  const dots = t.pts.map(v => {
    const left = 50 + Math.max(-40, Math.min(40, v)) / 40 * 48;
    return `<div class="dot" style="left:${left.toFixed(1)}%;background:var(--miss)"></div>`;
  }).join("");
  if (t.known) {                       // fairway-polygoner finns (burlov v2)
    return `<div class="card"><h2>Fairway</h2>
      <div class="corridor"><div class="mid"></div>${dots}</div>
      <div class="cells">${box(t.left, "vänster")}${box(t.hit, "fairway")}${box(t.right, "höger")}</div>
      <p class="subline">${pct(t.hitPct)} av utslagen på fairway.</p>
    </div>`;
  }
  return `<div class="card"><h2>Utslagens sidled</h2>
    <div class="corridor"><div class="mid"></div>${dots}</div>
    <div class="cells">${box(t.left, "vänster")}${box(t.n - t.left - t.right, "mitten")}${box(t.right, "höger")}</div>
    <p class="foot">Mot hålets mittlinje. Fairwayträff visas när banans fairway-ytor lagts till.</p>
  </div>`;
}

function puttHtml(A) {
  if (!A.nPlayed) return "";
  const box = (v, l) => `<div class="cell"><div class="cv">${v}</div><div class="cl">${l}</div></div>`;
  return `<div class="card"><h2>Puttning</h2><div class="cells">
    ${box(A.putts.total || "–", "puttar")}
    ${box(A.putts.three, "trepputt")}
    ${box(A.putts.one, "enpputt")}
    ${box(A.putts.perGir != null ? A.putts.perGir.toFixed(2) : "–", "putt/GIR")}
  </div></div>`;
}

function distHtml(A) {
  if (!A.nPlayed) return "";
  const rows = [["Birdie el. bättre", A.dist.birdie, "var(--good)"], ["Par", A.dist.par, "var(--accent)"],
    ["Bogey", A.dist.bogey, "var(--miss)"], ["Dubbel el. mer", A.dist.dbl, "var(--danger)"]];
  return `<div class="card"><h2>Scorefördelning</h2>
    ${rows.map(([l, n, col]) => `<div class="row">
      <span class="rl">${l}</span>
      <span class="bar"><i style="width:${(n / A.nPlayed * 100).toFixed(0)}%;background:${col}"></i></span>
      <span class="rn">${n}</span></div>`).join("")}
  </div>`;
}

function parHtml(A) {
  const boxes = [3, 4, 5].filter(p => A.byPar[p] && A.byPar[p].n).map(p => {
    const b = A.byPar[p], avg = b.sum / b.n, d = avg - p;
    return `<div class="cell"><div class="cl">Par ${p}</div>
      <div class="cv">${avg.toFixed(1)}</div>
      <div class="cd ${d < -0.05 ? "pos" : d > 0.05 ? "neg" : ""}">${d > 0 ? "+" : ""}${d.toFixed(1)}</div></div>`;
  });
  return boxes.length ? `<div class="card"><h2>Snitt per par</h2><div class="cells">${boxes.join("")}</div></div>` : "";
}

function tableHtml(rows, A) {
  return `<div class="card"><table>
    <tr><th>Hål</th><th>Par</th><th>Score</th><th>Putt</th><th>GIR</th><th>+/−</th></tr>
    ${rows}
    <tr class="total"><td>Totalt</td><td>${A.totPar || "–"}</td><td>${A.totScore || "–"}</td>
      <td>${A.totPutts || "–"}</td><td>${A.gir.hit}/${A.gir.known}</td>
      <td>${A.nPlayed && A.totPar ? fmtDiff(A.totScore - A.totPar) : "–"}</td></tr>
  </table></div>`;
}

function emptyView() {
  return `<div class="card empty">
    <p class="big">Ingen runda att analysera än</p>
    <p class="txt">Logga en runda under Logga slag — markera pinnen och boll på green
      för bästa greenprecision. Analysen räknas direkt i telefonen.</p>
    <a class="btn" href="./index.html">Gå till Logga slag</a></div>`;
}

async function render() {
  const S = loadState();
  const seq = SGRound.seq();
  const byGlobal = await loadCourse();

  const results = [];
  const trows = [];
  seq.forEach((g, i) => {
    const rel = i + 1;
    const band = byGlobal[g];
    const res = AnalysCore.holeAnalysis(S && S.holes ? S.holes[String(rel)] : null, band);
    results.push(res);
    if (res.played) {
      const par = res.par, d = par != null ? res.score - par : null;
      const diffCell = d == null ? `<td class="dimc">–</td>`
        : d === 0 ? `<td>E</td>` : `<td class="${d < 0 ? "under" : "over"}">${fmtDiff(d)}</td>`;
      const gir = res.girKnown ? (res.gir ? `<span class="gy">●</span>` : `<span class="gn">○</span>`) : "–";
      trows.push(`<tr><td>${rel}${band ? ` <span style="color:var(--dim);font-size:12px">${LOOP_SHORT[band.loop] || ""} ${band.hole}</span>` : ""}</td>
        <td>${par != null ? par : "–"}</td><td>${res.score}</td>
        <td${res.putts ? "" : ' class="dimc"'}>${res.putts || "–"}</td>
        <td>${gir}</td>${diffCell}</tr>`);
    }
  });
  const A = AnalysCore.aggregate(results);

  const app = document.getElementById("app");
  if (!A.nPlayed) { app.innerHTML = `<h1>Analys</h1><p class="sub">Efter rundan</p>${emptyView()}`; return; }

  const sub = S && S.player ? `${esc(S.player)} · runda ${SGRound.roundName()}` : `Runda ${SGRound.roundName()}`;
  const note = A.precExcluded
    ? `<p class="note">Green- och utslagsprecision räknas på hål utan plikt eller manuell justering — ${A.precExcluded} hål uteslutna.</p>`
    : "";
  app.innerHTML = `<h1>Analys</h1>
    <p class="sub">${sub} · ${A.nPlayed} hål</p>
    ${heroHtml(A)}
    ${greenMapHtml(A)}
    ${fairwayHtml(A)}
    ${puttHtml(A)}
    ${distHtml(A)}
    ${parHtml(A)}
    ${tableHtml(trows.join(""), A)}
    ${note}`;
}
render();
window.addEventListener("pageshow", render);
</script>
<script>
/* Håll navigeringen inne i hemskärms-appen (iOS standalone). */
(function () {
  var standalone = ("standalone" in navigator && navigator.standalone)
    || matchMedia("(display-mode: standalone)").matches;
  if (!standalone) return;
  document.addEventListener("click", function (e) {
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
    var url = new URL(a.getAttribute("href"), location.href);
    if (url.origin !== location.origin) return;
    e.preventDefault();
    location.href = url.href;
  });
})();
</script>
</body>
</html>
