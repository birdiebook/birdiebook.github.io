<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c2e22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rundlogg">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>SG Rundlogg</title>
<style>
  :root {
    --bg: #0c2e22; --card: #123c2d; --card2: #16412f;
    --ink: #e8f5ec; --dim: #9fc4ae; --line: #1f5540;
    --accent: #37b06b; --accent-ink: #06180f;
    --warn: #e8c34a; --danger: #e26a5a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    touch-action: manipulation; overscroll-behavior: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #app { max-width: 480px; margin: 0 auto; padding: 12px 14px 96px; }
  /* gemensam flik-rad (samma på alla sidor) */
  .tabs { position:fixed; left:0; right:0; bottom:0; z-index:1200; display:flex; gap:6px;
    background:var(--card); border-top:1px solid var(--line);
    padding:6px 10px calc(env(safe-area-inset-bottom) + 6px); }
  .tabs a { flex:1; text-align:center; text-decoration:none; color:var(--dim);
    font-size:12px; font-weight:600; padding:5px 0 3px; border-radius:10px; }
  .tabs a .ico { display:block; font-size:20px; }
  .tabs a.active { color:var(--ink); background:#1a4c38; }
  h1 { font-size: 22px; margin: 10px 0 2px; }
  .sub { color: var(--dim); font-size: 14px; margin: 0 0 14px; }
  .card { background: #123c2d; border: 1px solid var(--line); border-radius: 14px;
          padding: 14px; margin: 10px 0; }
  label { display: block; font-size: 13px; color: var(--dim); margin: 10px 0 4px; }
  input[type=text], select.field { width: 100%; font-size: 17px; padding: 12px; border-radius: 10px;
          border: 1px solid var(--line); background: #0e332656; color: var(--ink); }
  button { font-family: inherit; border: none; border-radius: 12px; cursor: pointer; }
  .big { width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
         background: var(--accent); color: var(--accent-ink); margin-top: 14px; }
  .big:disabled { opacity: .5; }
  .shotbtn { width: 100%; padding: 30px 16px; font-size: 26px; font-weight: 800;
         letter-spacing: 1px; background: var(--accent); color: var(--accent-ink);
         border-radius: 18px; box-shadow: 0 4px 0 #1d7a46; }
  .shotbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1d7a46; }
  .shotbtn:disabled { opacity: .6; }
  .ghost { background: #1a4c38; color: var(--ink); padding: 12px 14px; font-size: 15px; }
  .ghost.on { background: var(--warn); color: #221a02; font-weight: 700; }
  .link { background: none; color: var(--dim); text-decoration: underline;
          font-size: 14px; padding: 10px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row > * { flex: 1; }
  .colstack { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .colstack .ghost { flex: 1; }
  .holehead { display: flex; align-items: center; justify-content: space-between; margin: 6px 0; }
  .holehead button { background: #1a4c38; color: var(--ink); font-size: 22px;
          width: 52px; height: 52px; border-radius: 12px; flex: none; }
  .holehead .nr { font-size: 30px; font-weight: 800; }
  .gps { display: inline-block; font-size: 13px; padding: 4px 10px; border-radius: 99px;
         background: #0e3326; border: 1px solid var(--line); color: var(--dim); }
  .gps.good { color: #7ee2a8; } .gps.ok { color: var(--warn); } .gps.bad { color: var(--danger); }
  ul.shots { list-style: none; margin: 8px 0 0; padding: 0; }
  ul.shots li { display: flex; align-items: center; gap: 8px; padding: 9px 4px;
          border-top: 1px solid var(--line); font-size: 15px; }
  ul.shots li:first-child { border-top: none; }
  ul.shots .meta { color: var(--dim); font-size: 13px; margin-left: auto; }
  ul.shots .del { background: none; color: var(--danger); font-size: 18px;
          width: 36px; height: 36px; flex: none; }
  .step { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .step button { width: 56px; height: 56px; font-size: 26px; font-weight: 700;
          background: #1a4c38; color: var(--ink); flex: none; }
  .step .val { font-size: 26px; font-weight: 800; min-width: 40px; text-align: center; }
  .step .lbl { color: var(--dim); font-size: 14px; }
  .step button.holedbtn { width: auto; height: auto; flex: 1;
          padding: 12px; font-size: 15px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th, td { text-align: right; padding: 7px 6px; border-bottom: 1px solid var(--line); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--dim); font-weight: 600; font-size: 13px; }
  .total td { font-weight: 800; border-bottom: none; }
  .banner { background: #4a3413; border: 1px solid #7a5a1f; color: #f0d48a;
          border-radius: 10px; padding: 10px 12px; font-size: 14px; margin: 10px 0; }
  .hint { color: var(--dim); font-size: 13px; line-height: 1.5; }
  .ok-note { color: #7ee2a8; font-size: 14px; margin-top: 8px; }

  /* ===== Logga slag – revamp ===== */
  #app { display: flex; flex-direction: column; }
  /* header med rundade pilar + GPS-undertext */
  .holehead .htitle { text-align: center; flex: 1; }
  .holehead .htitle .nr { font-size: 30px; font-weight: 800; line-height: 1.05; }
  .holehead button { border-radius: 50%; font-size: 24px; background: #16412f;
          border: 1px solid var(--line); }
  .gpsprec { font-size: 13px; color: var(--dim); }
  .gpsprec.good { color: #7ee2a8; } .gpsprec.ok { color: var(--warn); } .gpsprec.bad { color: var(--danger); }

  /* stora logga-slag-kortet */
  .logwrap { border: 1px solid var(--line); border-radius: 18px; background: var(--card);
          margin: 12px 0; padding: 6px; }
  .logcard { display: flex; flex-direction: column; align-items: center; gap: 14px;
          width: 100%; background: none; color: var(--ink); padding: 22px 16px; }
  .logcard .logtitle { font-size: 30px; font-weight: 800; letter-spacing: 1px; }
  .logcard .logicon { width: 84px; height: 84px; color: var(--accent);
          transition: height .18s, width .18s, opacity .18s; }
  .logcard .loghint { border: 1px solid var(--line); border-radius: 99px;
          padding: 10px 18px; color: var(--dim); font-size: 14px; }
  .logcard:active { transform: translateY(1px); }
  .logcard:disabled { opacity: .6; }
  .logwrap.compact .logcard { padding: 16px; gap: 10px; }
  .logwrap.compact .logicon { width: 44px; height: 44px; }
  .logwrap.compact .loghint { display: none; }
  /* avstånds-slinga (horisontell, aldrig vertikal tillväxt) */
  .trail { display: flex; align-items: center; gap: 8px; overflow-x: auto;
          padding: 4px 10px 12px; scrollbar-width: none; }
  .trail::-webkit-scrollbar { display: none; }
  .trail .node { flex: none; display: inline-flex; align-items: center; justify-content: center;
          width: 30px; height: 30px; border-radius: 50%; background: #1a4c38;
          border: 1px solid var(--line); font-size: 14px; font-weight: 700; position: relative; }
  .trail .seg { flex: none; color: var(--dim); font-size: 13px; white-space: nowrap; }
  .trail .node.last { background: var(--accent); color: var(--accent-ink); }
  .trail .tdel { position: absolute; top: -7px; right: -9px; width: 20px; height: 20px;
          border-radius: 50%; background: var(--danger); color: #2a0a06; font-size: 12px;
          line-height: 1; display: flex; align-items: center; justify-content: center; }

  /* 3 stat-kort */
  .statgrid { display: flex; gap: 8px; }
  .statgrid .stat { flex: 1; min-width: 0; background: var(--card); border: 1px solid var(--line);
          border-radius: 14px; padding: 12px 4px 10px; text-align: center; }
  .stat .stat-lbl { color: var(--dim); font-size: 13px; }
  .stat .stat-ico { width: 22px; height: 22px; color: var(--dim); margin: 6px 0; }
  .stat .stat-ctl { display: flex; align-items: center; justify-content: center; gap: 3px; }
  .stat .stat-ctl button { width: 32px; height: 32px; font-size: 21px; font-weight: 700;
          background: #1a4c38; color: var(--ink); flex: none; }
  .stat .stat-ctl button:disabled { opacity: .4; }
  .stat .stat-ctl .val { font-size: 23px; font-weight: 800; min-width: 20px; }
  .stat .stat-sub { color: var(--dim); font-size: 11px; margin-top: 4px; height: 14px; }

  /* toggles green / pin */
  .togglerow { display: flex; gap: 10px; margin: 12px 0 4px; }
  .toggle { flex: 1; display: flex; align-items: center; gap: 10px; text-align: left;
          background: var(--card); border: 1px solid var(--line); border-radius: 14px;
          padding: 12px; color: var(--ink); font-size: 13px; font-weight: 700; line-height: 1.15; }
  .toggle .knob { flex: none; width: 44px; height: 26px; border-radius: 99px;
          background: #0e3326; border: 1px solid var(--line); position: relative;
          transition: background .15s; }
  .toggle .knob::after { content: ""; position: absolute; top: 2px; left: 2px;
          width: 20px; height: 20px; border-radius: 50%; background: #cfe6d8;
          transition: transform .15s; }
  .toggle.on.green .knob { background: var(--accent); border-color: var(--accent); }
  .toggle.on.pin .knob { background: var(--danger); border-color: var(--danger); }
  .toggle.on .knob::after { transform: translateX(18px); }
  .tstatus { min-height: 16px; color: var(--dim); font-size: 12px; margin: 0 2px 6px; }
  .tstatus .ok { color: #7ee2a8; }
</style>
</head>
<body>
<div id="app"></div>
<nav class="tabs">
  <a href="./index.html" class="active"><span class="ico">⛳</span>Logga slag</a>
  <a href="./karta.html"><span class="ico">🗺</span>Karta</a>
  <a href="./oversikt.html"><span class="ico">📋</span>Översikt</a>
</nav>
<script src="./round.js"></script>
<script>
"use strict";
const KEY = "sg-rundlogg-v1";
const KEY_LAST = "sg-rundlogg-sist";
const DEFAULT_COURSE = "Malmö Burlöv Golfklubb";
const MAX_HOLE = SGRound.HOLES;   // spelarens hål 1–18, oavsett vald runda

/* ---------- state ---------- */
let S = load() || freshState();
// äldre versioner kunde få in globala hålnummer (10–27) via kartan — migrera
SGRound.migrateSgHole();
if (S.current > MAX_HOLE) { S.current = SGRound.globalToRel(S.current) || 1; save(); }

function freshState(player, course) {
  return { view: "setup", player: player || "", course: course || DEFAULT_COURSE,
           startedAt: null, endedAt: null, current: 1, holes: {} };
}
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)); } catch (e) { return null; }
}
function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify(S));
    localStorage.setItem("sg_hole", S.current);   // delas med hålkartan
  } catch (e) {}
}
function hole(n) {
  const k = String(n);
  if (!S.holes[k]) S.holes[k] = { shots: [], green: null, pin: null,
                                  putts: 0, pen: 0, holedOut: false, adj: 0 };
  return S.holes[k];
}

/* ---------- GPS ---------- */
let lastFix = null, watching = false, busy = false;

function startWatch() {
  if (watching || !("geolocation" in navigator)) return;
  watching = true;
  navigator.geolocation.watchPosition(
    p => { lastFix = { lat: p.coords.latitude, lon: p.coords.longitude,
                       acc: p.coords.accuracy, ts: Date.now() }; updateGpsChip(); },
    () => {}, { enableHighAccuracy: true, maximumAge: 0 });
}
function getFix() {  // färsk fix: senaste watch-punkten om <8 s, annars ny förfrågan
  return new Promise((res, rej) => {
    if (lastFix && Date.now() - lastFix.ts < 8000) return res(lastFix);
    if (!("geolocation" in navigator)) return rej(new Error("Ingen GPS i webbläsaren."));
    navigator.geolocation.getCurrentPosition(
      p => res({ lat: p.coords.latitude, lon: p.coords.longitude,
                 acc: p.coords.accuracy, ts: Date.now() }),
      e => rej(new Error(e.code === 1 ? "GPS nekad — tillåt platsåtkomst i webbläsaren."
                                      : "Fick ingen GPS-position, försök igen.")),
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 2000 });
  });
}
async function capture(label) {
  if (busy) return null;
  busy = true; render();
  try {
    const f = await getFix();
    if (f.acc > 25 && !confirm(`Svag GPS just nu (±${Math.round(f.acc)} m). Spara ${label} ändå?`)) {
      return null;
    }
    if (navigator.vibrate) navigator.vibrate(30);
    return { lat: f.lat, lon: f.lon, acc: Math.round(f.acc * 10) / 10,
             ts: new Date().toISOString() };
  } catch (e) { alert(e.message); return null; }
  finally { busy = false; }
}
function gpsChipHtml() {
  if (!lastFix) return '<span class="gpsprec">GPS: söker …</span>';
  const a = lastFix.acc, cls = a <= 8 ? "good" : a <= 15 ? "ok" : "bad";
  return `<span class="gpsprec ${cls}">GPS Precision: ±${Math.round(a)} m</span>`;
}
function updateGpsChip() {
  const el = document.getElementById("gpschip");
  if (el) el.outerHTML = `<span id="gpschip">${gpsChipHtml()}</span>`;
}
setInterval(updateGpsChip, 3000);

/* ---------- geometri ---------- */
function hav(a, b) {
  const R = 6371000, r = Math.PI / 180;
  const dp = (b.lat - a.lat) * r, dl = (b.lon - a.lon) * r;
  const x = Math.sin(dp / 2) ** 2 +
            Math.cos(a.lat * r) * Math.cos(b.lat * r) * Math.sin(dl / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(x));
}
const fmtM = m => `${Math.round(m)} m`;
const fmtT = iso => new Date(iso).toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });

/* ---------- export ---------- */
function exportData() {
  const holes = Object.keys(S.holes).map(Number).sort((a, b) => a - b)
    .map(n => ({ n, h: S.holes[String(n)] }))
    .filter(x => x.h.shots.length + x.h.putts + x.h.pen + (x.h.adj || 0) > 0)
    // internt är hålen nycklade på spelarens nummer (1–18); analysen vill ha
    // banans globala hålnummer, så översätt via vald runda vid export
    .map(x => ({ hole: SGRound.relToGlobal(x.n) || x.n, shots: x.h.shots,
                 green: x.h.green, pin: x.h.pin,
                 putts: x.h.putts, penalties: x.h.pen, holed_out: x.h.holedOut,
                 score_adjust: x.h.adj || 0 }));
  return { format: "golf-sg-mobil", version: 1, player: S.player.trim(),
           course: S.course.trim(), round: SGRound.roundName(),
           started_at: S.startedAt,
           ended_at: S.endedAt || new Date().toISOString(), holes };
}
function exportFilename() {
  const d = (S.startedAt || new Date().toISOString()).slice(0, 10);
  const p = S.player.trim().replace(/[^\wåäöÅÄÖ]+/g, "_") || "runda";
  return `mobilrunda_${d}_${p}.json`;
}
async function doShare() {
  const json = JSON.stringify(exportData(), null, 1);
  const file = new File([json], exportFilename(), { type: "application/json" });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: "Golfrunda" }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  doDownload();
}
function doDownload() {
  const json = JSON.stringify(exportData(), null, 1);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([json], { type: "application/json" }));
  a.download = exportFilename();
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
async function doCopy(btn) {
  try {
    await navigator.clipboard.writeText(JSON.stringify(exportData()));
    btn.textContent = "Kopierad ✓";
  } catch (e) { alert("Kunde inte kopiera — använd Ladda ner i stället."); }
}
async function doSend(btn) {
  const base = (localStorage.getItem("sg_base") || "").trim().replace(/\/+$/, "");
  const token = (localStorage.getItem("sg_token") || "").trim();
  if (!base || !token) { alert("Ange analys-adress och din token först (⚙ Analys-koppling)."); return; }
  const old = btn.textContent; btn.disabled = true; btn.textContent = "Skickar …";
  try {
    const r = await fetch(base + "/api/rounds/upload", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Auth-Token": token },
      body: JSON.stringify(exportData()),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) { alert("Kunde inte importera: " + (d.detail || r.status)); btn.textContent = old; btn.disabled = false; return; }
    // spara SG-analysen så översikten kan visa den (matchas på started_at)
    try {
      localStorage.setItem("sg_analysis", JSON.stringify({
        started_at: S.startedAt, saved_at: new Date().toISOString(),
        total_score: d.total_score ?? null,
        total_sg: d.total_sg_tee_to_green ?? null,
        by_category: d.sg_by_category || {},
      }));
    } catch (e) {}
    let msg = `✓ Skickad! ${d.shots} slag, score ${d.total_score ?? "–"}.`;
    if (d.warnings && d.warnings.length) msg += "\n\n⚠ " + d.warnings.join("\n");
    alert(msg);
    btn.textContent = "Skickad ✓";
  } catch (e) {
    alert("Nådde inte analys-servern — är datorn och tunneln igång? (" + e.message + ")");
    btn.textContent = old; btn.disabled = false;
  }
}

/* ---------- vyer ---------- */
const app = document.getElementById("app");
function esc(s) { return String(s).replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

/* ---------- tile-preload: värm hålets kartrutor medan man loggar ----------
   Medan du loggar slag på ett hål hämtas i bakgrunden (låg prio, avdubblat) de
   ortofoto-rutor som hålkartan kommer att visa för samma hål + nästa. Rutorna
   hamnar i webbläsarens HTTP-cache som delas med karta.html → Karta-fliken
   renderar direkt ur cachen i stället för att ladda/blinka grönt. Rör inget
   annat: bara same-origin GET av samma tile-URL:er som kartan ändå begär.
   Tile-matematiken är verifierad att ge exakt samma {z,x,y} som Leaflet. */
const TilePreload = (() => {
  // Värm bara den zoomnivå hålets INITIALA kartvy öppnar i (det som ska kännas
  // direkt); zoom in/ut därifrån laddas live. Par 4/5 öppnar en nivå grundare än
  // par 3 (längre hål → mer utzoomat). Kartan kör detectRetina → på retina-skärmar
  // (telefoner) begär den en nivå DJUPARE, därav baseZ = 18 (retina) / 17 annars;
  // par 3 = baseZ+1.
  const RETINA = (self.devicePixelRatio || 1) > 1;
  const baseZ = RETINA ? 18 : 17;
  const zoomsFor = h => [(h.par && h.par <= 3) ? baseZ + 1 : baseZ];
  const seen = new Set();            // avdubbling över alla anrop
  let holesP = null, lastRel = null, cfg = { min: 13, max: 19 };
  function loadHoles() {
    if (holesP) return holesP;
    holesP = Promise.all([
      fetch("data/burlov.json").then(r => r.json()).then(d => d.holes),
      fetch("tiles/manifest.json").then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([holes, man]) => {
      if (man) cfg = { min: man.min_zoom, max: man.max_zoom };
      const by = {};
      for (const h of holes) by[SGRound.GLOBAL_BASE[h.loop] + h.hole] = h;
      return by;
    }).catch(() => ({}));
    return holesP;
  }
  const xtile = (lon, z) => Math.floor((lon + 180) / 360 * (1 << z));
  const ytile = (lat, z) => { const r = lat * Math.PI / 180;
    return Math.floor((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * (1 << z)); };
  // Marginal runt hålet så preloaden täcker kartans ROTERADE vy (som sträcker sig
  // utanför hål-linjen). En rutantals-marginal duger ej (krymper i meter vid djupare
  // zoom). Marginalen skalas efter hålets storlek: kartan zoomas för att rymma hålet,
  // så lateral overshoot ∝ hållängd. ~0,32×span + 40 m rotationskudde, klampat
  // [80,200] → full täckning för både korta par 3 och långa par 5, minimal data
  // (verifierat mot kartans faktiska rutor).
  const R = 6371000, rad = x => x * Math.PI / 180;
  function bbox(h) {
    let s = 90, n = -90, w = 180, e = -180;
    const eat = (la, lo) => { if (la < s) s = la; if (la > n) n = la; if (lo < w) w = lo; if (lo > e) e = lo; };
    (h.green || []).forEach(p => eat(p[0], p[1]));
    (h.line || []).forEach(p => eat(p[0], p[1]));
    (h.tees || []).forEach(t => eat(t.lat, t.lon));
    if (h.pin) eat(h.pin[0], h.pin[1]);
    if (!(e >= w && n >= s)) return null;
    const span = 2 * R * Math.asin(Math.sqrt(
      Math.sin(rad(n - s) / 2) ** 2 + Math.cos(rad(s)) * Math.cos(rad(n)) * Math.sin(rad(e - w) / 2) ** 2));
    const padM = Math.max(80, Math.min(200, 0.32 * span + 40));
    const dLat = padM / 111320, dLon = padM / (111320 * Math.cos(rad((s + n) / 2)));
    return { s: s - dLat, n: n + dLat, w: w - dLon, e: e + dLon };
  }
  function warm(url) {
    if (seen.has(url)) return;
    seen.add(url);
    const im = new Image(); im.decoding = "async"; im.src = url;
  }
  function preload(h) {
    const b = bbox(h); if (!b) return;
    for (const z of zoomsFor(h)) {
      if (z < cfg.min || z > cfg.max) continue;
      // exakt tile-intervall för den padded bboxen (marginalen sitter i PAD_M)
      const x0 = xtile(b.w, z), x1 = xtile(b.e, z);
      const y0 = ytile(b.n, z), y1 = ytile(b.s, z);           // n = mindre y
      if ((x1 - x0 + 1) * (y1 - y0 + 1) > 160) continue;       // säkerhetsspärr
      for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++)
        warm(`tiles/${z}/${x}/${y}.webp`);
    }
  }
  // preloada spelarens hål `rel` (+ nästa) när webbläsaren är ledig; bara vid byte
  function forHole(rel) {
    if (rel == null || rel === lastRel) return;
    lastRel = rel;
    const idle = window.requestIdleCallback || (cb => setTimeout(cb, 200));
    idle(() => loadHoles().then(by => {
      for (const r of [rel, rel + 1]) {
        const g = SGRound.relToGlobal(r);
        if (g && by[g]) preload(by[g]);
      }
    }));
  }
  return { forHole };
})();

function render() {
  if (S.view === "setup") renderSetup();
  else if (S.view === "hole") renderHole();
  else renderSummary();
  // värm hålkartans rutor för aktuellt hål (+ nästa) medan man loggar
  if (S.view === "hole") TilePreload.forHole(S.current);
}

function renderSetup() {
  const insecure = !window.isSecureContext;
  const last = localStorage.getItem(KEY_LAST);
  app.innerHTML = `
    <h1>⛳ SG Rundlogg</h1>
    <p class="sub">Registrera slag med mobilens GPS — för Strokes Gained-analys.</p>
    ${insecure ? '<div class="banner">⚠ Sidan är inte öppnad via HTTPS — GPS fungerar då inte i de flesta mobiler.</div>' : ""}
    <div class="card">
      <label>Ditt namn</label>
      <input type="text" id="player" value="${esc(S.player)}" placeholder="Förnamn Efternamn" autocomplete="name">
      <label>Bana</label>
      <input type="text" id="course" value="${esc(S.course)}">
      <label>Vilken runda spelar du? <span style="color:var(--dim)">(för hålkartan)</span></label>
      <select class="field" id="round">
        <option value="1-18">1–18</option>
        <option value="10-27">10–27</option>
        <option value="19-9">19–9</option>
      </select>
      <button class="big" id="start">Starta runda</button>
    </div>
    <div class="card hint">
      <b>Så funkar det</b><br>
      1. Stå vid bollen inför varje slag och tryck <b>SLAG</b> (även på tee).<br>
      2. När bollen ligger på green: tryck <b>Boll på green</b>, putta klart och räkna puttarna med +/−.<br>
      3. Vid flaggan: tryck gärna <b>Markera pin</b> (bäst data — pinnen flyttas dagligen).<br>
      4. Plikt? Öka <b>Plikt</b>-räknaren. Chip-in? Bocka i <b>I hål utan putt</b>.<br>
      5. Efter rundan: <b>Avsluta</b> → dela filen till den som har appen.
    </div>
    ${last ? '<button class="link" id="relast">Hämta senaste avslutade rundan igen</button>' : ""}`;
  // rundval (1–18/10–27/19–9) delas via localStorage ('sg_round'): kartan och
  // översikten visar rätt hål, och exporten översätter spelarens hål 1–18 till
  // banans globala hålnummer.
  const roundSel = document.getElementById("round");
  roundSel.value = localStorage.getItem("sg_round") || "1-18";
  roundSel.onchange = () => localStorage.setItem("sg_round", roundSel.value);
  document.getElementById("start").onclick = () => {
    const p = document.getElementById("player").value.trim();
    if (!p) { alert("Fyll i ditt namn."); return; }
    S.player = p;
    S.course = document.getElementById("course").value.trim() || DEFAULT_COURSE;
    localStorage.setItem("sg_round", roundSel.value);
    if (!S.startedAt) S.startedAt = new Date().toISOString();
    S.view = "hole";
    startWatch(); save(); render();
  };
  const rl = document.getElementById("relast");
  if (rl) rl.onclick = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([last], { type: "application/json" }));
    a.download = "mobilrunda_senaste.json"; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  };
}

function renderHole() {
  const h = hole(S.current);
  const pts = h.shots;
  // Avstånds-slinga: horisontell, en rad. Visar bara avståndet mellan slagen
  // (±precision/tid finns kvar i sparad runda/översikt). ✕ tar bort sista slaget.
  const trail = pts.map((p, i) => {
    const seg = i > 0 ? `<span class="seg">${fmtM(hav(pts[i - 1], p))}</span>` : "";
    const last = i === pts.length - 1;
    return `${seg}<span class="node${last ? " last" : ""}">${i + 1}${last ? `<button class="tdel" data-del="${i}">✕</button>` : ""}</span>`;
  }).join("");
  const greenDist = h.green && pts.length ? ` (${fmtM(hav(pts[pts.length - 1], h.green))} från sista slaget)` : "";
  const gStat = h.green ? `<span class="ok">✓ Green</span>${greenDist}` : "";
  const pStat = h.pin ? `<span class="ok">✓ Pin</span>` : "";
  const tstatus = [gStat, pStat].filter(Boolean).join(" · ");
  // Score = slag vid bollen (GPS-loggade + manuella via adj) + puttar + plikt.
  // adj låter score bli rätt även om alla slag inte GPS-taggats — score-siffran
  // väger tyngre än att varje slag har position. Samma fält som Översikt redigerar.
  const shotsN = pts.length + (h.adj || 0);
  const score = shotsN + h.putts + h.pen;
  const ICO_FLAG = `<svg class="logicon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M24 11 L24 46"/><path d="M24 11 L45 17 L24 25 Z"/><ellipse cx="30" cy="50" rx="18" ry="5"/><circle cx="19" cy="47" r="4"/></svg>`;
  const ICO_PUTT = `<svg class="stat-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3v11"/><path d="M15 14h5"/></svg>`;
  const ICO_PEN = `<svg class="stat-ico" style="color:var(--danger)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v18"/><path d="M6 4h11l-3 4 3 4H6"/></svg>`;
  const ICO_SCORE = `<svg class="stat-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>`;
  app.innerHTML = `
    <div class="holehead">
      <button id="prev" ${S.current <= 1 ? "disabled" : ""}>‹</button>
      <div class="htitle">
        <div class="nr">Hål ${S.current}</div>
        <span id="gpschip">${gpsChipHtml()}</span>
      </div>
      <button id="next2">›</button>
    </div>

    <div class="logwrap ${pts.length ? "compact" : ""}">
      <button class="logcard" id="shot" ${busy ? "disabled" : ""}>
        <div class="logtitle">${busy ? "HÄMTAR GPS …" : "LOGGA SLAG"}</div>
        ${ICO_FLAG}
        <div class="loghint">Tryck vid bollen innan du slår.</div>
      </button>
      ${pts.length ? `<div class="trail">${trail}</div>` : ""}
    </div>

    <div class="statgrid">
      <div class="stat">
        <div class="stat-lbl">Puttar</div>${ICO_PUTT}
        <div class="stat-ctl"><button id="pm">−</button><span class="val">${h.putts}</span><button id="pp">+</button></div>
        <div class="stat-sub"></div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Pliktslag</div>${ICO_PEN}
        <div class="stat-ctl"><button id="fm">−</button><span class="val">${h.pen}</span><button id="fp">+</button></div>
        <div class="stat-sub"></div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Score</div>${ICO_SCORE}
        <div class="stat-ctl"><button id="sm" ${shotsN <= 0 ? "disabled" : ""}>−</button><span class="val">${score}</span><button id="sp">+</button></div>
        <div class="stat-sub">${shotsN} slag${h.adj ? ` (${h.adj > 0 ? "+" : "−"}${Math.abs(h.adj)})` : ""}</div>
      </div>
    </div>

    <div class="togglerow">
      <button class="toggle green ${h.green ? "on" : ""}" id="green" ${busy ? "disabled" : ""}>
        <span class="knob"></span><span>BOLL PÅ GREEN</span></button>
      <button class="toggle pin ${h.pin ? "on" : ""}" id="pin" ${busy ? "disabled" : ""}>
        <span class="knob"></span><span>MARKERA PINN</span></button>
    </div>
    <div class="tstatus">${tstatus}</div>
    ${h.putts === 0 && pts.length ? `
      <button class="ghost holedbtn ${h.holedOut ? "on" : ""}" id="holed" style="width:100%">
        ${h.holedOut ? "✓ I hål utan putt (chip-in)" : "I hål utan putt (chip-in)?"}</button>` : ""}

    <button class="big" id="next">Nästa hål ›</button>
    <div style="text-align:center"><button class="link" id="finish">Avsluta runda</button></div>`;

  document.getElementById("shot").onclick = async () => {
    const p = await capture("slaget");
    if (p) { hole(S.current).shots.push(p); save(); }
    render();
  };
  document.getElementById("green").onclick = async () => {
    if (h.green && !confirm("Green-position finns redan — ersätta?")) return;
    const p = await capture("green-läget");
    if (p) { h.green = p; save(); }
    render();
  };
  document.getElementById("pin").onclick = async () => {
    if (h.pin && !confirm("Pin-position finns redan — ersätta?")) return;
    const p = await capture("pin-positionen");
    if (p) { h.pin = p; save(); }
    render();
  };
  app.querySelectorAll("[data-del]").forEach(b => b.onclick = () => {
    if (confirm("Ta bort senaste slaget?")) { pts.splice(+b.dataset.del, 1); save(); render(); }
  });
  document.getElementById("pm").onclick = () => { h.putts = Math.max(0, h.putts - 1); save(); render(); };
  document.getElementById("pp").onclick = () => { h.putts++; h.holedOut = false; save(); render(); };
  document.getElementById("fm").onclick = () => { h.pen = Math.max(0, h.pen - 1); save(); render(); };
  document.getElementById("fp").onclick = () => { h.pen++; save(); render(); };
  // score +/−: justerar antalet slag vid bollen via adj (utan GPS-position), så
  // score kan sättas rätt även när alla slag inte loggats. − stoppar vid 0 slag.
  document.getElementById("sp").onclick = () => { h.adj = (h.adj || 0) + 1; save(); render(); };
  document.getElementById("sm").onclick = () => {
    if (pts.length + (h.adj || 0) <= 0) return;
    h.adj = (h.adj || 0) - 1; save(); render();
  };
  const ho = document.getElementById("holed");
  if (ho) ho.onclick = () => { h.holedOut = !h.holedOut; save(); render(); };
  document.getElementById("prev").onclick = () => { S.current--; save(); render(); };
  document.getElementById("next2").onclick = () => nextHole();
  document.getElementById("next").onclick = () => nextHole();
  document.getElementById("finish").onclick = () => {
    S.endedAt = new Date().toISOString(); S.view = "summary"; save(); render();
  };
}

function nextHole() {
  const h = hole(S.current);
  if (h.shots.length && !h.green && !h.holedOut && h.putts === 0 &&
      !confirm("Varken green-position, puttar eller chip-in registrerat på hålet — gå vidare ändå?")) return;
  if (h.shots.length && h.putts > 0 && !h.green &&
      !confirm("Ingen boll-på-green-position — första puttens längd får uppskattas vid import. Gå vidare?")) return;
  if (S.current < MAX_HOLE) { S.current++; save(); render(); }
}

function renderSummary() {
  const played = Object.keys(S.holes).map(Number).sort((a, b) => a - b)
    .filter(n => { const h = S.holes[String(n)];
                   return h.shots.length + h.putts + h.pen + (h.adj || 0) > 0; });
  const rows = played.map(n => {
    const h = S.holes[String(n)];
    return `<tr><td>Hål ${n}</td><td>${h.shots.length}${h.adj ? `<span style="color:var(--warn)">${h.adj > 0 ? "+" : "−"}${Math.abs(h.adj)}</span>` : ""}</td><td>${h.putts}</td>
            <td>${h.pen || ""}</td><td><b>${h.shots.length + h.putts + h.pen + (h.adj || 0)}</b></td></tr>`;
  }).join("");
  const tot = played.reduce((s, n) => {
    const h = S.holes[String(n)]; return s + h.shots.length + h.putts + h.pen + (h.adj || 0); }, 0);
  const shots = played.reduce((s, n) => s + S.holes[String(n)].shots.length, 0);
  const noGreen = played.filter(n => {
    const h = S.holes[String(n)]; return h.putts > 0 && !h.green; });
  app.innerHTML = `
    <h1>Runda klar 🏌️</h1>
    <p class="sub">${esc(S.player)} · ${esc(S.course)} · ${(S.startedAt || "").slice(0, 10)}</p>
    <div class="card">
      <table>
        <tr><th>Hål</th><th>Slag</th><th>Putt</th><th>Plikt</th><th>Score</th></tr>
        ${rows}
        <tr class="total"><td>Totalt (${played.length} hål)</td><td>${shots}</td>
          <td></td><td></td><td>${tot}</td></tr>
      </table>
      ${noGreen.length ? `<div class="banner">Hål ${noGreen.join(", ")} saknar green-position — går att importera, men första-puttens längd uppskattas.</div>` : ""}
    </div>
    <div class="card">
      <button class="big" id="send">📊 Skicka till analys</button>
      <button class="big" id="share" style="margin-top:10px;background:#1a4c38;color:var(--ink)">📤 Dela filen</button>
      <div class="row" style="margin-top:10px">
        <button class="ghost" id="dl">Ladda ner</button>
        <button class="ghost" id="copy">Kopiera</button>
      </div>
      <details style="margin-top:12px" ${localStorage.getItem("sg_base") ? "" : "open"}>
        <summary class="hint" style="cursor:pointer">⚙ Analys-koppling (URL + token)</summary>
        <input id="cfgBase" placeholder="https://…ts.net"
          value="${esc(localStorage.getItem("sg_base") || "")}"
          style="width:100%;box-sizing:border-box;margin-top:8px;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:15px">
        <input id="cfgToken" placeholder="din token" type="password"
          value="${esc(localStorage.getItem("sg_token") || "")}"
          style="width:100%;box-sizing:border-box;margin-top:8px;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:15px">
        <div class="row" style="margin-top:8px">
          <button class="ghost" id="cfgSave">Spara koppling</button>
          <a class="ghost" id="viewLink" href="${esc(localStorage.getItem("sg_base") || "#")}"
             target="_blank" rel="noopener" style="text-align:center;text-decoration:none;line-height:1.6">→ Se din analys</a>
        </div>
        <div class="hint" style="margin-top:8px">Adressen får du av den som kör SG-appen;
          token är din personliga. Kräver att datorn/tunneln är igång.</div>
      </details>
    </div>
    <button class="big" id="back" style="background:#1a4c38;color:var(--ink)">◀ Fortsätt runda</button>
    <div style="text-align:center"><button class="link" id="new">Ny runda (rensar allt)</button></div>`;
  document.getElementById("send").onclick = e => { stashLast(); doSend(e.currentTarget); };
  document.getElementById("share").onclick = () => { stashLast(); doShare(); };
  document.getElementById("dl").onclick = () => { stashLast(); doDownload(); };
  document.getElementById("copy").onclick = e => { stashLast(); doCopy(e.target); };
  document.getElementById("cfgSave").onclick = () => {
    const b = document.getElementById("cfgBase").value.trim().replace(/\/+$/, "");
    const t = document.getElementById("cfgToken").value.trim();
    localStorage.setItem("sg_base", b); localStorage.setItem("sg_token", t);
    const vl = document.getElementById("viewLink"); if (vl) vl.href = b || "#";
    alert("Kopplingen sparad.");
  };
  document.getElementById("back").onclick = () => { S.view = "hole"; S.endedAt = null; save(); render(); };
  document.getElementById("new").onclick = () => {
    if (!confirm("Rensa rundan och börja om? Se till att filen är delad/nedladdad först.")) return;
    stashLast();
    S = freshState(S.player, S.course); save(); render();
  };
}
function stashLast() {
  try { localStorage.setItem(KEY_LAST, JSON.stringify(exportData())); } catch (e) {}
}

/* ---------- synk med hålkartan ---------- */
// Kartans ◀/▶ skriver sg_hole; plocka upp det när man kommer tillbaka hit
// så score-sidan och kartan alltid visar samma hål.
function syncFromMap() {
  const g = parseInt(localStorage.getItem("sg_hole"), 10);
  if (S.view === "hole" && g >= 1 && g <= MAX_HOLE && g !== S.current) {
    S.current = g; save(); render();
  }
}
window.addEventListener("pageshow", syncFromMap);
document.addEventListener("visibilitychange", () => { if (!document.hidden) syncFromMap(); });
window.addEventListener("storage", e => { if (e.key === "sg_hole") syncFromMap(); });

/* ---------- init ---------- */
window.addEventListener("beforeunload", e => {
  if (S.view === "hole") { e.preventDefault(); e.returnValue = ""; }
});
if (S.view !== "setup") startWatch();
render();
</script>
<script>
/* Håll navigeringen inne i hemskärms-appen (iOS standalone): utan detta öppnar
   iOS länkar till andra sidor i en Safari-ruta (kryss + adressfält uppe, ladda
   om/tillbaka nere). Vi fångar interna länkklick och navigerar via location,
   vilket behåller helskärmsläget. Ingen effekt i vanlig webbläsare. */
(function () {
  var standalone = ("standalone" in navigator && navigator.standalone)
    || matchMedia("(display-mode: standalone)").matches;
  if (!standalone) return;
  document.addEventListener("click", function (e) {
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
    var url = new URL(a.getAttribute("href"), location.href);
    if (url.origin !== location.origin) return;
    e.preventDefault();
    location.href = url.href;
  });
})();
</script>
